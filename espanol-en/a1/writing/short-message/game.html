      <button id="gBtnStart" class="fc-btn primary" style="padding:12px 32px" onclick="startGame()">Start Game</button>

<script>
window.GAME_DATA = {
  level: 'a1',
  chapterId: 'short-message',
  storageKey: 'game_a1_short_message',
  items: [
  {
    "id": "g1",
    "question": "Friendly opener:",
    "options": [
      "&iexcl;Hola!",
      "&iexcl;Adi&oacute;s!",
      "Saludos cordiales"
    ],
    "correct": "&iexcl;Hola!"
  },
  {
    "id": "g2",
    "question": "\"Shall we meet on Friday?\":",
    "options": [
      "&iquest;Quedamos el viernes?",
      "&iquest;Quedan el viernes?",
      "&iquest;Queda el viernes?"
    ],
    "correct": "&iquest;Quedamos el viernes?"
  },
  {
    "id": "g3",
    "question": "\"I'm running late\":",
    "options": [
      "Llego tarde",
      "Llega tarde",
      "Soy tarde"
    ],
    "correct": "Llego tarde"
  },
  {
    "id": "g4",
    "question": "\"See you at eight\":",
    "options": [
      "Nos vemos a las ocho",
      "Nos ven a las ocho",
      "Vemos las ocho"
    ],
    "correct": "Nos vemos a las ocho"
  },
  {
    "id": "g5",
    "question": "Warm sign-off for family:",
    "options": [
      "Un beso",
      "Saludos",
      "Atentamente"
    ],
    "correct": "Un beso"
  },
  {
    "id": "g6",
    "question": "\"see you tomorrow\":",
    "options": [
      "hasta ma&ntilde;ana",
      "hasta luego",
      "hasta pronto"
    ],
    "correct": "hasta ma&ntilde;ana"
  },
  {
    "id": "g7",
    "question": "Chat abbreviation \"xq\" =",
    "options": [
      "porque",
      "por favor",
      "peque&ntilde;o"
    ],
    "correct": "porque"
  },
  {
    "id": "g8",
    "question": "\"Can you buy bread?\":",
    "options": [
      "&iquest;Puedes comprar pan?",
      "&iquest;Puede comprar pan?",
      "&iquest;Compras poder pan?"
    ],
    "correct": "&iquest;Puedes comprar pan?"
  },
  {
    "id": "g9",
    "question": "Spanish laughter:",
    "options": [
      "jajaja",
      "hahaha",
      "jejeje in English"
    ],
    "correct": "jajaja"
  },
  {
    "id": "g10",
    "question": "\"Thanks for the dinner!\":",
    "options": [
      "&iexcl;Gracias por la cena!",
      "&iexcl;Gracias para la cena!",
      "&iexcl;Gracias de la cena!"
    ],
    "correct": "&iexcl;Gracias por la cena!"
  }
]
};

var gQueue = [], gScore = 0, gStreak = 0, gAnswered = 0, gLock = false;

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function startGame() {
  document.getElementById('gameStart').style.display = 'none';
  document.getElementById('gamePlay').style.display = 'block';
  gQueue = shuffle(window.GAME_DATA.items.slice());
  gScore = 0; gStreak = 0; gAnswered = 0;
  renderQ();
}

function renderQ() {
  var q = gQueue[0];
  var play = document.getElementById('gamePlay');
  var opts = shuffle(q.options.slice());
  var btns = opts.map(function(o) {
    return '<button class="fc-btn" style="display:block;width:100%;padding:12px;margin-bottom:8px;text-align:left;text-transform:none;letter-spacing:0;font-size:.95rem" onclick="answerQ(this)">' + o + '</button>';
  }).join('');
  play.innerHTML = '<div style="padding:10px 0">'
    + '<div style="font-family:var(--font-sans);font-size:.75rem;color:var(--muted);margin-bottom:6px">Score: ' + gScore + ' &middot; ' + gAnswered + ' / ' + window.GAME_DATA.items.length + ' answered</div>'
    + '<div style="font-size:1.05rem;margin-bottom:18px">' + q.question + '</div>'
    + btns
    + '<div id="gFeedback" style="min-height:24px;font-size:.85rem;margin-top:8px"></div></div>';
  gLock = false;
}

function decodeEnt(s) {
  var d = document.createElement('div');
  d.innerHTML = s;
  return d.textContent;
}

function answerQ(btn) {
  if (gLock) return;
  gLock = true;
  var q = gQueue[0];
  var ans = btn.textContent.trim();
  var fb = document.getElementById('gFeedback');
  if (ans === decodeEnt(q.correct).trim()) {
    gStreak++;
    gScore += 10 + (gStreak >= 3 ? 3 : 0);
    gAnswered++;
    gQueue.shift();
    fb.style.color = 'var(--amber)';
    fb.textContent = 'Correct! +' + (gStreak >= 3 ? 13 : 10) + ' points';
  } else {
    gStreak = 0;
    gScore = Math.max(0, gScore - 3);
    gQueue.push(gQueue.shift());
    fb.style.color = 'var(--muted)';
    fb.textContent = 'Not quite. The answer was: ' + decodeEnt(q.correct) + ' (requeued, -3 points)';
  }
  setTimeout(function() {
    if (gQueue.length === 0) { endGame(); } else { renderQ(); }
  }, 1100);
}

function endGame() {
  document.getElementById('gamePlay').style.display = 'none';
  document.getElementById('gameCompletion').style.display = 'block';
  var pct = Math.min(gScore, 100);
  document.getElementById('gFinalScore').textContent = 'Score: ' + pct;
  try {
    var lv = JSON.parse(localStorage.getItem('wordplay_progress') || '{}');
    if (!lv.a1) lv.a1 = {};
    lv.a1['wordplay_game_' + window.GAME_DATA.chapterId] = { pct: pct, date: new Date().toISOString() };
    localStorage.setItem('wordplay_progress', JSON.stringify(lv));
  } catch (e) {}
}
</script>
