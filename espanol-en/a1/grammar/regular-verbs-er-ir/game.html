  <h1>Regular -er &amp; -ir Verbs &mdash; Mastery Game</h1>
  <div style="max-width:700px;margin:0 auto;padding:20px">
    <div id="gameStart" style="text-align:center">
      <p style="color:var(--muted);margin-bottom:16px">10 questions &middot; reach 100 points to win</p>
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:24px">Master the present-tense endings of regular -er and -ir verbs like comer, beber and vivir.</p>
      <button id="gBtnStart" class="fc-btn primary" style="padding:12px 32px" onclick="startGame()">Start Game</button>
    </div>
    <div id="gamePlay" style="display:none"></div>
    <div id="gameCompletion" style="display:none;text-align:center">
      <div style="font-size:2rem;margin-bottom:20px;color:var(--amber)">&#9670;</div>
      <div style="font-size:1.4rem;font-weight:700;margin-bottom:10px">Mastery Achieved!</div>
      <div id="gFinalScore" style="font-size:1.1rem;color:var(--muted);margin-bottom:24px"></div>
      <button class="fc-btn primary" style="padding:12px 32px" onclick="location.href='index.html'">&#8592; Back to Chapter</button>
    </div>
  </div>
</div>

<script src="../../../../shared/store.js?v=v107"></script>
<script>
window.GAME_DATA = {
  level: 'a1',
  chapterId: 'regular-verbs-er-ir',
  storageKey: 'game_a1_regular_verbs_er_ir',
  items: [
  {
    "id": "g1",
    "question": "Complete: \"Yo _______ (comer) fruta.\"",
    "options": [
      "como",
      "come",
      "comes"
    ],
    "correct": "como"
  },
  {
    "id": "g2",
    "question": "Complete: \"T&uacute; _______ (vivir) en Sevilla.\"",
    "options": [
      "vives",
      "vivo",
      "vive"
    ],
    "correct": "vives"
  },
  {
    "id": "g3",
    "question": "Complete: \"Nosotros _______ (beber) zumo.\"",
    "options": [
      "bebemos",
      "bebimos",
      "beben"
    ],
    "correct": "bebemos"
  },
  {
    "id": "g4",
    "question": "Complete: \"Ellos _______ (escribir) cartas.\"",
    "options": [
      "escriben",
      "escribe",
      "escribimos"
    ],
    "correct": "escriben"
  },
  {
    "id": "g5",
    "question": "Complete: \"Ella _______ (leer) un libro.\"",
    "options": [
      "lee",
      "leo",
      "leen"
    ],
    "correct": "lee"
  },
  {
    "id": "g6",
    "question": "Which is the correct nosotros form of \"vivir\"?",
    "options": [
      "vivimos",
      "vivemos",
      "vivamos"
    ],
    "correct": "vivimos"
  },
  {
    "id": "g7",
    "question": "Complete: \"Yo _______ (aprender) mucho.\"",
    "options": [
      "aprendo",
      "aprende",
      "aprendes"
    ],
    "correct": "aprendo"
  },
  {
    "id": "g8",
    "question": "Complete: \"&iquest;_______ (compartir / t&uacute;) tu comida?\"",
    "options": [
      "Compartes",
      "Comparto",
      "Comparte"
    ],
    "correct": "Compartes"
  },
  {
    "id": "g9",
    "question": "Complete: \"Usted _______ (vender) coches.\"",
    "options": [
      "vende",
      "vendes",
      "vendo"
    ],
    "correct": "vende"
  },
  {
    "id": "g10",
    "question": "Complete: \"Vosotros _______ (abrir) las ventanas.\"",
    "options": [
      "abr&iacute;s",
      "abrimos",
      "abren"
    ],
    "correct": "abr&iacute;s"
  }
]
};

var gQueue = [], gScore = 0, gStreak = 0, gAnswered = 0, gLock = false;

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function startGame() {
  document.getElementById('gameStart').style.display = 'none';
  document.getElementById('gamePlay').style.display = 'block';
  gQueue = shuffle(window.GAME_DATA.items.slice());
  gScore = 0; gStreak = 0; gAnswered = 0;
  renderQ();
}

function renderQ() {
  var q = gQueue[0];
  var play = document.getElementById('gamePlay');
  var opts = shuffle(q.options.slice());
  var btns = opts.map(function(o) {
    return '<button class="fc-btn" style="display:block;width:100%;padding:12px;margin-bottom:8px;text-align:left;text-transform:none;letter-spacing:0;font-size:.95rem" onclick="answerQ(this)">' + o + '</button>';
  }).join('');
  play.innerHTML = '<div style="padding:10px 0">'
    + '<div style="font-family:var(--font-sans);font-size:.75rem;color:var(--muted);margin-bottom:6px">Score: ' + gScore + ' &middot; ' + gAnswered + ' / ' + window.GAME_DATA.items.length + ' answered</div>'
    + '<div style="font-size:1.05rem;margin-bottom:18px">' + q.question + '</div>'
    + btns
    + '<div id="gFeedback" style="min-height:24px;font-size:.85rem;margin-top:8px"></div></div>';
  gLock = false;
}

function decodeEnt(s) {
  var d = document.createElement('div');
  d.innerHTML = s;
  return d.textContent;
}

function answerQ(btn) {
  if (gLock) return;
  gLock = true;
  var q = gQueue[0];
  var ans = btn.textContent.trim();
  var fb = document.getElementById('gFeedback');
  if (ans === decodeEnt(q.correct).trim()) {
    gStreak++;
    gScore += 10 + (gStreak >= 3 ? 3 : 0);
    gAnswered++;
    gQueue.shift();
    fb.style.color = 'var(--amber)';
    fb.textContent = 'Correct! +' + (gStreak >= 3 ? 13 : 10) + ' points';
  } else {
    gStreak = 0;
    gScore = Math.max(0, gScore - 3);
    gQueue.push(gQueue.shift());
    fb.style.color = 'var(--muted)';
    fb.textContent = 'Not quite. The answer was: ' + decodeEnt(q.correct) + ' (requeued, -3 points)';
  }
  setTimeout(function() {
    if (gQueue.length === 0) { endGame(); } else { renderQ(); }
  }, 1100);
}

function endGame() {
  document.getElementById('gamePlay').style.display = 'none';
  document.getElementById('gameCompletion').style.display = 'block';
  var pct = Math.min(gScore, 100);
  document.getElementById('gFinalScore').textContent = 'Score: ' + pct;
  try {
    var lv = JSON.parse(localStorage.getItem('wordplay_progress') || '{}');
    if (!lv.a1) lv.a1 = {};
    lv.a1['wordplay_game_' + window.GAME_DATA.chapterId] = { pct: pct, date: new Date().toISOString() };
    localStorage.setItem('wordplay_progress', JSON.stringify(lv));
  } catch (e) {}
}
</script>
