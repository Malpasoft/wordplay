<script>
window.GAME_DATA = {
  level: 'a1',
  chapterId: 'gustar',
  storageKey: 'game_a1_gustar',
  items: [
    {id: 'me_gusta_singular', pronoun: 'me', thing: 'la pizza (singular)', form: 'Me gusta la pizza', example: 'I like pizza', correct: 'gusta', explain: 'singular = gusta'},
    {id: 'me_gustan_plural', pronoun: 'me', thing: 'las frutas (plural)', form: 'Me gustan las frutas', example: 'I like fruits', correct: 'gustan', explain: 'plural = gustan'},
    {id: 'te_gusta', pronoun: 'te', thing: 'el chocolate', form: 'Te gusta el chocolate', example: 'You like chocolate', correct: 'gusta', explain: 'You (singular) uses te'},
    {id: 'le_gusta', pronoun: 'le', thing: 'el fútbol', form: 'Le gusta el fútbol', example: 'He/she likes soccer', correct: 'gusta', explain: 'He/she/you formal uses le'},
    {id: 'nos_gusta', pronoun: 'nos', thing: 'viajar (infinitive)', form: 'Nos gusta viajar', example: 'We like to travel', correct: 'gusta', explain: 'Infinitive always = gusta'},
    {id: 'les_gustan', pronoun: 'les', thing: 'los deportes (plural)', form: 'Les gustan los deportes', example: 'They like sports', correct: 'gustan', explain: 'Plural things = gustan'},
    {id: 'mi_gusta', pronoun: 'a mi', thing: 'la música', form: 'A mí me gusta la música', example: 'To me, I like music', correct: 'gusta', explain: 'Emphatic form with a mi'},
    {id: 'juan_gusta', pronoun: 'a juan', thing: 'leer', form: 'A Juan le gusta leer', example: 'Juan likes to read', correct: 'gusta', explain: 'Infinitive = always gusta'},
    {id: 'nos_gustan_plural', pronoun: 'nos', thing: 'los libros (plural)', form: 'Nos gustan los libros', example: 'We like books', correct: 'gustan', explain: 'Plural nouns = gustan'},
    {id: 'les_gusta_singular', pronoun: 'les', thing: 'el cine', form: 'Les gusta el cine', example: 'They like cinema', correct: 'gusta', explain: 'Singular = gusta'}
  ]
};

var game = null;

function startGame() {
  if (game) { game.newGame(); }
  document.getElementById('gameStart').style.display = 'none';
  document.getElementById('gamePlay').style.display = 'block';
  document.getElementById('gameCompletion').style.display = 'none';
}

function backToChapter() {
  window.location.href = 'index.html';
}

document.addEventListener('DOMContentLoaded', function() {
  var DATA = window.GAME_DATA;
  var play = document.querySelector('#gamePlay .game-play');
  if (!play) return;

  var score = 0, answered = 0, won = false;
  var widx = 0, tidx = 0, sel = null;
  var ct = {};
  DATA.items.forEach(function(w){ct[w.id] = 0;});
  var types = ['significado', 'contexto', 'produccion'];

  function getQ() {
    var item = DATA.items[widx];
    var t = types[tidx];
    var q = {itemId: item.id, type: t};
    if (t === 'significado') {
      q.question = '<b>' + item.thing + '</b>: Which is correct?';
      q.correct = item.correct;
      var wrongForm = item.correct === 'gusta' ? 'gustan' : 'gusta';
      var opts = [item.correct, wrongForm].sort(() => Math.random() - 0.5);
      q.options = opts;
    } else if (t === 'contexto') {
      q.question = '<i>\"' + item.form + '\"</i><br>Is this correct?';
      q.correct = 'yes';
      var opts = ['yes', 'no'].sort(() => Math.random() - 0.5);
      q.options = opts;
    } else {
      q.question = 'Complete: "' + item.pronoun + ' _____ ' + item.thing + '"';
      q.correct = item.correct;
    }
    return q;
  }

  function display() {
    var q = getQ();
    var item = DATA.items[widx];
    document.getElementById('gTerm').innerHTML = item.thing + ' (' + item.explain + ')';
    document.getElementById('gQTypeTag').textContent = tidx === 0 ? 'significado' : tidx === 1 ? 'contexto' : 'produccion';
    document.getElementById('gPrompt').innerHTML = q.question;

    if (tidx === 2) {
      document.getElementById('gOptions').style.display = 'none';
      document.getElementById('gInputWrap').style.display = 'block';
      document.getElementById('gInput').value = '';
      document.getElementById('gInput').focus();
    } else {
      document.getElementById('gOptions').style.display = 'block';
      document.getElementById('gInputWrap').style.display = 'none';
      var html = q.options.map(o => '<div style="margin-bottom:10px"><button class="match-item" onclick="selectAnswer(this, \'' + o + '\')">'+o+'</button></div>').join('');
      document.getElementById('gOptions').innerHTML = html;
      sel = null;
    }
  }

  window.selectAnswer = function(btn, ans) {
    document.querySelectorAll('.match-item').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    sel = ans;
  };

  window.submitAnswer = function() {
    var q = getQ();
    var userAns = tidx === 2 ? document.getElementById('gInput').value.toLowerCase().trim() : sel;
    if (!userAns) return;

    var correct = false;
    if (tidx === 2) {
      var forms = (q.correct === 'gusta') ? ['gusta', 'me gusta', 'te gusta', 'le gusta', 'nos gusta', 'os gusta', 'les gusta'] : ['gustan', 'me gustan', 'te gustan', 'le gustan', 'nos gustan', 'os gustan', 'les gustan'];
      correct = forms.some(f => userAns.includes(f));
    } else {
      correct = userAns === q.correct;
    }

    score += correct ? 10 : -3;
    score = Math.max(0, score);
    document.getElementById('gScoreLabel').textContent = score;

    var msg = correct ? 'Correct! +10' : 'Wrong. -3';
    document.getElementById('gFeedback').innerHTML = '<div style="color:' + (correct ? 'var(--green)' : 'var(--red)') + ';font-weight:700">' + msg + '</div>';

    if (correct) ct[DATA.items[widx].id]++;

    document.getElementById('gamePlay').querySelector('.game-play').style.opacity = '0.6';
    setTimeout(function() {
      document.getElementById('gamePlay').querySelector('.game-play').style.opacity = '1';
      nextQuestion();
    }, 800);
  };

  window.nextQuestion = function() {
    if (score >= 100 && Object.values(ct).every(c => c > 0)) {
      document.getElementById('gamePlay').style.display = 'none';
      document.getElementById('gameCompletion').style.display = 'block';
      document.getElementById('gFinalScore').textContent = 'Score: ' + score;
      try {localStorage.setItem(DATA.storageKey + '_mastered', '1');} catch(e) {}
      return;
    }
    tidx = (tidx + 1) % types.length;
    if (tidx === 0) widx = (widx + 1) % DATA.items.length;
    document.getElementById('gFeedback').innerHTML = '';
    display();
  };

  window.game = { newGame: startGame };
  display();
});
</script>
</body>
