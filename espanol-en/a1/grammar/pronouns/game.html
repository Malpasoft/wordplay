      <p style="color:var(--muted);margin-bottom:16px">6 main pronouns × 3 question types = reach 100 points to win</p>
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:24px">Master the Spanish subject pronouns through meaning, context, and practical use.</p>
      <div id="gStartMastered" style="margin-bottom:16px"></div>

<script>
window.GAME_DATA = {
  level: 'a1',
  chapterId: 'pronouns',
  storageKey: 'game_a1_pronouns',
  items: [
    {id: 'yo', pronoun: 'yo', meaning: 'I (first person singular)', example: 'Yo trabajo aquí.', context: 'When you talk about yourself'},
    {id: 'tu', pronoun: 'tú', meaning: 'you (informal, singular)', example: 'Tú hablas español.', context: 'When talking to a friend or peer'},
    {id: 'usted', pronoun: 'usted', meaning: 'you (formal, singular)', example: 'Usted es muy amable.', context: 'When talking to a teacher or stranger'},
    {id: 'nosotros', pronoun: 'nosotros', meaning: 'we (first person plural)', example: 'Nosotros vivimos en Madrid.', context: 'When talking about a group including yourself'},
    {id: 'ellos', pronoun: 'ellos', meaning: 'they (plural, mixed or male)', example: 'Ellos son mis amigos.', context: 'When talking about multiple people'},
    {id: 'ustedes', pronoun: 'ustedes', meaning: 'you all (plural)', example: 'Ustedes hablan bien.', context: 'In Latin America for multiple people; Spain uses vosotros'}
  ]
};

var game = null;

function startGame() {
  if (game) { game.newGame(); }
  document.getElementById('gameStart').style.display = 'none';
  document.getElementById('gamePlay').style.display = 'block';
  document.getElementById('gameCompletion').style.display = 'none';
}

function backToChapter() {
  window.location.href = 'index.html';
}

document.addEventListener('DOMContentLoaded', function() {
  var DATA = window.GAME_DATA;
  var play = document.querySelector('#gamePlay .game-play');
  if (!play) return;

  var score = 0, answered = 0, won = false;
  var widx = 0, tidx = 0, sel = null;
  var ct = {};
  DATA.items.forEach(function(w){ct[w.id] = 0;});
  var types = ['significado', 'contexto', 'produccion'];

  function getQ() {
    var item = DATA.items[widx];
    var t = types[tidx];
    var q = {itemId: item.id, type: t};
    if (t === 'significado') {
      q.question = 'What does "<b>' + item.pronoun + '</b>" mean?';
      q.correct = item.meaning;
      var opts = [q.correct, 'he/she', 'you all', 'we'].sort(() => Math.random() - 0.5);
      q.options = opts.slice(0, 3);
    } else if (t === 'contexto') {
      q.question = '<i>\"' + item.example + '\"</i><br>Is the pronoun correct?';
      q.correct = 'yes';
      var opts = ['yes', 'no'].sort(() => Math.random() - 0.5);
      q.options = opts;
    } else {
      q.question = 'In this context, which pronoun fits?<br><i>' + item.context + '</i>';
      q.correct = item.pronoun;
    }
    return q;
  }

  function display() {
    var q = getQ();
    var item = DATA.items[widx];
    document.getElementById('gTerm').innerHTML = '<b>' + item.pronoun + '</b>';
    document.getElementById('gQTypeTag').textContent = tidx === 0 ? 'significado' : tidx === 1 ? 'contexto' : 'produccion';
    document.getElementById('gPrompt').innerHTML = q.question;

    if (tidx === 2) {
      document.getElementById('gOptions').style.display = 'none';
      document.getElementById('gInputWrap').style.display = 'block';
      document.getElementById('gInput').value = '';
      document.getElementById('gInput').focus();
    } else {
      document.getElementById('gOptions').style.display = 'block';
      document.getElementById('gInputWrap').style.display = 'none';
      var html = q.options.map(o => '<div style="margin-bottom:10px"><button class="match-item" onclick="selectAnswer(this, \'' + o + '\')">'+o+'</button></div>').join('');
      document.getElementById('gOptions').innerHTML = html;
      sel = null;
    }
  }

  window.selectAnswer = function(btn, ans) {
    document.querySelectorAll('.match-item').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    sel = ans;
  };

  window.submitAnswer = function() {
    var q = getQ();
    var userAns = tidx === 2 ? document.getElementById('gInput').value.toLowerCase().trim() : sel;
    if (!userAns) return;

    var correct = false;
    if (tidx === 2) {
      correct = userAns === q.correct.toLowerCase();
    } else {
      correct = userAns === q.correct;
    }

    score += correct ? 10 : -3;
    score = Math.max(0, score);
    document.getElementById('gScoreLabel').textContent = score;

    var msg = correct ? 'Correct! +10' : 'Wrong. -3';
    document.getElementById('gFeedback').innerHTML = '<div style="color:' + (correct ? 'var(--green)' : 'var(--red)') + ';font-weight:700">' + msg + '</div>';

    if (correct) ct[DATA.items[widx].id]++;

    document.getElementById('gamePlay').querySelector('.game-play').style.opacity = '0.6';
    setTimeout(function() {
      document.getElementById('gamePlay').querySelector('.game-play').style.opacity = '1';
      nextQuestion();
    }, 800);
  };

  window.nextQuestion = function() {
    if (score >= 100 && Object.values(ct).every(c => c > 0)) {
      document.getElementById('gamePlay').style.display = 'none';
      document.getElementById('gameCompletion').style.display = 'block';
      document.getElementById('gFinalScore').textContent = 'Score: ' + score;
      try {localStorage.setItem(DATA.storageKey + '_mastered', '1');} catch(e) {}
      return;
    }
    tidx = (tidx + 1) % types.length;
    if (tidx === 0) widx = (widx + 1) % DATA.items.length;
    document.getElementById('gFeedback').innerHTML = '';
    display();
  };

  window.game = { newGame: startGame };
  display();
});
</script>
</body>
