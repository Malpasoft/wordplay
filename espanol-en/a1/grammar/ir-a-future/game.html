  <h1>Ir + A (Future) — Mastery Game</h1>
  <div style="max-width:700px;margin:0 auto;padding:20px">
    <div id="gameStart" class="game-start" style="text-align:center">
      <p style="color:var(--muted);margin-bottom:16px">10 future plans × 3 question types = reach 100 points to win</p>
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:24px">Master ir + a for expressing near future plans.</p>
      <div id="gStartMastered" style="margin-bottom:16px"></div>

    </div>

    </div>

      <div style="font-size:2rem;margin-bottom:20px;color:var(--amber)">&#9670;</div>
      <div style="font-size:1.4rem;font-weight:700;margin-bottom:10px">Mastery Achieved!</div>
      <div id="gFinalScore" style="font-size:1.1rem;color:var(--muted);margin-bottom:24px">Score: 100</div>

<script>
window.GAME_DATA = {
  level: 'a1',
  chapterId: 'ir_a_future',
  storageKey: 'game_a1_ir_a_future',
  items: [
    {id: 'voy_a', form: 'yo / ir + a', meaning: 'I am going to', example: 'Voy a estudiar mañana.', accept: ['voy a', 'voy', 'voy a']},
    {id: 'vas_a', form: 'tú / ir + a', meaning: 'You are going to', example: 'Vas a viajar pronto.', accept: ['vas a', 'vas']},
    {id: 'va_a', form: 'él/ella / ir + a', meaning: 'He/she is going to', example: 'Va a trabajar hoy.', accept: ['va a', 'va']},
    {id: 'vamos_a', form: 'nosotros / ir + a', meaning: 'We are going to', example: 'Vamos a comer pizza.', accept: ['vamos a', 'vamos']},
    {id: 'van_a', form: 'ellos / ir + a', meaning: 'They are going to', example: 'Van a jugar fútbol.', accept: ['van a', 'van']},
    {id: 'preposicion', form: 'ir + ___ + infinitive', meaning: 'the preposition needed', example: 'Voy a aprender.', accept: ['a']},
    {id: 'infinitivo', form: 'infinitive forms', meaning: 'never change in ir + a', example: 'Vamos a leer y escribir.', accept: ['infinitivo', 'infinitive']},
    {id: 'negativo', form: 'negation with ir + a', meaning: 'No + ir + a + infinitive', example: 'No voy a trabajar.', accept: ['no', 'no voy']},
    {id: 'futuro_cercano', form: 'ir + a = near future', meaning: 'immediate or planned future', example: 'Voy a llegar pronto.', accept: ['near future', 'future', 'futuro']},
    {id: 'estructura', form: 'complete structure', meaning: 'all parts together', example: 'Ella va a venir mañana.', accept: ['ir + a + infinitive', 'structure']}
  ]
};

var game = null;

function startGame() {
  if (game) { game.newGame(); }
  document.getElementById('gameStart').style.display = 'none';
  document.getElementById('gamePlay').style.display = 'block';
  document.getElementById('gameCompletion').style.display = 'none';
}

function backToChapter() {
  window.location.href = 'index.html';
}

document.addEventListener('DOMContentLoaded', function() {
  var DATA = window.GAME_DATA;
  var play = document.querySelector('#gamePlay .game-play');
  if (!play) return;

  var score = 0, answered = 0, won = false;
  var widx = 0, tidx = 0, sel = null;
  var ct = {};
  DATA.items.forEach(function(w){ct[w.id] = 0;});
  var types = ['significado', 'contexto', 'produccion'];

  function getQ() {
    var item = DATA.items[widx];
    var t = types[tidx];
    var q = {itemId: item.id, type: t};
    if (t === 'significado') {
      q.question = 'What does <b>' + item.form + '</b> mean?';
      q.correct = item.meaning;
      var opts = [item.meaning, 'past action', 'regular action', 'impossible action'].sort(() => Math.random() - 0.5);
      q.options = opts;
    } else if (t === 'contexto') {
      q.question = '<i>"' + item.example + '"</i><br>Is this correct?';
      q.correct = 'yes';
      var opts = ['yes', 'no'].sort(() => Math.random() - 0.5);
      q.options = opts;
    } else {
      q.question = 'What is: <b>' + item.form + '</b>';
      q.correct = item.accept[0];
    }
    return q;
  }

  function display() {
    var q = getQ();
    var item = DATA.items[widx];
    if (!document.getElementById('gTerm')) {
      play.innerHTML = `
        <div style="padding:20px;text-align:center">
          <div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">
            <span id="gQTypeTag">significado</span> • Score: <span id="gScoreLabel">0</span>
          </div>
          <div id="gTerm" style="font-size:1.4rem;font-weight:700;margin-bottom:16px"></div>
          <div id="gPrompt" style="margin-bottom:24px;font-size:1rem"></div>
          <div id="gOptions" style="margin-bottom:24px"></div>
          <div id="gInputWrap" style="margin-bottom:24px;display:none">
            <input id="gInput" type="text" placeholder="Type answer…" style="width:100%;padding:10px;border:2px solid var(--amber);border-radius:4px;font-family:Georgia,serif;font-size:1rem">
          </div>
          <div id="gFeedback" style="margin-bottom:16px;min-height:24px"></div>
          <button onclick="submitAnswer()" class="fc-btn primary" style="padding:10px 28px">Submit</button>
        </div>
      `;
    }
    document.getElementById('gTerm').innerHTML = item.form;
    document.getElementById('gQTypeTag').textContent = tidx === 0 ? 'significado' : tidx === 1 ? 'contexto' : 'produccion';
    document.getElementById('gPrompt').innerHTML = q.question;

    if (tidx === 2) {
      document.getElementById('gOptions').style.display = 'none';
      document.getElementById('gInputWrap').style.display = 'block';
      document.getElementById('gInput').value = '';
      document.getElementById('gInput').focus();
    } else {
      document.getElementById('gOptions').style.display = 'block';
      document.getElementById('gInputWrap').style.display = 'none';
      var html = q.options.map(o => '<div style="margin-bottom:10px"><button class="match-item" onclick="selectAnswer(this, \'' + o + '\')">'+o+'</button></div>').join('');
      document.getElementById('gOptions').innerHTML = html;
      sel = null;
    }
  }

  window.selectAnswer = function(btn, ans) {
    document.querySelectorAll('.match-item').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    sel = ans;
  };

  window.submitAnswer = function() {
    var q = getQ();
    var userAns = tidx === 2 ? document.getElementById('gInput').value.toLowerCase().trim() : sel;
    if (!userAns) return;

    var correct = false;
    if (tidx === 2) {
      var normalized = userAns.replace(/[.!?,;:]/g, '').replace(/\s+/g, ' ');
      var item = DATA.items[widx];
      correct = item.accept.some(a => normalized.includes(a.toLowerCase()) || a.toLowerCase().includes(normalized));
    } else {
      correct = userAns === q.correct;
    }

    score += correct ? 10 : -3;
    score = Math.max(0, score);
    document.getElementById('gScoreLabel').textContent = score;

    var msg = correct ? 'Correct! +10' : 'Wrong. -3';
    document.getElementById('gFeedback').innerHTML = '<div style="color:' + (correct ? 'var(--green)' : 'var(--red)') + ';font-weight:700">' + msg + '</div>';

    if (correct) ct[DATA.items[widx].id]++;

    document.getElementById('gamePlay').querySelector('.game-play').style.opacity = '0.6';
    setTimeout(function() {
      document.getElementById('gamePlay').querySelector('.game-play').style.opacity = '1';
      nextQuestion();
    }, 800);
  };

  window.nextQuestion = function() {
    if (score >= 100 && Object.values(ct).every(c => c > 0)) {
      document.getElementById('gamePlay').style.display = 'none';
      document.getElementById('gameCompletion').style.display = 'block';
      document.getElementById('gFinalScore').textContent = 'Score: ' + score;
      try {localStorage.setItem(DATA.storageKey + '_mastered', '1');} catch(e) {}
      return;
    }
    tidx = (tidx + 1) % types.length;
    if (tidx === 0) widx = (widx + 1) % DATA.items.length;
    document.getElementById('gFeedback').innerHTML = '';
    display();
  };

  window.game = { newGame: startGame };
  display();
});
</script>
</body>
