      <p style="color:var(--muted);margin-bottom:16px">8 articles × 3 question types = reach 100 points to win</p>
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:24px">Master definite and indefinite articles through gender, agreement, and context.</p>

<script>
window.GAME_DATA = {
  level: 'a1',
  chapterId: 'articles',
  storageKey: 'game_a1_articles',
  items: [
    {id: 'el', article: 'el (definite, m. sing.)', example: 'el gato', context: 'masculine singular noun', correct: 'el'},
    {id: 'la', article: 'la (definite, f. sing.)', example: 'la puerta', context: 'feminine singular noun', correct: 'la'},
    {id: 'los', article: 'los (definite, m. plural)', example: 'los libros', context: 'masculine plural nouns', correct: 'los'},
    {id: 'las', article: 'las (definite, f. plural)', example: 'las niñas', context: 'feminine plural nouns', correct: 'las'},
    {id: 'un', article: 'un (indefinite, m. sing.)', example: 'un lápiz', context: 'masculine singular indefinite', correct: 'un'},
    {id: 'una', article: 'una (indefinite, f. sing.)', example: 'una mesa', context: 'feminine singular indefinite', correct: 'una'},
    {id: 'unos', article: 'unos (indefinite, m. plural)', example: 'unos niños', context: 'masculine plural indefinite', correct: 'unos'},
    {id: 'unas', article: 'unas (indefinite, f. plural)', example: 'unas sillas', context: 'feminine plural indefinite', correct: 'unas'}
  ]
};

function startGame() {
  document.getElementById('gameStart').style.display = 'none';
  document.getElementById('gamePlay').style.display = 'block';
}

function backToChapter() {
  window.location.href = 'index.html';
}

document.addEventListener('DOMContentLoaded', function() {
  var DATA = window.GAME_DATA;
  var play = document.querySelector('#gamePlay .game-play');
  if (!play) return;

  var score = 0, widx = 0, tidx = 0, sel = null;
  var ct = {};
  DATA.items.forEach(function(w){ct[w.id] = 0;});
  var types = ['significado', 'contexto', 'produccion'];

  function getQ() {
    var item = DATA.items[widx];
    var t = types[tidx];
    var q = {itemId: item.id, type: t};
    if (t === 'significado') {
      q.question = 'What does "<b>' + item.article + '</b>" mean?';
      q.correct = item.example;
      q.options = [item.example, 'different article', 'wrong form'].sort(() => Math.random() - 0.5).slice(0, 2);
      q.options.push('(check meaning)');
    } else if (t === 'contexto') {
      q.question = 'Which article fits? Context: ' + item.context;
      q.correct = item.correct;
      var all = DATA.items.map(x => x.correct);
      q.options = [item.correct, all.filter(x => x !== item.correct)[0], all.filter(x => x !== item.correct)[1]].sort(() => Math.random() - 0.5);
    } else {
      q.question = 'Complete: "<b>' + item.article + '</b>"';
      q.correct = item.correct;
    }
    return q;
  }

  function display() {
    var q = getQ();
    document.getElementById('gTerm').innerHTML = DATA.items[widx].article;
    document.getElementById('gQTypeTag').textContent = tidx === 0 ? 'significado' : tidx === 1 ? 'contexto' : 'produccion';
    document.getElementById('gPrompt').innerHTML = q.question;

    if (tidx === 2) {
      document.getElementById('gOptions').style.display = 'none';
      document.getElementById('gInputWrap').style.display = 'block';
      document.getElementById('gInput').value = '';
      document.getElementById('gInput').focus();
    } else {
      document.getElementById('gOptions').style.display = 'block';
      document.getElementById('gInputWrap').style.display = 'none';
      var html = q.options.slice(0, 3).map(o => '<div style="margin-bottom:10px"><button class="match-item" onclick="selectAnswer(this, \'' + o + '\')">'+o+'</button></div>').join('');
      document.getElementById('gOptions').innerHTML = html;
      sel = null;
    }
  }

  window.selectAnswer = function(btn, ans) {
    document.querySelectorAll('.match-item').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    sel = ans;
  };

  window.submitAnswer = function() {
    var q = getQ();
    var userAns = tidx === 2 ? document.getElementById('gInput').value.toLowerCase().trim() : sel;
    if (!userAns) return;

    var correct = userAns === q.correct || (tidx === 0 && userAns.includes(q.correct));
    score += correct ? 10 : -3;
    score = Math.max(0, score);
    document.getElementById('gScoreLabel').textContent = score;

    var msg = correct ? 'Correct! +10' : 'Wrong. -3';
    document.getElementById('gFeedback').innerHTML = '<div style="color:' + (correct ? 'var(--green)' : 'var(--red)') + ';font-weight:700">' + msg + '</div>';

    if (correct) ct[DATA.items[widx].id]++;

    document.getElementById('gamePlay').querySelector('.game-play').style.opacity = '0.6';
    setTimeout(function() {
      document.getElementById('gamePlay').querySelector('.game-play').style.opacity = '1';
      nextQuestion();
    }, 800);
  };

  window.nextQuestion = function() {
    if (score >= 100 && Object.values(ct).every(c => c > 0)) {
      document.getElementById('gamePlay').style.display = 'none';
      document.getElementById('gameCompletion').style.display = 'block';
      document.getElementById('gFinalScore').textContent = 'Score: ' + score;
      try {localStorage.setItem(DATA.storageKey + '_mastered', '1');} catch(e) {}
      return;
    }
    tidx = (tidx + 1) % types.length;
    if (tidx === 0) widx = (widx + 1) % DATA.items.length;
    document.getElementById('gFeedback').innerHTML = '';
    display();
  };

  display();
});
</script>
</body>
