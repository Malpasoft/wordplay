      <p style="color:var(--muted);margin-bottom:16px">8 command forms × 3 question types = reach 100 points to win</p>
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:24px">Master tú, formal usted, and ustedes commands through context and production.</p>

<script>
window.GAME_DATA = {
  level: 'a1',
  chapterId: 'basic_commands',
  storageKey: 'game_a1_basic_commands',
  items: [
    {id: 'tu_hablar', form: 'hablar (tú)', example: 'Tell a friend to speak', correct: 'habla', forms: ['habla', 'hablas', 'hables']},
    {id: 'tu_negative', form: 'negative tú comer', example: "Tell a friend NOT to eat", correct: 'no comas', forms: ['no comas', 'no comes', 'no coma']},
    {id: 'usted_venir', form: 'venir (usted)', example: 'Tell a teacher to come', correct: 'venga', forms: ['venga', 'vienes', 'viene']},
    {id: 'ustedes_escribir', form: 'escribir (ustedes)', example: 'Tell a class to write', correct: 'escriban', forms: ['escriban', 'escriben', 'escriben']},
    {id: 'let_us_hablar', form: 'let us hablar', example: "Say let's speak", correct: 'hablemos', forms: ['hablemos', 'hablamos', 'hablen']},
    {id: 'tu_hacer', form: 'hacer (tú irregular)', example: 'Tell a friend to do it', correct: 'haz', forms: ['haz', 'has', 'hace']},
    {id: 'formal_ir', form: 'ir (usted formal)', example: 'Tell someone to go', correct: 'vaya', forms: ['vaya', 'va', 'voy']},
    {id: 'ustedes_negative', form: 'negative ustedes beber', example: "Tell a group not to drink", correct: 'no beban', forms: ['no beban', 'no beben', 'no beba']}
  ]
};

function startGame() {
  document.getElementById('gameStart').style.display = 'none';
  document.getElementById('gamePlay').style.display = 'block';
  document.getElementById('gameCompletion').style.display = 'none';
}

function backToChapter() {
  window.location.href = 'index.html';
}

document.addEventListener('DOMContentLoaded', function() {
  var DATA = window.GAME_DATA;
  var play = document.querySelector('#gamePlay .game-play');
  if (!play) return;

  var score = 0, widx = 0, tidx = 0, sel = null;
  var ct = {};
  DATA.items.forEach(function(w){ct[w.id] = 0;});
  var types = ['significado', 'contexto', 'produccion'];

  function getQ() {
    var item = DATA.items[widx];
    var t = types[tidx];
    var q = {itemId: item.id, type: t};
    if (t === 'significado') {
      q.question = '<b>' + item.form + ':</b> Which is the correct form?';
      q.correct = item.correct;
      q.options = item.forms.sort(() => Math.random() - 0.5);
    } else if (t === 'contexto') {
      q.question = '<i>"' + item.example + '"</i><br>Which form?';
      q.correct = item.correct;
      q.options = item.forms.sort(() => Math.random() - 0.5);
    } else {
      q.question = 'Produce: <b>' + item.form + '</b>';
      q.correct = item.correct;
    }
    return q;
  }

  function display() {
    var q = getQ();
    document.getElementById('gTerm').innerHTML = DATA.items[widx].form;
    document.getElementById('gQTypeTag').textContent = tidx === 0 ? 'significado' : tidx === 1 ? 'contexto' : 'produccion';
    document.getElementById('gPrompt').innerHTML = q.question;

    if (tidx === 2) {
      document.getElementById('gOptions').style.display = 'none';
      document.getElementById('gInputWrap').style.display = 'block';
      document.getElementById('gInput').value = '';
      document.getElementById('gInput').focus();
    } else {
      document.getElementById('gOptions').style.display = 'block';
      document.getElementById('gInputWrap').style.display = 'none';
      var html = q.options.map(o => '<div style="margin-bottom:10px"><button class="match-item" onclick="selectAnswer(this, \'' + o + '\')">'+o+'</button></div>').join('');
      document.getElementById('gOptions').innerHTML = html;
      sel = null;
    }
  }

  window.selectAnswer = function(btn, ans) {
    document.querySelectorAll('.match-item').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    sel = ans;
  };

  window.submitAnswer = function() {
    var q = getQ();
    var userAns = tidx === 2 ? document.getElementById('gInput').value.toLowerCase().trim() : sel;
    if (!userAns) return;

    var correct = userAns === q.correct;
    score += correct ? 10 : -3;
    score = Math.max(0, score);
    document.getElementById('gScoreLabel').textContent = score;

    var msg = correct ? 'Correct! +10' : 'Wrong. -3';
    document.getElementById('gFeedback').innerHTML = '<div style="color:' + (correct ? 'var(--green)' : 'var(--red)') + ';font-weight:700">' + msg + '</div>';

    if (correct) ct[DATA.items[widx].id]++;

    document.getElementById('gamePlay').querySelector('.game-play').style.opacity = '0.6';
    setTimeout(function() {
      document.getElementById('gamePlay').querySelector('.game-play').style.opacity = '1';
      nextQuestion();
    }, 800);
  };

  window.nextQuestion = function() {
    if (score >= 100 && Object.values(ct).every(c => c > 0)) {
      document.getElementById('gamePlay').style.display = 'none';
      document.getElementById('gameCompletion').style.display = 'block';
      document.getElementById('gFinalScore').textContent = 'Score: ' + score;
      try {localStorage.setItem(DATA.storageKey + '_mastered', '1');} catch(e) {}
      return;
    }
    tidx = (tidx + 1) % types.length;
    if (tidx === 0) widx = (widx + 1) % DATA.items.length;
    document.getElementById('gFeedback').innerHTML = '';
    display();
  };

  display();
});
</script>
</body>
</html>
