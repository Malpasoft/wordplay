    <div id="gameStart" style="text-align:center">
      <p style="color:var(--muted);margin-bottom:16px">10 questions &middot; reach 100 points to win</p>
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:24px">A las tres, por la ma&ntilde;ana, en verano, desde 2020 &mdash; master the little words that place events in time.</p>
      <button id="gBtnStart" class="fc-btn primary" style="padding:12px 32px" onclick="startGame()">Start Game</button>

<script>
window.GAME_DATA = {
  level: 'a1',
  chapterId: 'prepositions-time',
  storageKey: 'game_a1_prepositions_time',
  items: [
  {
    "id": "g1",
    "question": "\"at three o'clock\":",
    "options": [
      "a las tres",
      "en las tres",
      "por las tres"
    ],
    "correct": "a las tres"
  },
  {
    "id": "g2",
    "question": "\"at one o'clock\":",
    "options": [
      "a la una",
      "a las una",
      "en la una"
    ],
    "correct": "a la una"
  },
  {
    "id": "g3",
    "question": "\"in the evening\" (no hour):",
    "options": [
      "por la noche",
      "de la noche",
      "a la noche"
    ],
    "correct": "por la noche"
  },
  {
    "id": "g4",
    "question": "\"in July\":",
    "options": [
      "en julio",
      "a julio",
      "por julio"
    ],
    "correct": "en julio"
  },
  {
    "id": "g5",
    "question": "\"on Friday\":",
    "options": [
      "el viernes",
      "en viernes",
      "a viernes"
    ],
    "correct": "el viernes"
  },
  {
    "id": "g6",
    "question": "\"in winter\":",
    "options": [
      "en invierno",
      "por invierno",
      "al invierno"
    ],
    "correct": "en invierno"
  },
  {
    "id": "g7",
    "question": "\"until ten\":",
    "options": [
      "hasta las diez",
      "desde las diez",
      "por las diez"
    ],
    "correct": "hasta las diez"
  },
  {
    "id": "g8",
    "question": "\"since 2020\":",
    "options": [
      "desde 2020",
      "hasta 2020",
      "durante 2020"
    ],
    "correct": "desde 2020"
  },
  {
    "id": "g9",
    "question": "\"after work\":",
    "options": [
      "despu&eacute;s del trabajo",
      "despu&eacute;s el trabajo",
      "despu&eacute;s en trabajo"
    ],
    "correct": "despu&eacute;s del trabajo"
  },
  {
    "id": "g10",
    "question": "\"at seven in the morning\":",
    "options": [
      "a las siete de la ma&ntilde;ana",
      "a las siete por la ma&ntilde;ana",
      "en las siete de la ma&ntilde;ana"
    ],
    "correct": "a las siete de la ma&ntilde;ana"
  }
]
};

var gQueue = [], gScore = 0, gStreak = 0, gAnswered = 0, gLock = false;

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function startGame() {
  document.getElementById('gameStart').style.display = 'none';
  document.getElementById('gamePlay').style.display = 'block';
  gQueue = shuffle(window.GAME_DATA.items.slice());
  gScore = 0; gStreak = 0; gAnswered = 0;
  renderQ();
}

function renderQ() {
  var q = gQueue[0];
  var play = document.getElementById('gamePlay');
  var opts = shuffle(q.options.slice());
  var btns = opts.map(function(o) {
    return '<button class="fc-btn" style="display:block;width:100%;padding:12px;margin-bottom:8px;text-align:left;text-transform:none;letter-spacing:0;font-size:.95rem" onclick="answerQ(this)">' + o + '</button>';
  }).join('');
  play.innerHTML = '<div style="padding:10px 0">'
    + '<div style="font-family:var(--font-sans);font-size:.75rem;color:var(--muted);margin-bottom:6px">Score: ' + gScore + ' &middot; ' + gAnswered + ' / ' + window.GAME_DATA.items.length + ' answered</div>'
    + '<div style="font-size:1.05rem;margin-bottom:18px">' + q.question + '</div>'
    + btns
    + '<div id="gFeedback" style="min-height:24px;font-size:.85rem;margin-top:8px"></div></div>';
  gLock = false;
}

function answerQ(btn) {
  if (gLock) return;
  gLock = true;
  var q = gQueue[0];
  var ans = btn.textContent.trim();
  var fb = document.getElementById('gFeedback');
  if (ans === q.correct) {
    gStreak++;
    gScore += 10 + (gStreak >= 3 ? 3 : 0);
    gAnswered++;
    gQueue.shift();
    fb.style.color = 'var(--amber)';
    fb.textContent = 'Correct! +' + (gStreak >= 3 ? 13 : 10) + ' points';
  } else {
    gStreak = 0;
    gScore = Math.max(0, gScore - 3);
    gQueue.push(gQueue.shift());
    fb.style.color = 'var(--muted)';
    fb.textContent = 'Not quite. The answer was: ' + q.correct + ' (requeued, -3 points)';
  }
  setTimeout(function() {
    if (gQueue.length === 0) { endGame(); } else { renderQ(); }
  }, 1100);
}

function endGame() {
  document.getElementById('gamePlay').style.display = 'none';
  document.getElementById('gameCompletion').style.display = 'block';
  var pct = Math.min(gScore, 100);
  document.getElementById('gFinalScore').textContent = 'Score: ' + pct;
  try {
    var lv = JSON.parse(localStorage.getItem('wordplay_progress') || '{}');
    if (!lv.a1) lv.a1 = {};
    lv.a1['wordplay_game_' + window.GAME_DATA.chapterId] = { pct: pct, date: new Date().toISOString() };
    localStorage.setItem('wordplay_progress', JSON.stringify(lv));
  } catch (e) {}
}
</script>
