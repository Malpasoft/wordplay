var WORDS = [{"word": "bedroom", "ipa": "\u02c8b\u025bdrum", "def": "dormitorio", "ex": "My bedroom is upstairs."}, {"word": "kitchen", "ipa": "\u02c8k\u026at\u0283\u0259n", "def": "cocina", "ex": "We cook in the kitchen."}, {"word": "bathroom", "ipa": "\u02c8b\u00e6\u03b8rum", "def": "ba\u00f1o", "ex": "The bathroom is clean."}, {"word": "living room", "ipa": "\u02c8l\u026av\u026a\u014b rum", "def": "sala de estar", "ex": "We sit in the living room."}, {"word": "door", "ipa": "d\u0254\u02d0r", "def": "puerta", "ex": "Close the door."}, {"word": "window", "ipa": "\u02c8w\u026ando\u028a", "def": "ventana", "ex": "Open the window."}, {"word": "table", "ipa": "\u02c8te\u026ab\u0259l", "def": "mesa", "ex": "Sit at the table."}, {"word": "chair", "ipa": "t\u0283\u025br", "def": "silla", "ex": "This chair is comfortable."}, {"word": "bed", "ipa": "b\u025bd", "def": "cama", "ex": "My bed is soft."}, {"word": "sofa", "ipa": "\u02c8so\u028af\u0259", "def": "sof\u00e1", "ex": "Sit on the sofa."}];
var SLUG = 'house-and-home';
var LEVEL = 'a1';

document.getElementById('vocab-list').innerHTML = WORDS.map((w, i) => 
  '<div style="padding:10px; border-bottom:1px solid #ddd">' +

  '<em>' + w.ipa + '</em><br>' +
  w.ex + '</div>'

</script>
