<h1>Places In Town</h1>

</div>
<script src="../../../../shared/store.js?v=v107"></script>
<script>
var WORDS = [{"word": "school", "ipa": "skul", "def": "escuela", "ex": "I go to school."}, {"word": "hospital", "ipa": "\u02c8h\u0251\u02d0sp\u026at\u0259l", "def": "hospital", "ex": "She works at the hospital."}, {"word": "restaurant", "ipa": "\u02c8r\u025bst\u0259r\u0251\u02d0nt", "def": "restaurante", "ex": "Let's go to a restaurant."}, {"word": "supermarket", "ipa": "\u02c8sup\u0259r\u02ccm\u0251\u02d0rk\u026at", "def": "supermercado", "ex": "I shop at the supermarket."}, {"word": "park", "ipa": "p\u0251\u02d0rk", "def": "parque", "ex": "Let's go to the park."}, {"word": "church", "ipa": "t\u0283\u025c\u02d0rt\u0283", "def": "iglesia", "ex": "We go to church."}, {"word": "bank", "ipa": "b\u00e6\u014bk", "def": "banco", "ex": "I go to the bank."}, {"word": "post office", "ipa": "po\u028ast \u02c8\u0251\u02d0f\u026as", "def": "correo", "ex": "I send a letter at the post office."}, {"word": "library", "ipa": "\u02c8la\u026abreri", "def": "biblioteca", "ex": "I read at the library."}, {"word": "market", "ipa": "\u02c8m\u0251\u02d0rk\u026at", "def": "mercado", "ex": "We go to the market."}];
var SLUG = 'places-in-town';
var LEVEL = 'a1';
var MASTERY_KEY = 'wordplay_vocab_a1_' + SLUG + '_mastered';
document.getElementById('vocab-list').innerHTML = WORDS.map((w, i) => 
  '<div style="padding:10px; border-bottom:1px solid #ddd">' +
  '<strong>' + w.word + '</strong> - ' + w.def + '<br>' +
  '<em>' + w.ipa + '</em><br>' +
  w.ex + '</div>'
).join('');
</script>
</body>
