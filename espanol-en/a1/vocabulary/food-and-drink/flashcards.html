<div style="padding:20px">
<h1>Food And Drink</h1>
<div id="vocab-list"></div>
</div>
<script src="../../../../shared/store.js?v=v107"></script>
<script>
var WORDS = [{"word": "apple", "ipa": "\u02c8\u00e6p\u0259l", "def": "manzana", "ex": "I like red apples."}, {"word": "bread", "ipa": "br\u025bd", "def": "pan", "ex": "I eat bread for breakfast."}, {"word": "milk", "ipa": "m\u026alk", "def": "leche", "ex": "I drink milk."}, {"word": "water", "ipa": "\u02c8w\u0254\u02d0t\u0259r", "def": "agua", "ex": "Drink water."}, {"word": "coffee", "ipa": "\u02c8k\u0254\u02d0fi", "def": "caf\u00e9", "ex": "I drink coffee."}, {"word": "rice", "ipa": "ra\u026as", "def": "arroz", "ex": "She cooks rice."}, {"word": "chicken", "ipa": "\u02c8t\u0283\u026ak\u0259n", "def": "pollo", "ex": "I eat chicken."}, {"word": "fish", "ipa": "f\u026a\u0283", "def": "pescado", "ex": "Fish is healthy."}, {"word": "vegetables", "ipa": "\u02c8v\u025bd\u0292t\u0259b\u0259lz", "def": "verduras", "ex": "Eat your vegetables."}, {"word": "fruit", "ipa": "frut", "def": "fruta", "ex": "I like fruit."}];
var SLUG = 'food-and-drink';
var LEVEL = 'a1';
var MASTERY_KEY = 'wordplay_vocab_a1_' + SLUG + '_mastered';
document.getElementById('vocab-list').innerHTML = WORDS.map((w, i) => 
  '<div style="padding:10px; border-bottom:1px solid #ddd">' +
  '<strong>' + w.word + '</strong> - ' + w.def + '<br>' +
  '<em>' + w.ipa + '</em><br>' +
  w.ex + '</div>'
).join('');
</script>
</body>
