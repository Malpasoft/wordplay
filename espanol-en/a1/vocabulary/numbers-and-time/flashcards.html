<div style="padding:20px">
<h1>Numbers And Time</h1>
<div id="vocab-list"></div>
</div>
<script src="../../../../shared/store.js?v=v107"></script>
<script>
var WORDS = [{"word": "one", "ipa": "w\u028cn", "def": "uno", "ex": "I have one apple."}, {"word": "two", "ipa": "tu", "def": "dos", "ex": "I have two cats."}, {"word": "three", "ipa": "\u03b8ri", "def": "tres", "ex": "I have three dogs."}, {"word": "ten", "ipa": "t\u025bn", "def": "diez", "ex": "There are ten students."}, {"word": "hour", "ipa": "\u02c8a\u028a\u0259r", "def": "hora", "ex": "One hour has passed."}, {"word": "minute", "ipa": "\u02c8m\u026an\u026at", "def": "minuto", "ex": "Wait a minute."}, {"word": "morning", "ipa": "\u02c8m\u0254\u02d0rn\u026a\u014b", "def": "ma\u00f1ana", "ex": "Good morning!"}, {"word": "afternoon", "ipa": "\u02cc\u00e6ft\u0259r\u02c8nun", "def": "tarde", "ex": "Good afternoon."}, {"word": "evening", "ipa": "\u02c8ivn\u026a\u014b", "def": "noche", "ex": "Good evening."}, {"word": "night", "ipa": "na\u026at", "def": "noche", "ex": "Good night."}];
var SLUG = 'numbers-and-time';
var LEVEL = 'a1';
var MASTERY_KEY = 'wordplay_vocab_a1_' + SLUG + '_mastered';
document.getElementById('vocab-list').innerHTML = WORDS.map((w, i) => 
  '<div style="padding:10px; border-bottom:1px solid #ddd">' +
  '<strong>' + w.word + '</strong> - ' + w.def + '<br>' +
  '<em>' + w.ipa + '</em><br>' +
  w.ex + '</div>'
).join('');
</script>
