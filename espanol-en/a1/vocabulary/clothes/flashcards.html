var WORDS = [{"word": "shirt", "ipa": "\u0283\u025c\u02d0rt", "def": "camisa", "ex": "He wears a blue shirt."}, {"word": "pants", "ipa": "p\u00e6nts", "def": "pantalones", "ex": "These pants fit well."}, {"word": "dress", "ipa": "dr\u025bs", "def": "vestido", "ex": "She wore a red dress."}, {"word": "shoes", "ipa": "\u0283uz", "def": "zapatos", "ex": "My shoes are black."}, {"word": "hat", "ipa": "h\u00e6t", "def": "sombrero", "ex": "He wears a hat."}, {"word": "jacket", "ipa": "\u02c8d\u0292\u00e6k\u026at", "def": "chaqueta", "ex": "I need a jacket."}, {"word": "socks", "ipa": "s\u0251\u02d0ks", "def": "calcetines", "ex": "Where are my socks?"}, {"word": "skirt", "ipa": "sk\u025c\u02d0rt", "def": "falda", "ex": "She wears a short skirt."}, {"word": "coat", "ipa": "ko\u028at", "def": "abrigo", "ex": "Wear a coat."}, {"word": "sweater", "ipa": "\u02c8sw\u025bt\u0259r", "def": "su\u00e9ter", "ex": "This sweater is warm."}];
var SLUG = 'clothes';
var LEVEL = 'a1';
var MASTERY_KEY = 'wordplay_vocab_a1_' + SLUG + '_mastered';
document.getElementById('vocab-list').innerHTML = WORDS.map((w, i) => 
  '<div style="padding:10px; border-bottom:1px solid #ddd">' +
  '<strong>' + w.word + '</strong> - ' + w.def + '<br>' +
  '<em>' + w.ipa + '</em><br>' +
  w.ex + '</div>'
).join('');
</script>
