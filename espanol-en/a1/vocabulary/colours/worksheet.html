  <div style="max-width:700px;margin:0 auto;padding:20px">
    <form id="quizForm" onsubmit="showAns(event)">
      <div style="margin-bottom:24px;padding:16px;border:1px solid var(--hairline);border-radius:6px">
        <div style="font-weight:700;margin-bottom:8px">1. Translate: "father"</div>
        <input type="text" name="q1" placeholder="Answer…" style="width:100%;padding:8px;border:1px solid var(--hairline);border-radius:4px;font-family:Georgia,serif">
        <div id="e1" style="font-size:.85rem;color:var(--muted);display:none;margin-top:8px"><b>Answer:</b> padre</div>
      </div>
      <div style="margin-bottom:24px;padding:16px;border:1px solid var(--hairline);border-radius:6px">
        <div style="font-weight:700;margin-bottom:8px">2. What color is the sky?</div>
        <select name="q2" style="width:100%;padding:8px;border:1px solid var(--hairline);border-radius:4px"><option value="">-- Choose --</option><option value="azul">azul (blue)</option><option value="rojo">rojo (red)</option><option value="verde">verde (green)</option></select>
        <div id="e2" style="font-size:.85rem;color:var(--muted);display:none;margin-top:8px"><b>Answer:</b> azul</div>
      </div>
      <div style="margin-bottom:24px;padding:16px;border:1px solid var(--hairline);border-radius:6px">
        <div style="font-weight:700;margin-bottom:8px">3. Complete: El ___ es el rey de la selva.</div>
        <input type="text" name="q3" placeholder="Answer…" style="width:100%;padding:8px;border:1px solid var(--hairline);border-radius:4px;font-family:Georgia,serif">
        <div id="e3" style="font-size:.85rem;color:var(--muted);display:none;margin-top:8px"><b>Answer:</b> león</div>
      </div>
      <div style="text-align:center"><button type="submit" class="fc-btn primary" style="padding:12px 32px">Check Answers</button></div>
    </form>
