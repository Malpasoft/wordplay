</div>
<script src="../../../../shared/store.js?v=v107"></script>
<script>
var WORDS = [{"word": "teacher", "ipa": "\u02c8tit\u0283\u0259r", "def": "profesor", "ex": "She is a teacher."}, {"word": "doctor", "ipa": "\u02c8d\u0251\u02d0kt\u0259r", "def": "m\u00e9dico", "ex": "He is a doctor."}, {"word": "nurse", "ipa": "n\u025c\u02d0rs", "def": "enfermera", "ex": "She works as a nurse."}, {"word": "farmer", "ipa": "\u02c8f\u0251\u02d0rm\u0259r", "def": "granjero", "ex": "He is a farmer."}, {"word": "baker", "ipa": "\u02c8be\u026ak\u0259r", "def": "panadero", "ex": "She is a baker."}, {"word": "chef", "ipa": "\u0283\u025bf", "def": "chef", "ex": "He is a chef."}, {"word": "police officer", "ipa": "p\u0259\u02c8lis \u02c8\u0254\u02d0f\u026as\u0259r", "def": "polic\u00eda", "ex": "She is a police officer."}, {"word": "firefighter", "ipa": "\u02c8fa\u026arfa\u026at\u0259r", "def": "bombero", "ex": "He is a firefighter."}, {"word": "engineer", "ipa": "\u02cc\u025bnd\u0292\u026a\u02c8n\u026ar", "def": "ingeniero", "ex": "She is an engineer."}, {"word": "artist", "ipa": "\u02c8\u0251\u02d0rt\u026ast", "def": "artista", "ex": "He is an artist."}];
var SLUG = 'jobs-and-occupations';
var LEVEL = 'a1';
var MASTERY_KEY = 'wordplay_vocab_a1_' + SLUG + '_mastered';
document.getElementById('vocab-list').innerHTML = WORDS.map((w, i) => 
  '<div style="padding:10px; border-bottom:1px solid #ddd">' +
  '<strong>' + w.word + '</strong> - ' + w.def + '<br>' +
  '<em>' + w.ipa + '</em><br>' +
  w.ex + '</div>'
).join('');
</script>
