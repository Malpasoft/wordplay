    <div id="gameArea" style="border:2px solid var(--hairline);border-radius:8px;padding:20px;background:var(--paper);margin-bottom:20px"><div style="margin-bottom:16px"><div id="wordDisplay" style="font-size:1.8rem;font-weight:700;text-align:center;margin-bottom:10px"></div><div id="questionType" style="font-family:var(--font-sans);font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:16px"></div></div><div id="optionsArea"></div><div style="text-align:center;margin-top:16px"><button class="fc-btn primary" onclick="submitAnswer()" id="submitBtn">Submit</button></div></div>

<script>
var SLUG = 'adjectives-feelings';
var WORDS = [{"word": "feliz", "ipa": "feˈliθ", "def": "happy", "ex": "Hoy estoy muy <b>feliz</b>."}, {"word": "triste", "ipa": "ˈtɾiste", "def": "sad", "ex": "Está <b>triste</b> por la noticia."}, {"word": "cansado", "ipa": "kanˈsaðo", "def": "tired", "ex": "Estoy <b>cansado</b> después del trabajo."}, {"word": "contento", "ipa": "konˈtento", "def": "pleased / glad", "ex": "Estamos <b>contentos</b> con el resultado."}];
var types = ['meaning', 'context', 'production'];
var score = 0, answered = 0, won = false;
var widx = 0, tidx = 0, sel = null;
var ct = {};
WORDS.forEach(function(w){ct[w.word] = 0;});

function getQ() {
  var w = WORDS[widx];
  var t = types[tidx];
  var q = {word: w.word, type: t};
  if (t === 'meaning') {
    q.question = 'What does <b>' + w.word + '</b> mean?';
    q.correct = w.def;
    var opts = [q.correct].concat(WORDS.filter(x => x.word !== w.word).map(x => x.def).slice(0, 3));
    q.options = opts.sort(() => Math.random() - 0.5);
  } else {
    q.question = 'Translate to Spanish: ' + w.def;
    q.correct = w.word;
    var opts = [q.correct].concat(WORDS.filter(x => x.word !== w.word).map(x => x.word).slice(0, 3));
    q.options = opts.sort(() => Math.random() - 0.5);
  }
  return q;
}

function display() {
  var q = getQ();
  document.getElementById('wordDisplay').innerHTML = q.question;
  document.getElementById('questionType').textContent = q.type;
  var html = q.options.map(o => '<div style="margin-bottom:10px"><button class="match-item" onclick="selectAnswer(this, \'' + o + '\')">'+o+'</button></div>').join('');
  document.getElementById('optionsArea').innerHTML = html;
  sel = null;
}

function selectAnswer(btn, ans) {
  document.querySelectorAll('.match-item').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  sel = ans;
}

function submitAnswer() {
  if (!sel) return;
  var q = getQ();
  var ok = sel === q.correct;
  score += ok ? 10 : -3;
  score = Math.max(0, score);
  document.getElementById('score').textContent = 'Score: ' + score + ' / 100';
  document.getElementById('resultMessage').textContent = ok ? 'Correct! +10' : 'Wrong';
  document.getElementById('resultMessage').style.color = ok ? 'var(--green)' : 'var(--red)';
  if (ok) ct[q.word]++;
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('resultArea').style.display = 'block';
  if (score >= 100 && Object.values(ct).every(c => c > 0)) {
    won = true;
  }
}

function nextQuestion() {
  if (won) {
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('winArea').style.display = 'block';
    try {localStorage.setItem('wordplay_vocab_a1_' + SLUG + '_mastered', '1');} catch(e) {}
    return;
  }
  tidx = (tidx + 1) % types.length;
  if (tidx === 0) widx = (widx + 1) % WORDS.length;
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('gameArea').style.display = 'block';
  display();
}

display();
</script>
