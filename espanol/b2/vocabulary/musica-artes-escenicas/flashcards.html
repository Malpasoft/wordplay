.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;border:1px solid var(--hairline)}

.fc-audio:hover{border-color:var(--amber);color:var(--amber)}
.fc-nav{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:20px}
.fc-btn{font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;border-radius:4px;cursor:pointer;border:1.5px solid var(--hairline);background:transparent;color:var(--ink)}
.fc-btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.fc-counter{font-family:var(--font-sans);font-size:.75rem;color:var(--muted);font-weight:600}
.mastery-badge{display:inline-block;padding:8px 18px;background:rgba(184,134,11,.12);color:var(--amber);font-family:var(--font-sans);font-size:.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:4px;margin-bottom:16px}

<h1>Música y Artes Escénicas</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "sinfonía", "ipa": "simˈfonja", "def": "composición musical extensa para orquesta, generalmente en cuatro movimientos", "ex": "La <b>sinfonía</b> número nueve de Beethoven es una de las más famosas."}, {"word": "ópera", "ipa": "ˈopera", "def": "obra dramática cantada con acompañamiento orquestal", "ex": "La <b>ópera</b> combina música, teatro y escenografía."}, {"word": "partitura", "ipa": "partiˈtura", "def": "texto musical en el que se representan todas las notas e indicaciones de la obra", "ex": "El director estudió la <b>partitura</b> antes del ensayo."}, {"word": "improvisación", "ipa": "improβisaˈθjon", "def": "ejecución musical o teatral espontánea sin preparación previa", "ex": "El guitarrista de jazz destacó por su <b>improvisación</b>."}, {"word": "percusión", "ipa": "perkuˈsjon", "def": "conjunto de instrumentos musicales que se tocan golpeándolos", "ex": "Los instrumentos de <b>percusión</b> marcan el ritmo de la banda."}, {"word": "ensayo", "ipa": "enˈsaʝo", "def": "práctica o preparación de una obra antes de la actuación en público", "ex": "El coro tiene <b>ensayo</b> todos los jueves por la tarde."}, {"word": "escenografía", "ipa": "esθenoɣraˈfia", "def": "conjunto de elementos visuales que crean el ambiente de una obra teatral", "ex": "La <b>escenografía</b> de la obra era sencilla pero muy efectiva."}, {"word": "flamenco", "ipa": "flaˈmeŋko", "def": "arte andaluz que combina cante, baile y guitarra", "ex": "El <b>flamenco</b> es Patrimonio Cultural Inmaterial de la Humanidad."}, {"word": "coreografía", "ipa": "koreɣraˈfia", "def": "diseño y combinación de los movimientos de una danza", "ex": "La <b>coreografía</b> del espectáculo fue espectacular."}, {"word": "vanguardista", "ipa": "banɡwarˈðista", "def": "que pertenece o sigue las tendencias más innovadoras y experimentales", "ex": "La compañía teatral propone un montaje muy <b>vanguardista</b>."}, {"word": "melodía", "ipa": "meloˈðia", "def": "sucesión de notas musicales que forman una frase reconocible", "ex": "La <b>melodía</b> de esa canción es imposible de olvidar."}, {"word": "repertorio", "ipa": "reperˈtorjo", "def": "conjunto de obras que un artista o compañía tiene preparadas para interpretar", "ex": "La orquesta tiene un amplio <b>repertorio</b> de música clásica."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_b2_musica-artes-escenicas";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["b2"] = prog["b2"] || {};
    prog["b2"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["b2"] && prog["b2"][STORAGE_KEY] && prog["b2"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
