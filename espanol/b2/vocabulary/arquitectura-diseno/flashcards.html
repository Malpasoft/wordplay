<h1>Arquitectura y Diseño</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "plano", "ipa": "ˈplano", "def": "representación gráfica de un edificio o espacio a escala reducida", "ex": "El arquitecto presentó los <b>planos</b> del nuevo edificio."}, {"word": "fachada", "ipa": "faˈθaða", "def": "parte exterior y frontal de un edificio", "ex": "La <b>fachada</b> del museo fue diseñada por un arquitecto famoso."}, {"word": "estructura", "ipa": "estrukˈtura", "def": "sistema de elementos que sostiene y da forma a una construcción", "ex": "La <b>estructura</b> metálica permite grandes alturas."}, {"word": "rehabilitación", "ipa": "reaβilitaˈθjon", "def": "proceso de restaurar o reformar un edificio para mejorar su estado", "ex": "La <b>rehabilitación</b> del casco histórico duró tres años."}, {"word": "sostenible", "ipa": "sosˈteniβle", "def": "que está diseñado para minimizar el impacto ambiental", "ex": "Diseñaron un edificio <b>sostenible</b> con energía solar."}, {"word": "urbanismo", "ipa": "urβaˈnismo", "def": "disciplina que planifica la organización de los espacios y servicios en las ciudades", "ex": "El <b>urbanismo</b> moderno da prioridad al peatón."}, {"word": "vanguardia", "ipa": "banˈɡwarðja", "def": "tendencia artística o cultural más innovadora de un período", "ex": "El arquitecto siempre trabaja en la <b>vanguardia</b> del diseño."}, {"word": "patrimonio", "ipa": "patriˈmonjo", "def": "conjunto de bienes históricos y culturales que una sociedad preserva", "ex": "El ayuntamiento protege el <b>patrimonio</b> arquitectónico de la ciudad."}, {"word": "espacio", "ipa": "esˈpaθjo", "def": "ámbito físico donde se desarrollan las actividades humanas", "ex": "El <b>espacio</b> interior del edificio es luminoso y amplio."}, {"word": "proporción", "ipa": "proporˈθjon", "def": "relación de tamaño o medida entre las partes de un conjunto", "ex": "La <b>proporción</b> áurea aparece en muchas obras maestras."}, {"word": "minimalismo", "ipa": "minimaˈlismo", "def": "estilo que utiliza los elementos estrictamente necesarios para crear belleza", "ex": "El <b>minimalismo</b> en el diseño interior prioriza la funcionalidad."}, {"word": "boceto", "ipa": "boˈθeto", "def": "dibujo rápido y esquemático de una idea o diseño", "ex": "El diseñador hizo un <b>boceto</b> de la nueva línea de productos."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_b2_arquitectura-diseno";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["b2"] = prog["b2"] || {};
    prog["b2"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["b2"] && prog["b2"][STORAGE_KEY] && prog["b2"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
