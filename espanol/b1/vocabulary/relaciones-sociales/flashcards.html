<h1>Relaciones Sociales</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "amistad", "ipa": "amisˈtað", "def": "Relación afectiva de confianza y afecto mutuo entre dos o más personas.", "ex": "La <b>amistad</b> verdadera se demuestra en los momentos difíciles de la vida."}, {"word": "relación", "ipa": "relaˈθjon", "def": "Vínculo o conexión que existe entre dos o más personas en distintos ámbitos de la vida.", "ex": "Mantiene una buena <b>relación</b> con todos sus compañeros de trabajo."}, {"word": "confianza", "ipa": "konˈfjanθa", "def": "Seguridad y fe que se tiene en la honestidad o capacidad de otra persona.", "ex": "La <b>confianza</b> es la base de cualquier relación sana y duradera."}, {"word": "conflicto", "ipa": "konˈflikto", "def": "Situación de enfrentamiento o desacuerdo entre dos o más personas o grupos.", "ex": "Resolvieron el <b>conflicto</b> mediante el diálogo y el respeto mutuo."}, {"word": "compromiso", "ipa": "komproˈmiso", "def": "Acuerdo o solución a la que llegan dos o más partes cediendo cada una en algo.", "ex": "Llegaron a un <b>compromiso</b> que satisfizo a todos los miembros del grupo."}, {"word": "discusión", "ipa": "diskuˈsjon", "def": "Intercambio de opiniones o argumentos contrarios entre dos o más personas sobre algo.", "ex": "Tuvieron una <b>discusión</b> seria pero lograron aclarar sus diferencias al final."}, {"word": "apoyo", "ipa": "aˈpoʝo", "def": "Ayuda, respaldo o aliento que se ofrece a alguien en situaciones difíciles.", "ex": "El <b>apoyo</b> de su familia fue fundamental durante los momentos más difíciles."}, {"word": "lealtad", "ipa": "lealˈtað", "def": "Fidelidad y compromiso constante hacia una persona, grupo o causa.", "ex": "Demostró su <b>lealtad</b> al amigo cuando más lo necesitaba."}, {"word": "envidia", "ipa": "emˈbiðja", "def": "Sentimiento de malestar o deseo de tener lo que otra persona posee.", "ex": "La <b>envidia</b> puede destruir incluso las amistades más sólidas si no se controla."}, {"word": "empatía", "ipa": "emˈpatja", "def": "Capacidad de comprender y compartir los sentimientos y experiencias de otra persona.", "ex": "La <b>empatía</b> es esencial para construir relaciones humanas respetuosas y solidarias."}, {"word": "sociedad", "ipa": "soθjeˈðað", "def": "Conjunto de personas que comparten una cultura, normas e instituciones en un territorio.", "ex": "Una <b>sociedad</b> justa es aquella en la que todos tienen las mismas oportunidades."}, {"word": "comunidad", "ipa": "komuniˈðað", "def": "Grupo de personas que viven en el mismo lugar o comparten intereses y objetivos comunes.", "ex": "La <b>comunidad</b> del barrio se organizó para mejorar los espacios públicos."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_b1_relaciones-sociales";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["b1"] = prog["b1"] || {};
    prog["b1"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["b1"] && prog["b1"][STORAGE_KEY] && prog["b1"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
