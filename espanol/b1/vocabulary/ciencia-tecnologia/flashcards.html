<h1>Ciencia y Tecnología</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "experimento", "ipa": "eksperiˈmento", "def": "Prueba controlada que se realiza para comprobar o descubrir algo mediante la observación.", "ex": "Los estudiantes realizaron un <b>experimento</b> en el laboratorio para estudiar la reacción química."}, {"word": "investigación", "ipa": "imbestiɣaˈθjon", "def": "Proceso sistemático de búsqueda y análisis de información para ampliar el conocimiento.", "ex": "El equipo de <b>investigación</b> lleva años estudiando una posible cura para la enfermedad."}, {"word": "descubrimiento", "ipa": "deskuβriˈmjento", "def": "Hallazgo de algo desconocido o nuevo mediante la observación o el estudio.", "ex": "El <b>descubrimiento</b> de la penicilina cambió para siempre la medicina moderna."}, {"word": "invento", "ipa": "imˈbento", "def": "Objeto, proceso o idea creado por primera vez mediante el ingenio y el trabajo.", "ex": "El <b>invento</b> de la imprenta permitió difundir el conocimiento a gran escala."}, {"word": "evolución", "ipa": "eβoluˈθjon", "def": "Proceso gradual de cambio y desarrollo de los seres vivos a lo largo del tiempo.", "ex": "La teoría de la <b>evolución</b> de Darwin revolucionó la biología en el siglo XIX."}, {"word": "átomo", "ipa": "ˈatomo", "def": "Unidad más pequeña de un elemento químico que conserva sus propiedades.", "ex": "Un <b>átomo</b> está compuesto por un núcleo y una nube de electrones a su alrededor."}, {"word": "molécula", "ipa": "moˈlekula", "def": "Agrupación de dos o más átomos unidos mediante enlaces químicos.", "ex": "El agua está formada por una <b>molécula</b> de dos átomos de hidrógeno y uno de oxígeno."}, {"word": "laboratorio", "ipa": "laβoraˈtorjo", "def": "Lugar equipado con instrumentos y materiales para realizar experimentos científicos.", "ex": "Los investigadores pasaron toda la semana en el <b>laboratorio</b> analizando las muestras."}, {"word": "teoría", "ipa": "teoˈria", "def": "Conjunto de principios y explicaciones que describen o predicen fenómenos observables.", "ex": "La <b>teoría</b> de la relatividad de Einstein transformó la física moderna."}, {"word": "dato", "ipa": "ˈdato", "def": "Información concreta obtenida mediante la observación, la medición o la investigación.", "ex": "Los científicos analizaron miles de <b>datos</b> para llegar a sus conclusiones."}, {"word": "programa", "ipa": "proˈɣrama", "def": "Conjunto de instrucciones escritas en un lenguaje informático que ejecuta una computadora.", "ex": "Desarrollaron un <b>programa</b> capaz de detectar errores médicos con gran precisión."}, {"word": "inteligencia artificial", "ipa": "inteliˈxenθja artiˈfiθjal", "def": "Tecnología que permite a las máquinas realizar tareas que normalmente requieren inteligencia humana.", "ex": "La <b>inteligencia artificial</b> está transformando sectores como la medicina y la educación."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_b1_ciencia-tecnologia";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["b1"] = prog["b1"] || {};
    prog["b1"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["b1"] && prog["b1"][STORAGE_KEY] && prog["b1"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
