<h1>Viajes y Turismo</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "hotel", "ipa": "oˈtel", "def": "Establecimiento que ofrece alojamiento y servicios a viajeros a cambio de pago.", "ex": "Reservamos una habitación en el <b>hotel</b> cerca del centro histórico."}, {"word": "pasaporte", "ipa": "pa.saˈpor.te", "def": "Documento oficial que acredita la identidad y nacionalidad de una persona para viajar al extranjero.", "ex": "No olvides llevar el <b>pasaporte</b> cuando viajes fuera del país."}, {"word": "reserva", "ipa": "re.ˈser.βa", "def": "Acción de apartar con antelación un servicio, como una habitación o un vuelo.", "ex": "Hice la <b>reserva</b> del restaurante con dos semanas de anticipación."}, {"word": "destino", "ipa": "des.ˈti.no", "def": "Lugar al que se dirige una persona en un viaje.", "ex": "El <b>destino</b> de nuestras vacaciones este año es la ciudad de Buenos Aires."}, {"word": "equipaje", "ipa": "e.ki.ˈpa.xe", "def": "Conjunto de maletas y bolsas que se llevan en un viaje.", "ex": "El <b>equipaje</b> de mano no puede pesar más de diez kilogramos."}, {"word": "vuelo", "ipa": "ˈbwe.lo", "def": "Viaje que se realiza en avión de un lugar a otro.", "ex": "El <b>vuelo</b> directo a Ciudad de México dura unas diez horas."}, {"word": "excursión", "ipa": "eks.kurˈsjon", "def": "Viaje o salida corta que se realiza como actividad turística o de ocio.", "ex": "La agencia organiza una <b>excursión</b> a las ruinas mayas mañana por la mañana."}, {"word": "guía", "ipa": "ˈɡi.a", "def": "Persona que acompaña y orienta a los turistas explicando los lugares de interés.", "ex": "La <b>guía</b> nos explicó la historia del monumento con mucho detalle."}, {"word": "divisa", "ipa": "di.ˈβi.sa", "def": "Moneda extranjera utilizada en transacciones internacionales.", "ex": "Necesito cambiar <b>divisa</b> antes de llegar al aeropuerto de destino."}, {"word": "turista", "ipa": "tu.ˈris.ta", "def": "Persona que viaja por placer o interés cultural a lugares distintos de su residencia habitual.", "ex": "La ciudad recibe miles de <b>turistas</b> durante los meses de verano."}, {"word": "aduana", "ipa": "a.ˈðwa.na", "def": "Oficina oficial en fronteras o aeropuertos donde se controlan las mercancías que entran o salen de un país.", "ex": "En la <b>aduana</b> revisaron todo el equipaje antes de dejarnos pasar."}, {"word": "tarjeta de embarque", "ipa": "tar.ˈxe.ta ðe em.ˈbar.ke", "def": "Documento que autoriza al pasajero a subir al avión e indica el número de asiento y la puerta de salida.", "ex": "Debes presentar la <b>tarjeta de embarque</b> antes de pasar al área de salidas."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_b1_viajes-turismo";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["b1"] = prog["b1"] || {};
    prog["b1"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["b1"] && prog["b1"][STORAGE_KEY] && prog["b1"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
