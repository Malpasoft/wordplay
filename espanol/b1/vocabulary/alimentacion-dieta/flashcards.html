<h1>Alimentación y Dieta</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "dieta", "ipa": "ˈdje.ta", "def": "Conjunto de alimentos que consume habitualmente una persona, o régimen alimenticio con un fin específico.", "ex": "El médico le recomendó seguir una <b>dieta</b> baja en grasas saturadas."}, {"word": "nutrición", "ipa": "nu.triˈθjon", "def": "Proceso mediante el cual el organismo obtiene y utiliza los nutrientes de los alimentos para funcionar.", "ex": "Una buena <b>nutrición</b> es fundamental para mantener la salud y el bienestar."}, {"word": "caloría", "ipa": "ka.loˈri.a", "def": "Unidad que mide la cantidad de energía que aportan los alimentos al organismo.", "ex": "Ese refresco tiene más de ciento cincuenta <b>calorías</b> por cada cien mililitros."}, {"word": "proteína", "ipa": "pro.teˈi.na", "def": "Nutriente esencial formado por aminoácidos que el cuerpo necesita para construir y reparar tejidos.", "ex": "Las legumbres son una fuente excelente de <b>proteína</b> para las personas vegetarianas."}, {"word": "vitamina", "ipa": "bi.ta.ˈmi.na", "def": "Sustancia orgánica esencial en pequeñas cantidades para el correcto funcionamiento del organismo.", "ex": "La <b>vitamina</b> C, presente en los cítricos, refuerza el sistema inmunitario."}, {"word": "vegetariano", "ipa": "be.xe.ta.ˈrja.no", "def": "Que no incluye carne ni pescado en la alimentación, basándose principalmente en productos de origen vegetal.", "ex": "Desde hace un año lleva una dieta <b>vegetariana</b> por razones éticas y de salud."}, {"word": "ingrediente", "ipa": "iŋ.ɡre.ˈðjen.te", "def": "Cada uno de los elementos que forman parte de un plato o receta.", "ex": "El aceite de oliva es el <b>ingrediente</b> principal de muchas recetas mediterráneas."}, {"word": "receta", "ipa": "reˈθe.ta", "def": "Conjunto de instrucciones que explica cómo preparar un plato con ingredientes y cantidades específicos.", "ex": "Mi abuela me enseñó la <b>receta</b> tradicional del cocido madrileño."}, {"word": "saludable", "ipa": "sa.lu.ˈða.βle", "def": "Que es beneficioso para la salud y contribuye al buen funcionamiento del organismo.", "ex": "Comer fruta y verdura fresca es uno de los hábitos más <b>saludables</b> que existen."}, {"word": "alimento procesado", "ipa": "a.li.ˈmen.to pro.θe.ˈsa.ðo", "def": "Producto alimenticio que ha sido sometido a modificaciones industriales, con frecuencia añadiendo conservantes o aditivos.", "ex": "El consumo excesivo de <b>alimentos procesados</b> aumenta el riesgo de enfermedades crónicas."}, {"word": "alergia", "ipa": "a.ˈler.xja", "def": "Reacción adversa del sistema inmunitario ante una sustancia presente en determinados alimentos.", "ex": "Tiene <b>alergia</b> al gluten, por lo que debe evitar el pan y la pasta normales."}, {"word": "ración", "ipa": "raˈθjon", "def": "Cantidad de alimento que se sirve o consume en una sola vez.", "ex": "El nutricionista recomendó reducir la <b>ración</b> de arroz a la mitad en cada comida."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_b1_alimentacion-dieta";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["b1"] = prog["b1"] || {};
    prog["b1"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["b1"] && prog["b1"][STORAGE_KEY] && prog["b1"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
