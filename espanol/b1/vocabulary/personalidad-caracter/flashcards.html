<h1>Personalidad y Carácter</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "personalidad", "ipa": "personaliˈðað", "def": "Conjunto de rasgos y características psicológicas que definen el modo de ser de una persona.", "ex": "Tiene una <b>personalidad</b> muy abierta que le facilita hacer amigos con facilidad."}, {"word": "carácter", "ipa": "kaˈrakter", "def": "Conjunto de rasgos habituales que definen el comportamiento y las reacciones de una persona.", "ex": "Su <b>carácter</b> tranquilo le ayuda a mantener la calma en situaciones de estrés."}, {"word": "creativo", "ipa": "kreaˈtiβo", "def": "Que tiene facilidad para generar ideas originales y encontrar soluciones nuevas a los problemas.", "ex": "Es muy <b>creativo</b> y siempre propone ideas innovadoras en las reuniones de equipo."}, {"word": "responsable", "ipa": "responsaˈβle", "def": "Que cumple con sus obligaciones y asume las consecuencias de sus actos.", "ex": "Es una persona muy <b>responsable</b> que siempre entrega su trabajo a tiempo."}, {"word": "ambicioso", "ipa": "ambiˈθjoso", "def": "Que tiene deseos intensos de lograr el éxito, el poder o el reconocimiento.", "ex": "Es tan <b>ambicioso</b> que trabaja doce horas al día para alcanzar sus metas."}, {"word": "generoso", "ipa": "xeneˈroso", "def": "Que comparte con los demás sin esperar nada a cambio, ofreciendo tiempo, dinero o ayuda.", "ex": "Es muy <b>generoso</b> y siempre está dispuesto a ayudar a quienes lo necesitan."}, {"word": "paciente", "ipa": "paˈθjente", "def": "Que sabe esperar sin alterarse y soporta las dificultades con calma y tranquilidad.", "ex": "Hay que ser muy <b>paciente</b> para enseñar a niños pequeños a leer y escribir."}, {"word": "honesto", "ipa": "oˈnesto", "def": "Que actúa con sinceridad, integridad y respeto a la verdad en sus relaciones con los demás.", "ex": "Es una persona <b>honesta</b> que siempre dice la verdad aunque sea difícil escucharla."}, {"word": "flexible", "ipa": "flekˈsiβle", "def": "Que se adapta fácilmente a los cambios y es capaz de modificar su actitud o postura.", "ex": "Ser <b>flexible</b> en el trabajo facilita la colaboración y la resolución de problemas."}, {"word": "terco", "ipa": "ˈterko", "def": "Que mantiene su postura u opinión con firmeza y no cambia de idea aunque le den buenas razones.", "ex": "Es tan <b>terco</b> que no admite sus errores aunque todos se los señalen claramente."}, {"word": "seguro", "ipa": "seˈɣuro", "def": "Que confía en sí mismo y en sus propias capacidades para actuar en distintas situaciones.", "ex": "Se muestra siempre muy <b>seguro</b> al hablar en público, sin nervios ni dudas."}, {"word": "tímido", "ipa": "ˈtimiðo", "def": "Que se siente incómodo o cohibido en situaciones sociales o ante personas desconocidas.", "ex": "Es bastante <b>tímido</b> y le cuesta mucho participar en las discusiones en clase."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_b1_personalidad-caracter";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["b1"] = prog["b1"] || {};
    prog["b1"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["b1"] && prog["b1"][STORAGE_KEY] && prog["b1"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
