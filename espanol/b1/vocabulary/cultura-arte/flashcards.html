<h1>Cultura y Arte</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "pintura", "ipa": "pinˈtu.ra", "def": "Obra de arte creada aplicando pigmentos sobre una superficie, o la técnica usada para crearla.", "ex": "La <b>pintura</b> de Frida Kahlo refleja su vida personal con gran intensidad."}, {"word": "escultura", "ipa": "es.kulˈtu.ra", "def": "Obra de arte tridimensional creada moldeando, tallando o ensamblando materiales como piedra, madera o metal.", "ex": "La <b>escultura</b> en el centro de la plaza representa a un héroe nacional."}, {"word": "arquitectura", "ipa": "ar.ki.tekˈtu.ra", "def": "Arte y técnica de diseñar y construir edificios y otras estructuras habitables.", "ex": "La <b>arquitectura</b> colonial de la ciudad fue declarada Patrimonio de la Humanidad."}, {"word": "exposición", "ipa": "eks.po.siˈθjon", "def": "Muestra pública de obras de arte, fotografías u objetos en un espacio determinado.", "ex": "La <b>exposición</b> de fotografía contemporánea estuvo abierta durante todo el mes."}, {"word": "museo", "ipa": "muˈse.o", "def": "Institución que conserva, estudia y exhibe colecciones de objetos artísticos, históricos o científicos.", "ex": "El <b>museo</b> nacional ofrece entrada gratuita los domingos por la mañana."}, {"word": "concierto", "ipa": "konˈθjer.to", "def": "Actuación musical en directo ante un público, interpretada por uno o varios músicos.", "ex": "Asistimos a un <b>concierto</b> de jazz en el auditorio al aire libre."}, {"word": "espectáculo", "ipa": "es.pekˈta.ku.lo", "def": "Función o representación artística que se presenta ante un público.", "ex": "El <b>espectáculo</b> de danza flamenca duró más de dos horas y fue impresionante."}, {"word": "literatura", "ipa": "li.te.ra.ˈtu.ra", "def": "Conjunto de obras escritas que tienen valor artístico o cultural, como novelas, poemas y cuentos.", "ex": "La <b>literatura</b> latinoamericana del siglo XX es reconocida en todo el mundo."}, {"word": "fotografía", "ipa": "fo.to.ɣraˈfi.a", "def": "Arte y técnica de capturar imágenes mediante una cámara, o la imagen obtenida por este proceso.", "ex": "La <b>fotografía</b> en blanco y negro transmite una gran carga emocional."}, {"word": "cine", "ipa": "ˈθi.ne", "def": "Arte de crear y proyectar películas, así como el lugar donde se proyectan.", "ex": "El <b>cine</b> de autor europeo suele explorar temas filosóficos y sociales complejos."}, {"word": "tradición", "ipa": "tra.ðiˈθjon", "def": "Costumbre, práctica o creencia que se transmite de generación en generación dentro de una cultura.", "ex": "La <b>tradición</b> de celebrar el Día de Muertos es muy importante en México."}, {"word": "festival", "ipa": "fes.ti.ˈβal", "def": "Celebración o evento cultural periódico que reúne actuaciones, exposiciones u otras actividades artísticas.", "ex": "El <b>festival</b> de cine independiente atrae a directores de todo el mundo."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_b1_cultura-arte";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["b1"] = prog["b1"] || {};
    prog["b1"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["b1"] && prog["b1"][STORAGE_KEY] && prog["b1"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
