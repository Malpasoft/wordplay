<h1>Trabajo y Carrera</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "entrevista", "ipa": "en.tre.ˈβis.ta", "def": "Conversación formal entre un candidato y un empleador para evaluar si el candidato es adecuado para un puesto.", "ex": "Mañana tengo una <b>entrevista</b> de trabajo en una empresa multinacional."}, {"word": "currículo", "ipa": "kuˈri.ku.lo", "def": "Documento que resume la formación académica, la experiencia laboral y las habilidades de una persona.", "ex": "Actualicé mi <b>currículo</b> antes de enviar las solicitudes de empleo."}, {"word": "ascenso", "ipa": "asˈθen.so", "def": "Avance a un puesto de mayor rango o responsabilidad dentro de una empresa.", "ex": "Después de tres años de trabajo excelente, le ofrecieron un <b>ascenso</b>."}, {"word": "colega", "ipa": "ko.ˈle.ɣa", "def": "Persona con quien se trabaja en el mismo lugar o en la misma profesión.", "ex": "Mi <b>colega</b> me ayudó a terminar el informe antes de la reunión."}, {"word": "salario", "ipa": "sa.ˈla.rjo", "def": "Cantidad de dinero que recibe un trabajador a cambio de sus servicios de forma periódica.", "ex": "Negocié un <b>salario</b> más alto durante la entrevista con el director."}, {"word": "plazo", "ipa": "ˈpla.θo", "def": "Período de tiempo máximo establecido para completar una tarea o entregar un trabajo.", "ex": "El <b>plazo</b> para entregar el proyecto es el próximo viernes por la tarde."}, {"word": "responsabilidad", "ipa": "res.pon.sa.βi.li.ˈðað", "def": "Obligación de cumplir con las tareas y deberes propios del cargo que se ocupa.", "ex": "Una de sus principales <b>responsabilidades</b> es supervisar al equipo de ventas."}, {"word": "reunión", "ipa": "re.u.ˈnjon", "def": "Encuentro entre varias personas para tratar asuntos de trabajo o tomar decisiones en común.", "ex": "La <b>reunión</b> del departamento empieza a las nueve de la mañana."}, {"word": "proyecto", "ipa": "pro.ˈʝek.to", "def": "Conjunto de actividades planificadas que se llevan a cabo para lograr un objetivo específico.", "ex": "El equipo lleva tres meses trabajando en este <b>proyecto</b> de desarrollo."}, {"word": "experiencia", "ipa": "eks.pe.ˈrjen.sja", "def": "Conocimiento o habilidad adquirido mediante la práctica en un área determinada.", "ex": "La empresa busca candidatos con al menos dos años de <b>experiencia</b> en ventas."}, {"word": "contrato", "ipa": "konˈtra.to", "def": "Acuerdo legal entre un empleador y un trabajador que establece las condiciones de trabajo.", "ex": "Firmé el <b>contrato</b> de trabajo por un período inicial de un año."}, {"word": "habilidad", "ipa": "a.βi.li.ˈðað", "def": "Capacidad o destreza que posee una persona para realizar una tarea de manera eficiente.", "ex": "La comunicación efectiva es una <b>habilidad</b> muy valorada en cualquier trabajo."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_b1_trabajo-carrera";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["b1"] = prog["b1"] || {};
    prog["b1"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["b1"] && prog["b1"][STORAGE_KEY] && prog["b1"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
