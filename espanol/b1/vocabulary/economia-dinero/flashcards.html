<h1>Economía y Dinero</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "economía", "ipa": "e.ko.noˈmi.a", "def": "Sistema de producción, distribución e intercambio de bienes y servicios de un país o región.", "ex": "La <b>economía</b> del país creció un tres por ciento durante el último año."}, {"word": "inversión", "ipa": "im.berˈsjon", "def": "Uso de dinero o recursos para obtener un beneficio o ganancia en el futuro.", "ex": "La <b>inversión</b> en energías renovables ha aumentado considerablemente en los últimos años."}, {"word": "ahorro", "ipa": "aˈo.ro", "def": "Parte del dinero que se guarda en lugar de gastarse, generalmente para el futuro.", "ex": "Es importante fomentar el <b>ahorro</b> desde una edad temprana para tener seguridad financiera."}, {"word": "deuda", "ipa": "ˈdew.ða", "def": "Cantidad de dinero que una persona o entidad debe pagar a otra.", "ex": "El gobierno anunció un plan para reducir la <b>deuda</b> pública en los próximos años."}, {"word": "impuesto", "ipa": "imˈpwes.to", "def": "Cantidad de dinero que los ciudadanos y empresas deben pagar al Estado de manera obligatoria.", "ex": "El <b>impuesto</b> sobre la renta varía según los ingresos anuales de cada persona."}, {"word": "presupuesto", "ipa": "pre.su.ˈpwes.to", "def": "Plan financiero que estima los ingresos y gastos durante un período determinado.", "ex": "El ayuntamiento aprobó el <b>presupuesto</b> municipal para el próximo ejercicio fiscal."}, {"word": "inflación", "ipa": "im.flaˈθjon", "def": "Aumento general y sostenido del precio de los bienes y servicios en una economía a lo largo del tiempo.", "ex": "La alta <b>inflación</b> reduce el poder adquisitivo de los ciudadanos de forma significativa."}, {"word": "interés", "ipa": "in.teˈres", "def": "Porcentaje adicional que se paga o se cobra por el uso de dinero prestado durante un tiempo.", "ex": "El banco nos ofrece un tipo de <b>interés</b> del dos por ciento anual en la hipoteca."}, {"word": "préstamo", "ipa": "ˈpres.ta.mo", "def": "Cantidad de dinero que una entidad financiera entrega a alguien con la condición de que lo devuelva con intereses.", "ex": "Pedimos un <b>préstamo</b> al banco para reformar el piso que compramos el año pasado."}, {"word": "cuenta bancaria", "ipa": "ˈkwen.ta βaŋˈka.rja", "def": "Servicio financiero que permite a una persona depositar, conservar y retirar dinero en un banco.", "ex": "Abrí una <b>cuenta bancaria</b> para gestionar mejor mis gastos mensuales."}, {"word": "sueldo", "ipa": "ˈswel.do", "def": "Remuneración económica que recibe un trabajador de manera regular por su trabajo.", "ex": "Su <b>sueldo</b> aumentó después de la negociación colectiva con la empresa."}, {"word": "gasto", "ipa": "ˈɡas.to", "def": "Cantidad de dinero que se emplea o consume en algo determinado.", "ex": "Hay que controlar el <b>gasto</b> en productos no esenciales para ahorrar más cada mes."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_b1_economia-dinero";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["b1"] = prog["b1"] || {};
    prog["b1"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["b1"] && prog["b1"][STORAGE_KEY] && prog["b1"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
