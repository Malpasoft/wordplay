<h1>El Medio Ambiente</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "cambio climático", "ipa": "ˈkam.bjo kli.ˈma.ti.ko", "def": "Variación a largo plazo de los patrones climáticos globales, principalmente causada por la actividad humana.", "ex": "El <b>cambio climático</b> está provocando fenómenos meteorológicos cada vez más extremos."}, {"word": "contaminación", "ipa": "kon.ta.mi.naˈsjon", "def": "Presencia de sustancias nocivas en el aire, el agua o el suelo que resultan perjudiciales para los seres vivos.", "ex": "La <b>contaminación</b> del río ha afectado a muchas especies de peces locales."}, {"word": "renovable", "ipa": "re.no.ˈβa.βle", "def": "Que proviene de fuentes naturales que se reponen de manera continua y no se agotan con el uso.", "ex": "La energía solar es una fuente <b>renovable</b> que no produce emisiones de carbono."}, {"word": "reciclaje", "ipa": "re.si.ˈkla.xe", "def": "Proceso de transformar materiales ya usados en nuevos productos para reducir los residuos.", "ex": "El <b>reciclaje</b> del papel y del plástico ayuda a reducir la cantidad de basura."}, {"word": "huella de carbono", "ipa": "ˈwe.ʎa ðe kar.ˈβo.no", "def": "Cantidad total de gases de efecto invernadero que genera una persona, organización o producto.", "ex": "Podemos reducir nuestra <b>huella de carbono</b> usando el transporte público."}, {"word": "deforestación", "ipa": "de.fo.res.ta.ˈθjon", "def": "Destrucción y eliminación masiva de los árboles de una zona forestal.", "ex": "La <b>deforestación</b> en el Amazonas pone en peligro miles de especies animales."}, {"word": "especie", "ipa": "esˈpe.θje", "def": "Grupo de seres vivos con características comunes que pueden reproducirse entre sí.", "ex": "Varias <b>especies</b> de aves migratorias han desaparecido en las últimas décadas."}, {"word": "sostenible", "ipa": "sos.te.ˈni.βle", "def": "Que se puede mantener a largo plazo sin dañar los recursos naturales ni el medio ambiente.", "ex": "Es necesario adoptar un modelo de desarrollo <b>sostenible</b> para proteger el planeta."}, {"word": "energía", "ipa": "e.nerˈxi.a", "def": "Capacidad para realizar trabajo o producir cambios, obtenida de diversas fuentes naturales o artificiales.", "ex": "La <b>energía</b> eólica generada por los parques de molinos abastece muchos hogares."}, {"word": "invernadero", "ipa": "im.ber.na.ˈðe.ro", "def": "Referido al efecto que producen ciertos gases al retener el calor de la atmósfera terrestre.", "ex": "Los gases de <b>invernadero</b> son los principales responsables del calentamiento global."}, {"word": "biodiversidad", "ipa": "bjo.ði.βer.si.ˈðað", "def": "Variedad de especies vivas que habitan en un ecosistema o en el planeta en general.", "ex": "Los bosques tropicales albergan una enorme <b>biodiversidad</b> que debemos proteger."}, {"word": "ecosistema", "ipa": "e.ko.sisˈte.ma", "def": "Conjunto de seres vivos que interactúan entre sí y con su entorno físico en una zona determinada.", "ex": "La contaminación del mar destruye el <b>ecosistema</b> marino y afecta a muchas especies."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_b1_medio-ambiente";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["b1"] = prog["b1"] || {};
    prog["b1"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["b1"] && prog["b1"][STORAGE_KEY] && prog["b1"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
