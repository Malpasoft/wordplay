.fc-wrap{perspective:800px;margin:0 auto 20px;max-width:480px}
.fc{width:100%;height:220px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;border-radius:10px}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;border:1px solid var(--hairline)}
.fc-front,.fc-back{background:var(--paper)}
.fc-back{transform:rotateY(180deg)}
.fc-word{font-size:1.8rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.fc-ipa{font-family:var(--font-sans);font-size:.85rem;color:var(--muted);margin-bottom:8px}
.fc-def{font-size:.95rem;color:var(--ink);margin-bottom:6px}
.fc-ex{font-size:.82rem;color:var(--muted);font-style:italic}
.fc-hint{font-family:var(--font-sans);font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:10px}
.fc-audio{background:none;border:1px solid var(--hairline);border-radius:4px;padding:5px 12px;font-family:var(--font-sans);font-size:.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;margin-top:8px}
.fc-audio:hover{border-color:var(--amber);color:var(--amber)}
.fc-nav{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:20px}
.fc-btn{font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;border-radius:4px;cursor:pointer;border:1.5px solid var(--hairline);background:transparent;color:var(--ink)}
.fc-btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.fc-counter{font-family:var(--font-sans);font-size:.75rem;color:var(--muted);font-weight:600}
.mastery-badge{display:inline-block;padding:8px 18px;background:rgba(184,134,11,.12);color:var(--amber);font-family:var(--font-sans);font-size:.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:4px;margin-bottom:16px}
</style>

<h1>Educación Avanzada</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "licenciatura", "ipa": "liθenθjaˈtura", "def": "Título universitario de grado que se obtiene al completar los estudios superiores de una carrera.", "ex": "Terminó su <b>licenciatura</b> en Derecho con muy buenas calificaciones."}, {"word": "carrera", "ipa": "kaˈrera", "def": "Conjunto de estudios universitarios de una disciplina concreta que conducen a un título oficial.", "ex": "Eligió estudiar la <b>carrera</b> de Medicina porque quería dedicarse a la salud."}, {"word": "tesis", "ipa": "ˈtesis", "def": "Trabajo de investigación extenso que un estudiante realiza para obtener un título académico avanzado.", "ex": "Tardó tres años en completar su <b>tesis</b> doctoral sobre lingüística aplicada."}, {"word": "facultad", "ipa": "fakulˈtað", "def": "División de una universidad dedicada a una rama del conocimiento con sus propios departamentos.", "ex": "La <b>facultad</b> de Ciencias está ubicada en el campus norte de la universidad."}, {"word": "beca", "ipa": "ˈbeka", "def": "Ayuda económica concedida a un estudiante para financiar sus estudios o investigaciones.", "ex": "Obtuvo una <b>beca</b> del gobierno para estudiar en el extranjero durante un año."}, {"word": "conferencia", "ipa": "konfeˈrenθja", "def": "Exposición oral sobre un tema por parte de un experto ante un público académico.", "ex": "La profesora ofreció una <b>conferencia</b> sobre los avances en inteligencia artificial."}, {"word": "seminario", "ipa": "semiˈnarjo", "def": "Clase o reunión académica en grupo reducido para discutir y profundizar en un tema específico.", "ex": "Asistí a un <b>seminario</b> sobre literatura contemporánea muy interesante."}, {"word": "investigación", "ipa": "imbestiɣaˈθjon", "def": "Trabajo académico de búsqueda y análisis sistemático para generar nuevo conocimiento.", "ex": "Su <b>investigación</b> sobre el cambio climático fue publicada en una revista internacional."}, {"word": "bibliografía", "ipa": "biβljoɣraˈfia", "def": "Lista de libros, artículos y otras fuentes utilizadas en un trabajo académico.", "ex": "La <b>bibliografía</b> del trabajo final debe incluir todas las fuentes consultadas."}, {"word": "evaluación", "ipa": "eβalwaˈθjon", "def": "Proceso de valorar el nivel de conocimiento o habilidad de un estudiante en una materia.", "ex": "La <b>evaluación</b> final consiste en un examen escrito y una presentación oral."}, {"word": "asignatura", "ipa": "asiɣnaˈtura", "def": "Cada una de las materias o disciplinas que forman parte de un plan de estudios universitario.", "ex": "La <b>asignatura</b> de filosofía del derecho es obligatoria en el primer curso."}, {"word": "campus", "ipa": "ˈkampus", "def": "Conjunto de edificios, instalaciones y espacios que forman una universidad.", "ex": "El <b>campus</b> universitario cuenta con biblioteca, cafetería y zonas deportivas."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_b1_educacion-avanzada";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["b1"] = prog["b1"] || {};
    prog["b1"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["b1"] && prog["b1"][STORAGE_KEY] && prog["b1"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
