<h1>Pensamiento Crítico Avanzado</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "reductio ad absurdum", "ipa": "re.ˈðuk.tjo að aβ.ˈsuɾ.ðum", "def": "Estrategia argumentativa que refuta una tesis demostrando que sus consecuencias lógicas llevan a una contradicción o absurdo inaceptable.", "ex": "El matemático aplicó la <b>reductio ad absurdum</b> al asumir que la raíz de dos era racional y derivar de ahí una imposibilidad lógica."}, {"word": "pendiente resbaladiza", "ipa": "pen.ˈdjen.te res.βa.la.ˈði.θa", "def": "Falacia que afirma, sin justificación suficiente, que aceptar una medida menor inevitablemente conduce a consecuencias extremas indeseables.", "ex": "Argumentar que legalizar el cannabis llevará inevitablemente al colapso social es un ejemplo claro de <b>pendiente resbaladiza</b> sin evidencia empírica."}, {"word": "carga de la prueba", "ipa": "ˈkaɾ.ɣa ðe la ˈpɾwe.βa", "def": "Obligación que tiene quien formula una afirmación de aportar evidencia que la sustente, en lugar de exigir que otros demuestren su falsedad.", "ex": "En epistemología, la <b>carga de la prueba</b> recae sobre quien afirma la existencia de algo extraordinario, no sobre quien lo pone en duda."}, {"word": "hombre de paja", "ipa": "ˈom.bɾe ðe ˈpa.xa", "def": "Falacia que consiste en distorsionar o exagerar la posición del adversario para refutarla más fácilmente, en lugar de atacar el argumento real.", "ex": "Decir que los ecologistas «quieren que volvamos a las cavernas» es un <b>hombre de paja</b> que evita debatir las propuestas ambientales concretas."}, {"word": "falsa dicotomía", "ipa": "ˈfal.sa di.ko.to.ˈmi.a", "def": "Error argumentativo que presenta solo dos opciones como únicas posibles, ignorando alternativas intermedias o distintas que también existen.", "ex": "«O estás con nosotros o estás contra nosotros» es la <b>falsa dicotomía</b> favorita de la retórica belicista para suprimir posiciones matizadas."}, {"word": "razonamiento motivado", "ipa": "ra.θo.na.ˈmjen.to mo.ti.ˈβa.ðo", "def": "Tendencia cognitiva a buscar y evaluar evidencia de manera sesgada para confirmar conclusiones previamente deseadas o creídas.", "ex": "El <b>razonamiento motivado</b> explica por qué personas inteligentes pueden mantener creencias erróneas ante evidencia contraria abrumadora."}, {"word": "burbuja epistémica", "ipa": "ˈbuɾ.βu.xa e.pis.ˈte.mi.ka", "def": "Entorno informativo cerrado en que solo circulan ideas afines, impidiendo el contacto con perspectivas alternativas o cuestionadoras.", "ex": "Las redes sociales algorítmicas crean una <b>burbuja epistémica</b> que refuerza las convicciones previas en lugar de ampliar el horizonte cognitivo."}, {"word": "navaja de Occam", "ipa": "na.ˈβa.xa ðe ˈo.kam", "def": "Principio metodológico que prescribe no multiplicar entidades más allá de lo necesario para explicar un fenómeno, favoreciendo la hipótesis más simple.", "ex": "Ante dos teorías igualmente predictivas, la <b>navaja de Occam</b> recomienda preferir la que postula menos entidades o supuestos adicionales."}, {"word": "falsabilidad", "ipa": "fal.sa.βi.li.ˈðað", "def": "Criterio popperiano de demarcación científica: una teoría es científica si puede ser refutada por algún experimento o dato observable concebible.", "ex": "La astrología carece de <b>falsabilidad</b> porque sus predicciones son tan vagas que ningún resultado empírico podría demostrar su error."}, {"word": "humildad intelectual", "ipa": "u.ˈmil.dað in.te.lek.ˈtwal", "def": "Disposición epistémica que reconoce los propios límites cognitivos, la posibilidad de error y la legitimidad del desacuerdo razonado.", "ex": "La <b>humildad intelectual</b> no implica relativismo: permite sostener convicciones firmes mientras se permanece abierto a revisarlas con buena evidencia."}, {"word": "injusticia epistémica", "ipa": "in.xus.ˈti.θja e.pis.ˈte.mi.ka", "def": "Daño que se inflige a alguien en su capacidad como sujeto de conocimiento, ya sea desacreditando su testimonio o privándole de recursos cognitivos.", "ex": "Miranda Fricker describe la <b>injusticia epistémica</b> testimonial que ocurre cuando se descarta sistemáticamente la palabra de ciertos grupos sociales."}, {"word": "razonamiento abductivo", "ipa": "ra.θo.na.ˈmjen.to aβ.ˈðuk.ti.βo", "def": "Forma de inferencia que elige la hipótesis más explicativa y plausible para dar cuenta de un conjunto de datos o evidencias observadas.", "ex": "El diagnóstico médico es un ejercicio de <b>razonamiento abductivo</b>: el clínico selecciona la causa más probable entre varias que explicarían los síntomas."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_c2_pensamiento-critico-avanzado";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["c2"] = prog["c2"] || {};
    prog["c2"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["c2"] && prog["c2"][STORAGE_KEY] && prog["c2"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
