.fc-hint{font-family:var(--font-sans);font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:10px}

.fc-audio:hover{border-color:var(--amber);color:var(--amber)}

<h1>Lingüística Textual</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "cohesión textual", "ipa": "koeˈsjon teksˈtwal", "def": "conjunto de mecanismos léxicos y gramaticales que conectan las partes de un texto y le dan unidad", "ex": "La <b>cohesión textual</b> se logra mediante la correferencia, la elipsis y los conectores."}, {"word": "coherencia pragmática", "ipa": "koeˈɾenθja pɾaɣˈmatika", "def": "propiedad del discurso que asegura que el texto tiene sentido global en su contexto de uso", "ex": "La <b>coherencia pragmática</b> depende tanto de la estructura del texto como de los conocimientos compartidos."}, {"word": "progresión temática", "ipa": "pɾoɣɾeˈsjon teˈmatika", "def": "modo en que se introduce y desarrolla la información nueva a lo largo de un texto", "ex": "Una buena <b>progresión temática</b> evita las repeticiones innecesarias y guía al lector."}, {"word": "isotopía", "ipa": "isotˈopia", "def": "recurrencia de rasgos semánticos a lo largo de un texto que crea su unidad temática", "ex": "La <b>isotopía</b> del fuego en el poema refuerza el tema de la pasión destructiva."}, {"word": "tipología textual", "ipa": "tipoloxˈia teksˈtwal", "def": "clasificación de los textos según su función comunicativa dominante: narrar, describir, argumentar, etc.", "ex": "Dominar la <b>tipología textual</b> permite elegir la estructura adecuada para cada propósito."}, {"word": "deixis textual", "ipa": "ˈdejksis teksˈtwal", "def": "uso de expresiones que remiten a elementos del propio texto en lugar de a la realidad externa", "ex": "La expresión «como veremos más adelante» es un ejemplo de <b>deixis textual</b> anafórica."}, {"word": "macroestructura", "ipa": "makɾoestrukˈtuɾa", "def": "organización semántica global de un texto que resume su contenido esencial", "ex": "Van Dijk distingue la <b>macroestructura</b> semántica de la superestructura formal del texto."}, {"word": "superestructura", "ipa": "supeɾestrukˈtuɾa", "def": "esquema formal convencional que organiza los textos de un tipo determinado", "ex": "La <b>superestructura</b> de la noticia incluye el titular, el lead y el cuerpo informativo."}, {"word": "intertexto", "ipa": "inteɾˈteksto", "def": "referencia explícita o implícita a otro texto dentro de un discurso", "ex": "El <b>intertexto</b> bíblico subyace en la novela aunque nunca se cite directamente."}, {"word": "marcador discursivo", "ipa": "maɾˈkaðoɾ disˈkuɾsiβo", "def": "unidad lingüística invariable que guía la interpretación del discurso indicando relaciones entre sus partes", "ex": "El <b>marcador discursivo</b> «sin embargo» señala un contraste con lo anteriormente dicho."}, {"word": "texto multimodal", "ipa": "ˈteksto multimoˈðal", "def": "discurso que combina varios modos semióticos: lenguaje, imagen, sonido, gesto o espacio", "ex": "Un anuncio publicitario es un <b>texto multimodal</b> en el que imagen y texto generan sentido conjunto."}, {"word": "reformulación parafrástica", "ipa": "ɾefoɾmulaˈθjon paɾafɾasˈtika", "def": "estrategia discursiva por la que el hablante repite su propio enunciado con otras palabras para aclarar", "ex": "El conector «es decir» introduce una <b>reformulación parafrástica</b> que clarifica el sentido previo."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_c2_linguistica-textual";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["c2"] = prog["c2"] || {};
    prog["c2"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["c2"] && prog["c2"][STORAGE_KEY] && prog["c2"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
