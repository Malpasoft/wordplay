<h1>Estética y Crítica Cultural</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "industria cultural", "ipa": "industɾia kulˈtuɾal", "def": "sistema capitalista de producción y distribución masiva de bienes culturales que homogeniza y mercantiliza la cultura", "ex": "Adorno denunció la <b>industria cultural</b> por convertir el arte en mercancía de consumo."}, {"word": "espectacularización", "ipa": "espektakulaɾiθaˈθjon", "def": "proceso por el que la realidad social se transforma en representación mediática consumible", "ex": "Debord denunció la <b>espectacularización</b> como sustitución de la vida real por su imagen."}, {"word": "kitsch", "ipa": "kitʃ", "def": "estética de mal gusto que recurre a la imitación barata de formas artísticas y la sentimentalidad fácil", "ex": "El <b>kitsch</b> no es involuntario: algunos artistas lo reivindican críticamente."}, {"word": "camp", "ipa": "kamp", "def": "sensibilidad estética que celebra lo exagerado, lo artificial y lo teatral como forma de subversión", "ex": "Susan Sontag definió el <b>camp</b> como amor a lo poco natural, a las técnicas artificiales."}, {"word": "cultura de masas", "ipa": "kulˈtuɾa ðe ˈmasas", "def": "conjunto de manifestaciones culturales producidas para el consumo de grandes audiencias homogéneas", "ex": "La <b>cultura de masas</b> ha democratizado el acceso cultural pero también ha uniformizado el gusto."}, {"word": "apropiación cultural", "ipa": "apɾopjaˈθjon kulˈtuɾal", "def": "adopción de elementos de una cultura ajena sin el reconocimiento ni el consentimiento de esa comunidad", "ex": "El debate sobre la <b>apropiación cultural</b> cuestiona quién tiene derecho a representar qué identidades."}, {"word": "poscolonialismo", "ipa": "poskoloniˈalismo", "def": "corriente crítica que analiza los legados culturales, políticos e identitarios del colonialismo en las sociedades poscoloniales", "ex": "Bhabha y Spivak desarrollaron el <b>poscolonialismo</b> como herramienta de descolonización epistémica."}, {"word": "subalternidad", "ipa": "suβalteɾniˈðað", "def": "condición de los grupos sociales excluidos del poder que no tienen voz en el discurso dominante", "ex": "Spivak pregunta si el sujeto <b>subalterno</b> puede hablar dentro de las estructuras que lo excluyen."}, {"word": "heteroglosia", "ipa": "eteɾoˈɣlosia", "def": "multiplicidad de voces, registros y lenguajes sociales que conviven en un texto o contexto cultural", "ex": "Bajtín vio en la <b>heteroglosia</b> novelesca un espacio de resistencia frente al discurso autoritario."}, {"word": "aura", "ipa": "ˈawɾa", "def": "cualidad de autenticidad y presencia irrepetible de la obra de arte original", "ex": "Benjamin argumentó que la reproducción técnica destruye el <b>aura</b> de la obra de arte."}, {"word": "resignificación", "ipa": "ɾesiɣnifikaˈθjon", "def": "proceso por el que un signo, símbolo o práctica adquiere un nuevo significado en un nuevo contexto", "ex": "La <b>resignificación</b> de la hoz y el martillo en el arte pop fue una apropiación subversiva."}, {"word": "posmemoria", "ipa": "posˈmemoɾia", "def": "relación que las generaciones posteriores a un trauma histórico establecen con las experiencias de los que lo vivieron", "ex": "La literatura de la <b>posmemoria</b> del Holocausto explora cómo se hereda el trauma colectivo."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_c2_estetica-critica-cultural";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["c2"] = prog["c2"] || {};
    prog["c2"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["c2"] && prog["c2"][STORAGE_KEY] && prog["c2"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
