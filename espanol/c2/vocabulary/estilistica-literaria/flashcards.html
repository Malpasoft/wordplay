<h1>Estilística Literaria</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "estilística", "ipa": "es.ti.ˈlis.ti.ka", "def": "Disciplina que estudia los recursos expresivos y el estilo de una obra literaria o de un autor determinado.", "ex": "La <b>estilística</b> de Rulfo se caracteriza por una sintaxis fragmentaria que imita el habla rural mexicana."}, {"word": "voz narrativa", "ipa": "boθ na.ˈra.ti.βa", "def": "Instancia enunciadora que relata los hechos en un texto literario, con sus propias características, perspectivas y limitaciones.", "ex": "La <b>voz narrativa</b> de esta novela oscila entre la omnisciencia y la ignorancia deliberada, generando una ambigüedad inquietante."}, {"word": "intertextualidad", "ipa": "in.ter.teks.twa.li.ˈðað", "def": "Relación que mantiene un texto con otros textos anteriores, ya sea por cita explícita, alusión o transformación.", "ex": "La <b>intertextualidad</b> en la obra de Borges es tan densa que cada cuento parece una red de referencias a la tradición literaria universal."}, {"word": "polifonía", "ipa": "po.li.ˈfo.ni.a", "def": "Presencia de múltiples voces o conciencias independientes dentro de un texto narrativo, sin que ninguna sea subordinada a la del autor.", "ex": "Bajtín vio en Dostoievski el modelo de la <b>polifonía</b> novelesca, donde cada personaje habla desde una perspectiva irreductible a las demás."}, {"word": "écfrasis", "ipa": "ˈek.fra.sis", "def": "Descripción literaria detallada de una obra de arte visual, que busca traducir en palabras los efectos plásticos de la imagen.", "ex": "La <b>écfrasis</b> del escudo de Aquiles en la Ilíada es uno de los ejemplos más celebrados de esta técnica en la literatura occidental."}, {"word": "etopeya", "ipa": "e.to.ˈpe.ja", "def": "Figura retórica que consiste en la descripción de los rasgos morales, psicológicos y de carácter de una persona o personaje.", "ex": "La <b>etopeya</b> del protagonista ocupa el segundo capítulo entero, revelando sus contradicciones internas antes de que actúe."}, {"word": "catarsis", "ipa": "ka.ˈtar.sis", "def": "Proceso de purificación o liberación emocional que experimenta el espectador o lector ante la representación de conflictos intensos.", "ex": "La escena final produce una <b>catarsis</b> tan poderosa que el público permanece en silencio durante varios minutos tras el telón."}, {"word": "diégesis", "ipa": "ˈdje.xe.sis", "def": "Universo narrativo interno de una obra; el mundo ficticio donde ocurren los hechos relatados por el narrador.", "ex": "El personaje que lee un libro dentro de la novela habita la misma <b>diégesis</b> que los demás, pero su lectura introduce otra capa ficcional."}, {"word": "metalepsis", "ipa": "me.ta.ˈlep.sis", "def": "Transgresión de los límites entre niveles narrativos distintos, como cuando un personaje sale de su ficción o el narrador entra en ella.", "ex": "La <b>metalepsis</b> final del relato, en que el protagonista le habla directamente al autor, rompe toda ilusión realista de manera deliberada."}, {"word": "narrador no fiable", "ipa": "na.ra.ˈðor no ˈfja.βle", "def": "Narrador cuya versión de los hechos es cuestionable o distorsionada por razones psicológicas, morales o cognitivas.", "ex": "Solo a mitad de la novela comprendemos que el <b>narrador no fiable</b> ha estado ocultando información clave sobre su propio crimen."}, {"word": "estilo indirecto libre", "ipa": "es.ˈti.lo in.di.ˈrek.to ˈli.βɾe", "def": "Técnica narrativa que funde la voz del narrador con el discurso interior del personaje sin marcas tipográficas de distinción.", "ex": "Mediante el <b>estilo indirecto libre</b>, Flaubert nos hace sentir los pensamientos de Emma Bovary sin separar jamás narración de consciencia."}, {"word": "aporía", "ipa": "a.po.ˈɾi.a", "def": "Dificultad lógica o argumentativa irresoluble que el texto plantea sin ofrecer salida, generando una tensión interpretativa permanente.", "ex": "El poema termina en una <b>aporía</b> magistral: afirma y niega simultáneamente la posibilidad del amor como lenguaje compartido."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_c2_estilistica-literaria";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["c2"] = prog["c2"] || {};
    prog["c2"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["c2"] && prog["c2"][STORAGE_KEY] && prog["c2"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
