<h1>Epistemología</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "epistemología", "ipa": "epistemoloxˈia", "def": "rama de la filosofía que estudia el origen, la naturaleza y los límites del conocimiento humano", "ex": "La <b>epistemología</b> kantiana distingue entre el fenómeno y el noúmeno."}, {"word": "fundacionalismo", "ipa": "fundaθjonaliˈsmo", "def": "doctrina que sostiene que el conocimiento debe basarse en creencias básicas indudables", "ex": "Descartes es el referente del <b>fundacionalismo</b> con su cogito como primer principio."}, {"word": "coherentismo", "ipa": "koheɾenˈtismo", "def": "teoría epistemológica que defiende que una creencia se justifica si encaja con el sistema de creencias del sujeto", "ex": "El <b>coherentismo</b> rechaza que haya verdades básicas independientes del sistema."}, {"word": "falibilismo", "ipa": "faliβiliˈsmo", "def": "postura que admite que ningún conocimiento es absolutamente cierto y que toda teoría puede ser revisada", "ex": "El <b>falibilismo</b> popperiano exige que las teorías científicas sean falsables."}, {"word": "relativismo epistemológico", "ipa": "relatiˈβismo epistemoˈloxiko", "def": "posición que sostiene que la verdad o el conocimiento depende del sujeto, la cultura o el contexto", "ex": "El <b>relativismo epistemológico</b> cuestiona la posibilidad de una ciencia transcultural."}, {"word": "inferencia a la mejor explicación", "ipa": "imfeˈɾenθja a la ˈmexoɾ ekspliˈkaθjon", "def": "razonamiento que elige la hipótesis que explicaría mejor los datos disponibles", "ex": "La detección del virus se apoyó en una <b>inferencia a la mejor explicación</b>."}, {"word": "conocimiento tácito", "ipa": "konoˈθimjento ˈtaθito", "def": "saber no articulable que se adquiere por la práctica y no puede transmitirse solo con palabras", "ex": "Polanyi mostró que gran parte del <b>conocimiento tácito</b> es irreductible a reglas explícitas."}, {"word": "escepticismo metodológico", "ipa": "eskeptiˈθismo metoðoˈloxiko", "def": "práctica de dudar sistemáticamente de las creencias para asegurar una base sólida de conocimiento", "ex": "El <b>escepticismo metodológico</b> cartesiano sirvió para reconstruir el saber sobre fundamentos seguros."}, {"word": "verdad por correspondencia", "ipa": "βeɾˈðað poɾ koɾesponˈdenθja", "def": "teoría que define la verdad como la adecuación de una proposición con los hechos del mundo", "ex": "La <b>verdad por correspondencia</b> choca con la dificultad de acceder directamente a la realidad."}, {"word": "constructivismo social", "ipa": "konstɾuktiˈβismo soˈθjal", "def": "perspectiva que sostiene que el conocimiento y la realidad son construidos por la interacción social", "ex": "El <b>constructivismo social</b> cuestiona la objetividad de las categorías científicas."}, {"word": "holismo confirmacional", "ipa": "oˈlismo konfirmaθjoˈnal", "def": "tesis de Quine según la cual las hipótesis no se prueban de forma aislada sino en bloque", "ex": "El <b>holismo confirmacional</b> implica que cualquier creencia puede mantenerse si se ajustan las demás."}, {"word": "naturalización de la epistemología", "ipa": "natuɾaliθaˈθjon ðe la epistemoˈloxia", "def": "propuesta de Quine de estudiar el conocimiento con métodos empíricos de la ciencia natural", "ex": "La <b>naturalización de la epistemología</b> disuelve la frontera entre filosofía y psicología cognitiva."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_c2_epistemologia";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["c2"] = prog["c2"] || {};
    prog["c2"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["c2"] && prog["c2"][STORAGE_KEY] && prog["c2"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
