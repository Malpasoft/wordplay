<h1>Historia de las Ideas</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "escolasticismo", "ipa": "es.ko.las.ti.ˈθiz.mo", "def": "Corriente filosófica y teológica medieval que intentó armonizar la razón aristotélica con la fe cristiana mediante el método disputacional.", "ex": "El <b>escolasticismo</b> de Tomás de Aquino construyó una síntesis monumental entre la metafísica de Aristóteles y la teología del dogma cristiano."}, {"word": "empirismo", "ipa": "em.pi.ˈɾiz.mo", "def": "Corriente filosófica que sostiene que el conocimiento procede exclusivamente de la experiencia sensible y no de principios innatos o a priori.", "ex": "El <b>empirismo</b> de Hume llevó sus premisas hasta el límite: si todo conocimiento viene de los sentidos, la causalidad misma se vuelve cuestionable."}, {"word": "racionalismo", "ipa": "ra.θjo.na.ˈliz.mo", "def": "Corriente filosófica que defiende que la razón, con independencia de la experiencia, puede alcanzar verdades necesarias y universales.", "ex": "El <b>racionalismo</b> cartesiano parte de la duda metódica para encontrar en el «cogito» una certeza indubitable sobre la que reconstruir el saber."}, {"word": "dialéctica", "ipa": "dja.ˈlek.ti.ka", "def": "Método de pensamiento que avanza mediante la contraposición de tesis y antítesis, cuya superación genera una síntesis en un nivel superior.", "ex": "La <b>dialéctica</b> hegeliana del amo y el esclavo muestra cómo las contradicciones históricas se resuelven transformando la relación entre las partes."}, {"word": "positivismo", "ipa": "po.si.ti.ˈβiz.mo", "def": "Corriente filosófica que limita el conocimiento legítimo al que puede ser verificado mediante métodos científicos y datos empíricos observables.", "ex": "El <b>positivismo</b> de Comte ordenó las ciencias en una jerarquía que culminaba en la sociología como ciencia suprema de los hechos humanos."}, {"word": "fenomenología", "ipa": "fe.no.me.no.lo.ˈxi.a", "def": "Método filosófico que describe rigurosamente la estructura de la experiencia consciente tal como se presenta, suspendiendo los supuestos previos.", "ex": "La <b>fenomenología</b> de Husserl propone la «epojé» o reducción: poner entre paréntesis el mundo natural para estudiar los actos puros de conciencia."}, {"word": "existencialismo", "ipa": "ek.sis.ten.θja.ˈliz.mo", "def": "Corriente filosófica que sitúa la existencia individual concreta como punto de partida y afirma que la esencia humana no está predeterminada.", "ex": "El <b>existencialismo</b> sartreano resume su núcleo en «la existencia precede a la esencia»: el ser humano se define por sus elecciones, no por su naturaleza."}, {"word": "estructuralismo", "ipa": "es.tɾuk.tu.ɾa.ˈliz.mo", "def": "Paradigma intelectual que analiza los fenómenos culturales, lingüísticos y sociales en términos de estructuras relacionales subyacentes e impersonales.", "ex": "El <b>estructuralismo</b> de Lévi-Strauss aplicó el modelo fonológico saussureano al análisis de los mitos y los sistemas de parentesco."}, {"word": "posmodernismo", "ipa": "pos.mo.ðeɾ.ˈniz.mo", "def": "Movimiento intelectual y cultural que cuestiona los grandes relatos legitimadores de la modernidad y celebra la pluralidad, la ironía y la hibridación.", "ex": "El <b>posmodernismo</b> de Lyotard proclama el fin de los «metarrelatos» —progreso, emancipación, ciencia— que habían dado cohesión al proyecto ilustrado."}, {"word": "deconstrucción", "ipa": "de.kons.tɾuk.ˈθjon", "def": "Práctica filosófico-textual derridiana que desestabiliza las oposiciones binarias de un texto mostrando cómo el término subordinado socava al dominante.", "ex": "La <b>deconstrucción</b> de la oposición habla/escritura en Derrida revela que la escritura no es mera transcripción sino condición de posibilidad del habla."}, {"word": "teoría crítica", "ipa": "te.o.ˈɾi.a ˈkɾi.ti.ka", "def": "Corriente de pensamiento de la Escuela de Fráncfort que analiza críticamente las formas de dominación social, cultural e ideológica de la modernidad.", "ex": "La <b>teoría crítica</b> de Adorno y Horkheimer en la Dialéctica de la Ilustración muestra cómo la razón puede convertirse en instrumento de opresión."}, {"word": "círculo hermenéutico", "ipa": "ˈθiɾ.ku.lo eɾ.me.ˈnew.ti.ko", "def": "Estructura circular de la comprensión, en que el todo se entiende desde sus partes y estas desde el todo, sin que haya punto de partida absoluto.", "ex": "El <b>círculo hermenéutico</b> no es un defecto lógico sino la condición misma de toda interpretación: leer es un movimiento continuo entre parte y totalidad."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_c2_historia-ideas";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["c2"] = prog["c2"] || {};
    prog["c2"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["c2"] && prog["c2"][STORAGE_KEY] && prog["c2"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
