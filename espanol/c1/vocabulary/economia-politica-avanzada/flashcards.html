<h1>Economía Política Avanzada</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "oligopolio", "ipa": "oliɣoˈpoljo", "def": "mercado dominado por un pequeño número de grandes empresas", "ex": "El sector energético opera en un <b>oligopolio</b> difícil de regular."}, {"word": "especulación", "ipa": "espekuˈlaθjon", "def": "operación financiera que busca beneficio aprovechando variaciones futuras de precios", "ex": "La <b>especulación</b> inmobiliaria disparó el precio de la vivienda."}, {"word": "redistribución", "ipa": "ɾedistriβuˈθjon", "def": "proceso de asignar de nuevo los recursos o la renta entre los miembros de una sociedad", "ex": "La <b>redistribución</b> fiscal reduce las desigualdades sociales."}, {"word": "austeridad", "ipa": "awsteɾiˈðað", "def": "política económica que reduce el gasto público para equilibrar las cuentas del Estado", "ex": "Las medidas de <b>austeridad</b> generaron protestas en todo el país."}, {"word": "proteccionismo", "ipa": "pɾotekθjoˈnismo", "def": "política económica que protege la industria nacional frente a la competencia extranjera", "ex": "El <b>proteccionismo</b> genera tensiones en el comercio internacional."}, {"word": "productividad", "ipa": "pɾoðuktiβiˈðað", "def": "relación entre la producción obtenida y los recursos empleados", "ex": "El aumento de la <b>productividad</b> permite crecer sin incrementar costes."}, {"word": "monopolio", "ipa": "monoˈpoljo", "def": "situación de mercado en la que una sola empresa controla la oferta de un bien o servicio", "ex": "Las autoridades disolvieron el <b>monopolio</b> por atentar contra la competencia."}, {"word": "capitalismo", "ipa": "kapitaˈlismo", "def": "sistema económico basado en la propiedad privada y la libre competencia de mercado", "ex": "El <b>capitalismo</b> moderno ha adoptado distintos modelos sociales."}, {"word": "deflación", "ipa": "deflaˈθjon", "def": "caída generalizada y prolongada del nivel de precios de bienes y servicios", "ex": "La <b>deflación</b> prolongada puede paralizar la economía."}, {"word": "estanflación", "ipa": "estamflaˈθjon", "def": "situación económica de inflación y estancamiento económico simultáneos", "ex": "La <b>estanflación</b> de los años 70 desafió los modelos económicos convencionales."}, {"word": "acreedor", "ipa": "akɾeeˈðoɾ", "def": "persona o entidad a la que se le debe dinero", "ex": "Los <b>acreedores</b> exigieron garantías antes de ampliar el crédito."}, {"word": "deudor", "ipa": "dewˈðoɾ", "def": "persona o entidad que tiene una deuda con otra", "ex": "El <b>deudor</b> solicitó una prórroga para saldar su deuda."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_c1_economia-politica-avanzada";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["c1"] = prog["c1"] || {};
    prog["c1"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["c1"] && prog["c1"][STORAGE_KEY] && prog["c1"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
