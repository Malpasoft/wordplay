<h1>Arte y Estética</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "estética", "ipa": "esˈtetika", "def": "rama de la filosofía que estudia la belleza, el arte y la experiencia artística", "ex": "La <b>estética</b> kantiana distingue entre lo bello y lo sublime."}, {"word": "iconografía", "ipa": "ikonoɣɾaˈfia", "def": "estudio y descripción de los temas e imágenes en la historia del arte", "ex": "La <b>iconografía</b> medieval está cargada de simbolismo religioso."}, {"word": "mecenazgo", "ipa": "meθeˈnaθɣo", "def": "apoyo económico o moral que una persona o institución presta a artistas y proyectos culturales", "ex": "El <b>mecenazgo</b> de los Médici transformó el arte del Renacimiento."}, {"word": "instalación artística", "ipa": "instalaˈθjon aɾˈtistika", "def": "obra de arte que interviene en un espacio de forma tridimensional e inmersiva", "ex": "La <b>instalación artística</b> ocupaba toda la sala y envolvía al espectador."}, {"word": "performance", "ipa": "peɾˈfoɾmans", "def": "obra de arte que se ejecuta en vivo ante el público y convierte la acción en arte", "ex": "La artista realizó una <b>performance</b> de seis horas sin moverse."}, {"word": "deconstrucción", "ipa": "dekonstɾukˈθjon", "def": "análisis crítico que pone en cuestión las ideas y valores ocultos en una obra o texto", "ex": "La <b>deconstrucción</b> del relato heroico reveló sus sesgos ideológicos."}, {"word": "intertextualidad", "ipa": "inteɾtekstwaliˈðað", "def": "relación entre textos o obras en la que una hace referencia o responde a otra", "ex": "La <b>intertextualidad</b> de la novela dialoga con los grandes mitos clásicos."}, {"word": "vanguardia", "ipa": "banˈɡwaɾðja", "def": "movimiento artístico innovador que rompe con las convenciones establecidas", "ex": "Las <b>vanguardias</b> del siglo XX transformaron radicalmente el concepto de arte."}, {"word": "mimesis", "ipa": "miˈmesis", "def": "principio estético que concibe el arte como imitación de la realidad", "ex": "Platón criticaba la <b>mimesis</b> por alejarse dos veces de la verdad."}, {"word": "curaduría", "ipa": "kuɾaˈðuɾia", "def": "selección, organización y presentación de obras de arte en una exposición", "ex": "La <b>curaduría</b> de la exposición reunió obras de veinte países."}, {"word": "arte comprometido", "ipa": "ˈaɾte kompɾomeˈtiðo", "def": "obra artística que expresa un posicionamiento político o social", "ex": "El <b>arte comprometido</b> de Goya denunció los horrores de la guerra."}, {"word": "sublimación", "ipa": "suβlimaˈθjon", "def": "transformación de impulsos o emociones en creaciones artísticas o intelectuales", "ex": "Freud describió la <b>sublimación</b> como motor de gran parte de la creación artística."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_c1_arte-estetica";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["c1"] = prog["c1"] || {};
    prog["c1"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["c1"] && prog["c1"][STORAGE_KEY] && prog["c1"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
