<h1>Comunicación y Retórica</h1>
<nav class="chapter-nav"><a href="flashcards.html" class="chapter-nav-btn active">Tarjetas</a><a href="slides.html" class="chapter-nav-btn">Lecci&#243;n</a><a href="game.html" class="chapter-nav-btn">Juego</a><a href="match.html" class="chapter-nav-btn">Relacionar</a></nav>
<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Tema dominado</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">12 palabras &middot; pulsa la tarjeta para ver la definici&#243;n</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Anterior</button><span class="fc-counter" id="fcCounter">1 / 12</span><button class="fc-btn primary" onclick="nextCard()">Siguiente &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Pulsa para ver la definici&#243;n</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; Escuchar</button></div></div></div>
<script>
var WORDS = [{"word": "retórica", "ipa": "reˈtoɾika", "def": "arte de usar el lenguaje de forma eficaz y persuasiva", "ex": "Dominaba la <b>retórica</b> con tal maestría que convencía a todos."}, {"word": "elocuencia", "ipa": "eloˈkwenθja", "def": "habilidad de hablar en público de manera fluida, clara y convincente", "ex": "Su <b>elocuencia</b> en el debate le valió el aplauso del auditorio."}, {"word": "argumento de autoridad", "ipa": "aɾɣuˈmento de awtoɾiˈðað", "def": "recurso retórico que apoya una afirmación citando la opinión de un experto", "ex": "El <b>argumento de autoridad</b> puede ser falaz si la fuente no es fiable."}, {"word": "falacia", "ipa": "faˈlaθja", "def": "argumento que parece válido pero contiene un error lógico o una trampa", "ex": "El <b>ad hominem</b> es una <b>falacia</b> que ataca a la persona en lugar de su argumento."}, {"word": "énfasis", "ipa": "ˈenfasis", "def": "especial intensidad o relieve que se da a un elemento del discurso", "ex": "El <b>énfasis</b> en los datos estadísticos reforzó la credibilidad del informe."}, {"word": "eufemismo", "ipa": "ewfeˈmismo", "def": "expresión suavizada para referirse a algo desagradable o tabú", "ex": "«Reestructuración» es un <b>eufemismo</b> habitual para los despidos masivos."}, {"word": "perífrasis", "ipa": "peˈɾifɾasis", "def": "expresión que usa varias palabras para decir lo que podría decirse con menos", "ex": "El orador recurrió a la <b>perífrasis</b> para evitar un término controvertido."}, {"word": "anacoluto", "ipa": "anakoˈluto", "def": "ruptura de la construcción sintáctica de una frase, que altera el hilo del discurso", "ex": "El <b>anacoluto</b> en su intervención reveló su nerviosismo."}, {"word": "ironía", "ipa": "iˈɾonia", "def": "figura retórica que da a entender lo contrario de lo que se dice", "ex": "Usó la <b>ironía</b> para criticar veladamente la política del gobierno."}, {"word": "hipérbole", "ipa": "iˈpeɾβole", "def": "exageración expresiva usada para intensificar el discurso", "ex": "«Hace un millón de años que no te veo» es una <b>hipérbole</b> muy común."}, {"word": "anáfora", "ipa": "aˈnafoɾa", "def": "repetición de una palabra o grupo de palabras al comienzo de frases consecutivas", "ex": "Martin Luther King usó la <b>anáfora</b> «I have a dream» para reforzar su mensaje."}, {"word": "disonancia cognitiva", "ipa": "disoˈnanθja koɣniˈtiβa", "def": "tensión mental que surge al mantener creencias contradictorias o actuar contra los propios valores", "ex": "La <b>disonancia cognitiva</b> del consumidor le genera malestar al comprar productos dañinos."}];
var STORAGE_KEY = "wordplay_vocab_mastered_es_c1_comunicacion-retorica";
var idx = 0, seen = new Set();
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa ? '[' + w.ipa + ']' : '';
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length) {
    var sk = (window.store || localStorage);
    var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
    prog["c1"] = prog["c1"] || {};
    prog["c1"][STORAGE_KEY] = {done:true, date:new Date().toISOString().slice(0,10)};
    sk.setItem('wordplay_progress', JSON.stringify(prog));
    document.getElementById('masteryBadge').style.display = '';
  }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'es-ES'; u.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'Enter') flipCard();
});
showCard();
(function checkMastery() {
  var sk = (window.store || localStorage);
  var prog = JSON.parse(sk.getItem('wordplay_progress') || '{}');
  if (prog["c1"] && prog["c1"][STORAGE_KEY] && prog["c1"][STORAGE_KEY].done)
    document.getElementById('masteryBadge').style.display = '';
})();
</script>
