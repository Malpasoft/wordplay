<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Book a Lesson | Word Play</title>
<link rel="stylesheet" href="/shared/base.css?v=v125">
<script src="/shared/auth.js?v=1"></script>
<script src="/shared/dark-init.js?v=v112"></script>
<style>
.book-page { max-width: 820px; margin: 0 auto; padding: 24px 20px 60px; }
.book-page h1 { font-family: var(--font-serif); font-size: 2.2rem; margin: 0 0 6px; }
.book-sub { color: var(--muted); font-size: .9rem; margin-bottom: 28px; }
.sec-head { font-family: var(--font-sans); font-size: .65rem; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: var(--amber); margin: 28px 0 14px; }
.day-group { margin-bottom: 18px; }
.day-label { font-family: var(--font-sans); font-size: .82rem; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
.slots { display: flex; flex-wrap: wrap; gap: 8px; }
.slot-btn { font-family: var(--font-sans); font-size: .82rem; font-weight: 600; padding: 8px 14px; border: 1.5px solid var(--hairline); border-radius: 6px; background: var(--paper); color: var(--ink); cursor: pointer; transition: border-color .15s, background .15s; }
.slot-btn:hover { border-color: var(--amber); background: rgba(184,134,11,.06); }
.slot-btn:disabled { opacity: .4; cursor: not-allowed; }
.booking-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 14px; border: 1.5px solid var(--hairline); border-radius: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.booking-when { font-family: var(--font-sans); font-size: .88rem; color: var(--ink); font-weight: 600; }
.badge { font-family: var(--font-sans); font-size: .62rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; padding: 4px 9px; border-radius: 4px; }
.badge.pending { background: rgba(184,134,11,.14); color: var(--amber); }
.badge.confirmed { background: rgba(46,125,82,.14); color: #2E7D52; }
.badge.declined, .badge.cancelled { background: rgba(0,0,0,.07); color: var(--muted); }
.cancel-link { font-family: var(--font-sans); font-size: .72rem; color: var(--muted); cursor: pointer; background: none; border: none; text-decoration: underline; }
.empty { color: var(--muted); font-size: .88rem; padding: 16px 0; }
.wa-btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px; background: #25D366; color: #fff; border-radius: 6px; text-decoration: none; font-family: var(--font-sans); font-size: .8rem; font-weight: 700; margin-top: 6px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); padding: 12px 22px; border-radius: 6px; font-family: var(--font-sans); font-size: .85rem; display: none; z-index: 100; }
</style>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a href="/dashboard.html" class="brand">Word Play</a>
    <span style="margin-left:auto"></span>
    <button class="dark-toggle" aria-label="Toggle dark mode" onclick="toggleDark()">&#9680; Dark</button>
    <button class="logout-btn" onclick="logout()" style="margin-left:8px;background:transparent;border:1.5px solid var(--hairline);color:var(--muted);font-family:var(--font-sans);font-size:.68rem;font-weight:600;padding:5px 12px;border-radius:3px;cursor:pointer">Logout</button>
  </div>
</header>

<div class="book-page">
  <h1>Book a lesson</h1>
  <p class="book-sub">Pick an open slot below. Your teacher confirms it, and you'll get an email once it's set.</p>

  <div class="sec-head">Your bookings</div>
  <div id="myBookings"><div class="empty">Loading…</div></div>

  <div class="sec-head">Available slots</div>
  <div id="availability"><div class="empty">Loading availability…</div></div>

  <div style="margin-top:24px">
    <a id="waBtn" href="#" target="_blank" rel="noopener" class="wa-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Ask Em on WhatsApp
    </a>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer class="site-footer">Word Play &middot; <a href="/privacy.html" style="color:var(--muted)">Privacy</a> &middot; <a href="/terms.html" style="color:var(--muted)">Terms</a></footer>

<script>
requireAuth();

var WA_NUMBER = '34600000000'; // update with Em's real WhatsApp number
document.getElementById('waBtn').href = 'https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent('Hola! I would like to book a lesson.');

var WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var WEEKS_AHEAD = 3;
var token = localStorage.getItem('wp_token');
var bookedSet = {}; // "date HH:MM" -> status, to disable already-taken slots

function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];}); }
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(function(){t.style.display='none';},2600); }
function pad(n){ return n<10?'0'+n:''+n; }
function ymd(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function addMinutes(hhmm, mins){
  var p = hhmm.split(':'); var total = parseInt(p[0])*60 + parseInt(p[1]) + mins;
  return pad(Math.floor(total/60)%24) + ':' + pad(total%60);
}

function loadMyBookings() {
  return fetch('/api/bookings', { headers: authHeaders() })
    .then(function(r){ return r.json(); })
    .then(function(data){
      var list = data.bookings || [];
      bookedSet = {};
      list.forEach(function(b){
        if (b.status === 'pending' || b.status === 'confirmed') bookedSet[b.date+' '+b.start_time] = b.status;
      });
      var active = list.filter(function(b){ return b.status==='pending'||b.status==='confirmed'; });
      var box = document.getElementById('myBookings');
      if (!active.length) { box.innerHTML = '<div class="empty">No upcoming bookings yet.</div>'; return; }
      box.innerHTML = active.map(function(b){
        return '<div class="booking-row">' +
          '<span class="booking-when">' + esc(b.date) + ' &middot; ' + esc(b.start_time) + '–' + esc(b.end_time) + '</span>' +
          '<span style="display:flex;align-items:center;gap:12px">' +
            '<span class="badge ' + b.status + '">' + b.status + '</span>' +
            '<button class="cancel-link" onclick="cancelBooking(' + b.id + ')">Cancel</button>' +
          '</span></div>';
      }).join('');
    });
}

function loadAvailability() {
  return fetch('/api/availability', { headers: authHeaders() })
    .then(function(r){ return r.json(); })
    .then(function(data){
      var box = document.getElementById('availability');
      var windows = data.windows || [];
      if (!windows.length) {
        box.innerHTML = '<div class="empty">Your teacher hasn\'t published availability yet. Reach out on WhatsApp to arrange a time.</div>';
        return;
      }
      // Build concrete slots for the next N weeks
      var byDate = {}; // dateStr -> [{start,end}]
      var today = new Date(); today.setHours(0,0,0,0);
      for (var d = 0; d < WEEKS_AHEAD * 7; d++) {
        var day = new Date(today); day.setDate(today.getDate() + d);
        if (d === 0) continue; // no same-day booking
        var wd = day.getDay();
        windows.filter(function(w){ return w.weekday === wd; }).forEach(function(w){
          var t = w.start_time;
          while (t < w.end_time) {
            var end = addMinutes(t, w.slot_minutes);
            if (end > w.end_time) break;
            var ds = ymd(day);
            (byDate[ds] = byDate[ds] || []).push({ start: t, end: end });
            t = end;
          }
        });
      }
      var dates = Object.keys(byDate).sort();
      if (!dates.length) { box.innerHTML = '<div class="empty">No open slots in the next ' + WEEKS_AHEAD + ' weeks.</div>'; return; }
      box.innerHTML = dates.map(function(ds){
        var dObj = new Date(ds + 'T00:00:00');
        var label = WEEKDAYS[dObj.getDay()] + ', ' + dObj.toLocaleDateString(undefined, { day:'numeric', month:'short' });
        var slots = byDate[ds].map(function(s){
          var taken = bookedSet[ds + ' ' + s.start];
          return '<button class="slot-btn" ' + (taken?'disabled':'') + ' onclick="requestSlot(\'' + ds + '\',\'' + s.start + '\',\'' + s.end + '\')">' +
            s.start + (taken ? ' ('+taken+')' : '') + '</button>';
        }).join('');
        return '<div class="day-group"><div class="day-label">' + esc(label) + '</div><div class="slots">' + slots + '</div></div>';
      }).join('');
    });
}

function requestSlot(date, start, end) {
  fetch('/api/bookings', { method:'POST', headers: authHeaders(), body: JSON.stringify({ date:date, start_time:start, end_time:end }) })
    .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, d:d}; }); })
    .then(function(res){
      if (!res.ok) { toast(res.d.error || 'Could not request slot.'); return; }
      toast('Requested! Em will confirm soon.');
      loadMyBookings().then(loadAvailability);
    })
    .catch(function(){ toast('Network error.'); });
}

function cancelBooking(id) {
  if (!confirm('Cancel this booking?')) return;
  fetch('/api/bookings/' + id, { method:'PUT', headers: authHeaders(), body: JSON.stringify({ status:'cancelled' }) })
    .then(function(r){ return r.json(); })
    .then(function(){ toast('Cancelled.'); loadMyBookings().then(loadAvailability); })
    .catch(function(){ toast('Network error.'); });
}

loadMyBookings().then(loadAvailability);
</script>
</body>
</html>
