.fc-wrap{perspective:800px;margin:0 auto 20px;max-width:480px}
.fc{width:100%;height:220px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;border-radius:10px}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;border:1px solid var(--hairline)}
.fc-front,.fc-back{background:var(--paper)}
.fc-back{transform:rotateY(180deg)}
.fc-word{font-size:1.8rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.fc-ipa{font-family:var(--font-sans);font-size:.85rem;color:var(--muted);margin-bottom:8px}
.fc-def{font-size:.95rem;color:var(--ink);margin-bottom:6px}
.fc-ex{font-size:.82rem;color:var(--muted);font-style:italic}
.fc-hint{font-family:var(--font-sans);font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:10px}
.fc-audio{background:none;border:1px solid var(--hairline);border-radius:4px;padding:5px 12px;font-family:var(--font-sans);font-size:.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;margin-top:8px}
.fc-audio:hover{border-color:var(--amber);color:var(--amber)}
.fc-nav{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:20px}
.fc-btn{font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;border-radius:4px;cursor:pointer;border:1.5px solid var(--hairline);background:transparent;color:var(--ink)}
.fc-btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.fc-counter{font-family:var(--font-sans);font-size:.75rem;color:var(--muted);font-weight:600}
.mastery-badge{display:inline-block;padding:8px 18px;background:rgba(184,134,11,.12);color:var(--amber);font-family:var(--font-sans);font-size:.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:4px;margin-bottom:16px}

<h1>Hobbies & Free Time</h1>
<nav class="chapter-nav">
  <a href="slides.html" class="chapter-nav-btn">Word List</a>
  <a href="flashcards.html" class="chapter-nav-btn active">Flashcards</a>

<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Mastered</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">15 words &middot; tap card to see definition</p>
<div class="fc-wrap"><div class="fc" id="fc" onclick="flipCard()">
  <div class="fc-face fc-front">
    <div class="fc-word" id="fcWord"></div>
    <div class="fc-ipa" id="fcIpa"></div>
    <button class="fc-audio" onclick="event.stopPropagation();speak()">&#9654; Listen</button>
    <div class="fc-hint">Tap to reveal</div>
  </div>
  <div class="fc-face fc-back">
    <div class="fc-def" id="fcDef"></div>
    <div class="fc-ex" id="fcEx"></div>
  </div>
</div></div>
<div class="fc-nav">
  <button class="fc-btn" id="btnPrev" onclick="prev()">&#8592; Prev</button>
  <span class="fc-counter"><span id="fcIdx">1</span> / <span id="fcTotal"></span></span>
  <button class="fc-btn primary" id="btnNext" onclick="next()">Next &#8594;</button>
</div>
<div style="text-align:center;margin:20px 0">
  <button class="fc-btn" onclick="markMastered()" id="btnMastered" style="width:220px">Mark as mastered</button>
</div>
</div>
<footer class="site-footer">Word Play &middot; French A2 &middot; Vocabulary</footer>
<script>
const MASTERY_KEY = "wordplay_vocab_a2_les-loisirs_mastered";
const SLUG = "les-loisirs";
const LEVEL = "a2";
const WORDS = [
  {
    "word": "le loisir",
    "ipa": "/lwa.ziʁ/",
    "def": "leisure / hobby",
    "ex": "Quels sont tes loisirs ?"
  },
  {
    "word": "faire du sport",
    "ipa": "/fɛʁ dy spɔʁ/",
    "def": "to do / play sport",
    "ex": "Je fais du sport trois fois par semaine."
  },
  {
    "word": "jouer au foot",
    "ipa": "/ʒwe o fut/",
    "def": "to play football",
    "ex": "Il joue au foot le week-end."
  },
  {
    "word": "nager / la natation",
    "ipa": "/na.ʒe/",
    "def": "to swim / swimming",
    "ex": "Elle fait de la natation le mardi."
  },
  {
    "word": "lire",
    "ipa": "/liʁ/",
    "def": "to read",
    "ex": "Je lis beaucoup pendant les vacances."
  },
  {
    "word": "regarder des films",
    "ipa": "/ʁə.ɡaʁ.de/",
    "def": "to watch films",
    "ex": "J'adore regarder des films en VO."
  },
  {
    "word": "écouter de la musique",
    "ipa": "/e.ku.te/",
    "def": "to listen to music",
    "ex": "J'écoute de la musique en travaillant."
  },
  {
    "word": "jouer d'un instrument",
    "ipa": "/ʒwe dœ̃/",
    "def": "to play an instrument",
    "ex": "Elle joue de la guitare."
  },
  {
    "word": "faire de la randonnée",
    "ipa": "/ʁɑ̃.dɔ.ne/",
    "def": "to go hiking",
    "ex": "Nous faisons de la randonnée en montagne."
  },
  {
    "word": "le cinéma",
    "ipa": "/si.ne.ma/",
    "def": "cinema / movies",
    "ex": "Je vais au cinéma chaque semaine."
  },
  {
    "word": "le théâtre",
    "ipa": "/te.atʁ/",
    "def": "theatre",
    "ex": "Ils sont allés au théâtre samedi."
  },
  {
    "word": "voyager",
    "ipa": "/vwa.ja.ʒe/",
    "def": "to travel",
    "ex": "J'adore voyager en Europe."
  },
  {
    "word": "cuisiner",
    "ipa": "/kɥi.zi.ne/",
    "def": "to cook",
    "ex": "Il cuisine pour ses amis le week-end."
  },
  {
    "word": "dessiner / peindre",
    "ipa": "/de.si.ne / pɛ̃dʁ/",
    "def": "to draw / to paint",
    "ex": "Elle dessine et peint depuis l'enfance."
  },
  {
    "word": "le week-end",
    "ipa": "/wik.ɛnd/",
    "def": "weekend",
    "ex": "Qu'est-ce que tu fais le week-end ?"
  }
];
let idx = 0;
function showCard() {
  const w = WORDS[idx];
  document.getElementById("fcWord").textContent = w.word;
  document.getElementById("fcIpa").textContent = w.ipa || "";
  document.getElementById("fcDef").textContent = w.def;
  document.getElementById("fcEx").textContent = w.ex || "";
  document.getElementById("fcIdx").textContent = idx + 1;
  document.getElementById("fcTotal").textContent = WORDS.length;
  document.getElementById("fc").classList.remove("flipped");
}
function flipCard() { document.getElementById("fc").classList.toggle("flipped"); }
function prev() { if (idx > 0) { idx--; showCard(); } }
function next() {
  if (idx < WORDS.length - 1) { idx++; showCard(); }
  else { markMastered(); }
}
function speak() {
  const u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = "fr-FR"; u.rate = 0.9;
  speechSynthesis.speak(u);
}
function markMastered() {
  const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
  if (!prog[LEVEL]) prog[LEVEL] = {};
  prog[LEVEL]["vocab_mastered_" + SLUG] = { done: true, date: new Date().toISOString() };
  localStorage.setItem("wordplay_progress", JSON.stringify(prog));
  document.getElementById("masteryBadge").style.display = "block";
  if (typeof pushProgress === "function") pushProgress();
}
function checkMastered() {
  try {
    const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
    if (prog[LEVEL] && prog[LEVEL]["vocab_mastered_" + SLUG] && prog[LEVEL]["vocab_mastered_" + SLUG].done)
      document.getElementById("masteryBadge").style.display = "block";
  } catch(e) {}
}
showCard(); checkMastered();
</script>

</body>
