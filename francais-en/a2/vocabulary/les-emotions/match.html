<script>
const MASTERY_KEY = "wordplay_vocab_a2_les-emotions_mastered";
const SLUG = "les-emotions";
const LEVEL = "a2";
const PAIRS = [
  {
    "fr": "heureux / heureuse",
    "en": "happy"
  },
  {
    "fr": "triste",
    "en": "sad"
  },
  {
    "fr": "content(e)",
    "en": "pleased / happy"
  },
  {
    "fr": "énervé(e)",
    "en": "annoyed / irritated"
  },
  {
    "fr": "inquiet / inquiète",
    "en": "worried / anxious"
  },
  {
    "fr": "surpris(e)",
    "en": "surprised"
  },
  {
    "fr": "fier / fière",
    "en": "proud"
  },
  {
    "fr": "déçu(e)",
    "en": "disappointed"
  },
  {
    "fr": "soulagé(e)",
    "en": "relieved"
  },
  {
    "fr": "nerveux / nerveuse",
    "en": "nervous"
  }
];
const TOTAL_NEEDED = 20;
const LIVES = 3;
let lives = LIVES, matched = 0, round = 0, selFr = null, selEn = null;
function heartSVG(full) {
  return '<svg class="heart-svg" viewBox="0 0 24 24"><path d="' + (full
    ? "M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"
    : "M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z")
    + '" fill="' + (full ? "currentColor" : "none") + '" stroke="currentColor" stroke-width="1.5"/></svg>';
}
function renderHearts() {
  const r = document.getElementById("heartRow");
  r.innerHTML = "";
  for (let i = 0; i < LIVES; i++) r.innerHTML += heartSVG(i < lives);
}
function shuffle(a) { for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildRound() {
  const fr = document.getElementById("colFr");
  const en = document.getElementById("colEn");
  fr.innerHTML = ""; en.innerHTML = "";
  const items = shuffle([...PAIRS]);
  const defs = shuffle(items.map(p => p.en));
  items.forEach((p,i) => {
    const bf = document.createElement("div");
    bf.className = "match-item"; bf.dataset.id = p.fr; bf.dataset.type = "fr";
    bf.textContent = p.fr; bf.onclick = () => selectItem(bf);
    fr.appendChild(bf);
    const be = document.createElement("div");
    be.className = "match-item"; be.dataset.id = defs[i]; be.dataset.type = "en";
    be.textContent = defs[i]; be.onclick = () => selectItem(be);
    en.appendChild(be);
  });
  selFr = null; selEn = null;
}
function selectItem(el) {
  if (el.classList.contains("correct")) return;
  if (el.dataset.type === "fr") { if (selFr) selFr.classList.remove("selected"); selFr = el; }
  else { if (selEn) selEn.classList.remove("selected"); selEn = el; }
  el.classList.add("selected");
  if (selFr && selEn) checkMatch();
}
function findEnDef(frWord) {
  const p = PAIRS.find(p => p.fr === frWord);
  return p ? p.en : null;
}
function checkMatch() {
  const correct = findEnDef(selFr.dataset.id) === selEn.dataset.id;
  if (correct) {
    selFr.classList.remove("selected"); selFr.classList.add("correct");
    selEn.classList.remove("selected"); selEn.classList.add("correct");
    matched++;
    if (matched >= TOTAL_NEEDED) { winGame(); return; }
    if (document.querySelectorAll(".match-item:not(.correct)").length === 0) {
      round++; buildRound();
    }
  } else {
    lives--; renderHearts();
    selFr.classList.add("wrong"); selEn.classList.add("wrong");
    setTimeout(() => { selFr.classList.remove("wrong","selected"); selEn.classList.remove("wrong","selected"); selFr=null; selEn=null; }, 600);
    if (lives <= 0) { document.getElementById("matchStatus").textContent = "Game over — try again!"; setTimeout(resetGame, 1200); return; }
  }
  selFr = null; selEn = null;
}
function winGame() {
  const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
  if (!prog[LEVEL]) prog[LEVEL] = {};
  prog[LEVEL]["vocab_mastered_" + SLUG] = { done: true, date: new Date().toISOString() };
  localStorage.setItem("wordplay_progress", JSON.stringify(prog));
  document.getElementById("masteryBadge").style.display = "block";
  document.getElementById("winMsg").style.display = "block";
  document.getElementById("matchStatus").textContent = "All matched!";
  if (typeof pushProgress === "function") pushProgress();
}
function resetGame() { lives = LIVES; matched = 0; round = 0; renderHearts(); buildRound(); document.getElementById("matchStatus").textContent = "Match the French word to its English meaning"; }
renderHearts(); buildRound();
</script>
