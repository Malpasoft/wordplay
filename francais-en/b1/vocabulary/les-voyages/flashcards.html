<h1>les-voyages</h1>
<nav class="chapter-nav">
  <a href="slides.html" class="chapter-nav-btn">Word List</a>

<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Mastered</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">15 words &middot; tap card to see definition</p>
<div class="fc-wrap"><div class="fc" id="fc" onclick="flipCard()">
  <div class="fc-face fc-front">
    <div class="fc-word" id="fcWord"></div>
    <div class="fc-ipa" id="fcIpa"></div>
    <button class="fc-audio" onclick="event.stopPropagation();speak()">&#9654; Listen</button>
    <div class="fc-hint">Tap to reveal</div>
  </div>
  <div class="fc-face fc-back">
    <div class="fc-def" id="fcDef"></div>
    <div class="fc-ex" id="fcEx"></div>
  </div>
</div></div>
<div class="fc-nav">
  <button class="fc-btn" id="btnPrev" onclick="prev()">&#8592; Prev</button>
  <span class="fc-counter"><span id="fcIdx">1</span> / <span id="fcTotal"></span></span>
  <button class="fc-btn primary" id="btnNext" onclick="next()">Next &#8594;</button>
</div>
<div style="text-align:center;margin:20px 0">
  <button class="fc-btn" onclick="markMastered()" id="btnMastered" style="width:220px">Mark as mastered</button>
</div>
</div>
<footer class="site-footer">Word Play &middot; French B1 &middot; Vocabulary</footer>
<script>
const MASTERY_KEY = "wordplay_vocab_b1_les-voyages_mastered";
const SLUG = "les-voyages";
const LEVEL = "b1";
const WORDS = [
  {
    "word": "réserver",
    "ipa": "/ʁe.zɛʁ.ve/",
    "def": "to book / reserve",
    "ex": "J'ai réservé une chambre d'hôtel pour trois nuits."
  },
  {
    "word": "un vol",
    "ipa": "/œ̃ vɔl/",
    "def": "a flight",
    "ex": "Mon vol part à six heures du matin."
  },
  {
    "word": "la douane",
    "ipa": "/la dwan/",
    "def": "customs",
    "ex": "Nous avons dû passer par la douane à l'aéroport."
  },
  {
    "word": "un passeport",
    "ipa": "/œ̃ pas.pɔʁ/",
    "def": "a passport",
    "ex": "N'oublie pas ton passeport avant de partir."
  },
  {
    "word": "faire ses bagages",
    "ipa": "/fɛʁ se ba.ɡaʒ/",
    "def": "to pack one's bags",
    "ex": "Je fais mes bagages la veille du départ."
  },
  {
    "word": "un office de tourisme",
    "ipa": "/œ̃ nɔ.fis də tuʁ.ism/",
    "def": "a tourist information office",
    "ex": "Nous sommes allés à l'office de tourisme pour des conseils."
  },
  {
    "word": "un hébergement",
    "ipa": "/œ̃ ne.bɛʁ.ʒə.mɑ̃/",
    "def": "accommodation",
    "ex": "Il cherche un hébergement pas trop cher en centre-ville."
  },
  {
    "word": "annuler",
    "ipa": "/a.ny.le/",
    "def": "to cancel",
    "ex": "Elle a dû annuler sa réservation à cause d'une urgence."
  },
  {
    "word": "une escale",
    "ipa": "/yn ɛs.kal/",
    "def": "a stopover / layover",
    "ex": "Il y a une escale de deux heures à Amsterdam."
  },
  {
    "word": "le décalage horaire",
    "ipa": "/lə de.ka.laʒ ɔ.ʁɛʁ/",
    "def": "jet lag / time difference",
    "ex": "J'ai souffert du décalage horaire pendant trois jours."
  },
  {
    "word": "un circuit touristique",
    "ipa": "/œ̃ siʁ.kwi tuʁ.is.tik/",
    "def": "a tourist circuit / guided tour",
    "ex": "Nous avons suivi un circuit touristique en Provence."
  },
  {
    "word": "la carte d'embarquement",
    "ipa": "/la kaʁt dɑ̃.baʁ.kə.mɑ̃/",
    "def": "a boarding pass",
    "ex": "N'oublie pas ta carte d'embarquement au moment d'embarquer."
  },
  {
    "word": "dépayser",
    "ipa": "/de.pe.i.ze/",
    "def": "to give a change of scenery",
    "ex": "Ce voyage nous a complètement dépaysés."
  },
  {
    "word": "un guide touristique",
    "ipa": "/œ̃ ɡid tuʁ.is.tik/",
    "def": "a travel guide / tour guide",
    "ex": "Elle a acheté un guide touristique sur le Maroc."
  },
  {
    "word": "les transports en commun",
    "ipa": "/le tʁɑ̃s.pɔʁ ɑ̃ kɔ.mɛ̃/",
    "def": "public transport",
    "ex": "On peut visiter la ville grâce aux transports en commun."
  }
];
let idx = 0;
function showCard() {
  const w = WORDS[idx];
  document.getElementById("fcWord").textContent = w.word;
  document.getElementById("fcIpa").textContent = w.ipa || "";
  document.getElementById("fcDef").textContent = w.def;
  document.getElementById("fcEx").textContent = w.ex || "";
  document.getElementById("fcIdx").textContent = idx + 1;
  document.getElementById("fcTotal").textContent = WORDS.length;
  document.getElementById("fc").classList.remove("flipped");
}
function flipCard() { document.getElementById("fc").classList.toggle("flipped"); }
function prev() { if (idx > 0) { idx--; showCard(); } }
function next() {
  if (idx < WORDS.length - 1) { idx++; showCard(); }
  else { markMastered(); }
}
function speak() {
  const u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = "fr-FR"; u.rate = 0.9;
  speechSynthesis.speak(u);
}
function markMastered() {
  const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
  if (!prog[LEVEL]) prog[LEVEL] = {};
  prog[LEVEL]["vocab_mastered_" + SLUG] = { done: true, date: new Date().toISOString() };
  localStorage.setItem("wordplay_progress", JSON.stringify(prog));
  document.getElementById("masteryBadge").style.display = "block";
  if (typeof pushProgress === "function") pushProgress();
}
function checkMastered() {
  try {
    const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
    if (prog[LEVEL] && prog[LEVEL]["vocab_mastered_" + SLUG] && prog[LEVEL]["vocab_mastered_" + SLUG].done)
      document.getElementById("masteryBadge").style.display = "block";
  } catch(e) {}
}
showCard(); checkMastered();
</script>
