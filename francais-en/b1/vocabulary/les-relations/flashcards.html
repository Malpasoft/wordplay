<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Mastered</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">14 words &middot; tap card to see definition</p>
<div class="fc-wrap"><div class="fc" id="fc" onclick="flipCard()">
  <div class="fc-face fc-front">
    <div class="fc-word" id="fcWord"></div>
    <div class="fc-ipa" id="fcIpa"></div>
    <button class="fc-audio" onclick="event.stopPropagation();speak()">&#9654; Listen</button>
    <div class="fc-hint">Tap to reveal</div>
  </div>
  <div class="fc-face fc-back">
    <div class="fc-def" id="fcDef"></div>
    <div class="fc-ex" id="fcEx"></div>
  </div>
</div></div>
<div class="fc-nav">
  <button class="fc-btn" id="btnPrev" onclick="prev()">&#8592; Prev</button>
  <span class="fc-counter"><span id="fcIdx">1</span> / <span id="fcTotal"></span></span>
  <button class="fc-btn primary" id="btnNext" onclick="next()">Next &#8594;</button>
</div>
<div style="text-align:center;margin:20px 0">
  <button class="fc-btn" onclick="markMastered()" id="btnMastered" style="width:220px">Mark as mastered</button>
</div>

<footer class="site-footer">Word Play &middot; French B1 &middot; Vocabulary</footer>
<script>
const MASTERY_KEY = "wordplay_vocab_b1_les-relations_mastered";
const SLUG = "les-relations";
const LEVEL = "b1";
const WORDS = [
  {
    "word": "la confiance",
    "ipa": "/la kɔ̃.fjɑ̃s/",
    "def": "trust / confidence",
    "ex": "La confiance est la base d'une bonne amitié."
  },
  {
    "word": "se disputer",
    "ipa": "/sə dis.py.te/",
    "def": "to argue / quarrel",
    "ex": "Ils se disputent souvent à propos d'argent."
  },
  {
    "word": "se réconcilier",
    "ipa": "/sə ʁe.kɔ̃.si.lje/",
    "def": "to make up / reconcile",
    "ex": "Ils se sont réconciliés après une longue dispute."
  },
  {
    "word": "soutenir",
    "ipa": "/su.tə.niʁ/",
    "def": "to support / back up",
    "ex": "Elle soutient ses amis dans les moments difficiles."
  },
  {
    "word": "un malentendu",
    "ipa": "/œ̃ ma.lɑ̃.tɑ̃.dy/",
    "def": "a misunderstanding",
    "ex": "Ce conflit est dû à un simple malentendu."
  },
  {
    "word": "faire confiance à",
    "ipa": "/fɛʁ kɔ̃.fjɑ̃s a/",
    "def": "to trust someone",
    "ex": "Je fais entièrement confiance à mon meilleur ami."
  },
  {
    "word": "la jalousie",
    "ipa": "/la ʒa.lu.zi/",
    "def": "jealousy",
    "ex": "La jalousie peut détruire une relation amoureuse."
  },
  {
    "word": "s'entendre avec",
    "ipa": "/sɑ̃.tɑ̃dʁ a.vɛk/",
    "def": "to get along with",
    "ex": "Je m'entends très bien avec mes collègues."
  },
  {
    "word": "rompre avec",
    "ipa": "/ʁɔ̃pʁ a.vɛk/",
    "def": "to break up with",
    "ex": "Elle a décidé de rompre avec son petit ami."
  },
  {
    "word": "un soutien moral",
    "ipa": "/œ̃ su.tjɛ̃ mɔ.ʁal/",
    "def": "moral support",
    "ex": "Ses amis lui ont apporté un soutien moral pendant sa maladie."
  },
  {
    "word": "la loyauté",
    "ipa": "/la lwa.jo.te/",
    "def": "loyalty",
    "ex": "La loyauté est une qualité indispensable en amitié."
  },
  {
    "word": "communiquer",
    "ipa": "/kɔ.my.ni.ke/",
    "def": "to communicate",
    "ex": "Il est essentiel de bien communiquer dans un couple."
  },
  {
    "word": "une rupture",
    "ipa": "/yn ʁyp.tyʁ/",
    "def": "a break-up",
    "ex": "La rupture a été difficile pour les deux partenaires."
  },
  {
    "word": "le respect mutuel",
    "ipa": "/lə ʁɛs.pɛ myt.yɛl/",
    "def": "mutual respect",
    "ex": "Le respect mutuel est fondamental dans toute relation."
  }
];
let idx = 0;
function showCard() {
  const w = WORDS[idx];
  document.getElementById("fcWord").textContent = w.word;
  document.getElementById("fcIpa").textContent = w.ipa || "";
  document.getElementById("fcDef").textContent = w.def;
  document.getElementById("fcEx").textContent = w.ex || "";
  document.getElementById("fcIdx").textContent = idx + 1;
  document.getElementById("fcTotal").textContent = WORDS.length;
  document.getElementById("fc").classList.remove("flipped");
}
function flipCard() { document.getElementById("fc").classList.toggle("flipped"); }
function prev() { if (idx > 0) { idx--; showCard(); } }
function next() {
  if (idx < WORDS.length - 1) { idx++; showCard(); }
  else { markMastered(); }
}
function speak() {
  const u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = "fr-FR"; u.rate = 0.9;
  speechSynthesis.speak(u);
}
function markMastered() {
  const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
  if (!prog[LEVEL]) prog[LEVEL] = {};
  prog[LEVEL]["vocab_mastered_" + SLUG] = { done: true, date: new Date().toISOString() };
  localStorage.setItem("wordplay_progress", JSON.stringify(prog));
  document.getElementById("masteryBadge").style.display = "block";
  if (typeof pushProgress === "function") pushProgress();
}
function checkMastered() {
  try {
    const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
    if (prog[LEVEL] && prog[LEVEL]["vocab_mastered_" + SLUG] && prog[LEVEL]["vocab_mastered_" + SLUG].done)
      document.getElementById("masteryBadge").style.display = "block";
  } catch(e) {}
}
showCard(); checkMastered();
</script>
