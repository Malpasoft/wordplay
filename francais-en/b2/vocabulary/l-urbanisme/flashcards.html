<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Mastered</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">15 words &middot; tap card to see definition</p>
<div class="fc-wrap"><div class="fc" id="fc" onclick="flipCard()">
  <div class="fc-face fc-front">
    <div class="fc-word" id="fcWord"></div>
    <div class="fc-ipa" id="fcIpa"></div>
    <button class="fc-audio" onclick="event.stopPropagation();speak()">&#9654; Listen</button>
    <div class="fc-hint">Tap to reveal</div>
  </div>
  <div class="fc-face fc-back">
    <div class="fc-def" id="fcDef"></div>
    <div class="fc-ex" id="fcEx"></div>
  </div>
</div></div>
<div class="fc-nav">
  <button class="fc-btn" id="btnPrev" onclick="prev()">&#8592; Prev</button>
  <span class="fc-counter"><span id="fcIdx">1</span> / <span id="fcTotal"></span></span>
  <button class="fc-btn primary" id="btnNext" onclick="next()">Next &#8594;</button>
</div>

  <button class="fc-btn" onclick="markMastered()" id="btnMastered" style="width:220px">Mark as mastered</button>

<footer class="site-footer">Word Play &middot; French B2 &middot; Vocabulary</footer>
<script>
const MASTERY_KEY = "wordplay_vocab_b2_l-urbanisme_mastered";
const SLUG = "l-urbanisme";
const LEVEL = "b2";
const WORDS = [
  {
    "word": "l'urbanisme",
    "ipa": "/lyʁbanism/",
    "def": "urban planning",
    "ex": "Un urbanisme mal pensé peut aggraver les inégalités sociales au sein d'une ville."
  },
  {
    "word": "l'infrastructure",
    "ipa": "/lɛ̃fʁastʁyktyʁ/",
    "def": "infrastructure",
    "ex": "Des infrastructures de transport modernes sont indispensables à la compétitivité économique d'une région."
  },
  {
    "word": "la densité urbaine",
    "ipa": "/la dɑ̃site yʁbɛn/",
    "def": "urban density",
    "ex": "Une forte densité urbaine permet de réduire les déplacements et d'optimiser les services publics."
  },
  {
    "word": "l'étalement urbain",
    "ipa": "/letalmɑ̃ yʁbɛ̃/",
    "def": "urban sprawl",
    "ex": "L'étalement urbain détruit les terres agricoles et augmente la dépendance à la voiture individuelle."
  },
  {
    "word": "le logement social",
    "ipa": "/lə lɔʒmɑ̃ sɔsjal/",
    "def": "social housing",
    "ex": "Le manque de logements sociaux aggrave la crise immobilière dans les grandes métropoles."
  },
  {
    "word": "la rénovation",
    "ipa": "/la ʁenɔvasjɔ̃/",
    "def": "renovation",
    "ex": "La rénovation du vieux quartier a permis de préserver le patrimoine architectural tout en modernisant les logements."
  },
  {
    "word": "les espaces verts",
    "ipa": "/lez‿ɛspas vɛʁ/",
    "def": "green spaces",
    "ex": "Les espaces verts en ville améliorent la qualité de vie et contribuent à réduire les îlots de chaleur."
  },
  {
    "word": "la mobilité",
    "ipa": "/la mɔbilite/",
    "def": "mobility",
    "ex": "La mobilité douce, vélo et marche, est au cœur des nouvelles politiques urbaines."
  },
  {
    "word": "le quartier",
    "ipa": "/lə kaʁtje/",
    "def": "neighbourhood / district",
    "ex": "Ce quartier historique a su conserver son identité tout en accueillant de nouveaux habitants."
  },
  {
    "word": "le plan d'urbanisme",
    "ipa": "/lə plɑ̃ dyʁbanism/",
    "def": "urban development plan",
    "ex": "Le plan d'urbanisme de la ville prévoit la création de cinq nouveaux écoquartiers d'ici 2030."
  },
  {
    "word": "la gentrification",
    "ipa": "/la ʒɑ̃tʁifikasjɔ̃/",
    "def": "gentrification",
    "ex": "La gentrification de ce quartier populaire a chassé les habitants les plus modestes vers la périphérie."
  },
  {
    "word": "la smart city",
    "ipa": "/la smaʁt siti/",
    "def": "smart city",
    "ex": "La smart city utilise les données numériques pour améliorer la gestion des services urbains."
  },
  {
    "word": "le bâtiment durable",
    "ipa": "/lə batimɑ̃ dyʁabl/",
    "def": "sustainable building",
    "ex": "Les bâtiments durables consomment moins d'énergie et réduisent l'empreinte carbone du secteur immobilier."
  },
  {
    "word": "l'aménagement",
    "ipa": "/lamenaʒmɑ̃/",
    "def": "planning / development",
    "ex": "L'aménagement du territoire doit concilier développement économique et préservation de l'environnement."
  },
  {
    "word": "le transport en commun",
    "ipa": "/lə tʁɑ̃spɔʁ ɑ̃ kɔmœ̃/",
    "def": "public transport",
    "ex": "Investir dans les transports en commun réduit la congestion routière et les émissions de CO₂."
  }
];
let idx = 0;
function showCard() {
  const w = WORDS[idx];
  document.getElementById("fcWord").textContent = w.word;
  document.getElementById("fcIpa").textContent = w.ipa || "";
  document.getElementById("fcDef").textContent = w.def;
  document.getElementById("fcEx").textContent = w.ex || "";
  document.getElementById("fcIdx").textContent = idx + 1;
  document.getElementById("fcTotal").textContent = WORDS.length;
  document.getElementById("fc").classList.remove("flipped");
}
function flipCard() { document.getElementById("fc").classList.toggle("flipped"); }
function prev() { if (idx > 0) { idx--; showCard(); } }
function next() {
  if (idx < WORDS.length - 1) { idx++; showCard(); }
  else { markMastered(); }
}
function speak() {
  const u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = "fr-FR"; u.rate = 0.9;
  speechSynthesis.speak(u);
}
function markMastered() {
  const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
  if (!prog[LEVEL]) prog[LEVEL] = {};
  prog[LEVEL]["vocab_mastered_" + SLUG] = { done: true, date: new Date().toISOString() };
  localStorage.setItem("wordplay_progress", JSON.stringify(prog));
  document.getElementById("masteryBadge").style.display = "block";
  if (typeof pushProgress === "function") pushProgress();
}
function checkMastered() {
  try {
    const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
    if (prog[LEVEL] && prog[LEVEL]["vocab_mastered_" + SLUG] && prog[LEVEL]["vocab_mastered_" + SLUG].done)
      document.getElementById("masteryBadge").style.display = "block";
  } catch(e) {}
}
showCard(); checkMastered();
</script>
