<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Mastered</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">15 words &middot; tap card to see definition</p>
<div class="fc-wrap"><div class="fc" id="fc" onclick="flipCard()">
  <div class="fc-face fc-front">
    <div class="fc-word" id="fcWord"></div>
    <div class="fc-ipa" id="fcIpa"></div>
    <button class="fc-audio" onclick="event.stopPropagation();speak()">&#9654; Listen</button>
    <div class="fc-hint">Tap to reveal</div>
  </div>
  <div class="fc-face fc-back">
    <div class="fc-def" id="fcDef"></div>
    <div class="fc-ex" id="fcEx"></div>
  </div>
</div></div>
<div class="fc-nav">
  <button class="fc-btn" id="btnPrev" onclick="prev()">&#8592; Prev</button>
  <span class="fc-counter"><span id="fcIdx">1</span> / <span id="fcTotal"></span></span>
  <button class="fc-btn primary" id="btnNext" onclick="next()">Next &#8594;</button>
</div>
<div style="text-align:center;margin:20px 0">
  <button class="fc-btn" onclick="markMastered()" id="btnMastered" style="width:220px">Mark as mastered</button>
</div>
</div>
<footer class="site-footer">Word Play &middot; French B2 &middot; Vocabulary</footer>
<script>
const MASTERY_KEY = "wordplay_vocab_b2_les-enjeux-mondiaux_mastered";
const SLUG = "les-enjeux-mondiaux";
const LEVEL = "b2";
const WORDS = [
  {
    "word": "l'enjeu mondial",
    "ipa": "/lɑ̃ʒø mɔ̃djal/",
    "def": "global challenge / global issue",
    "ex": "La lutte contre la pauvreté est l'un des enjeux mondiaux les plus urgents de notre siècle."
  },
  {
    "word": "la crise climatique",
    "ipa": "/la kʁiz klimatik/",
    "def": "climate crisis",
    "ex": "La crise climatique exige des mesures radicales et immédiates de la part de tous les gouvernements."
  },
  {
    "word": "la géopolitique",
    "ipa": "/la ʒeɔpɔlitik/",
    "def": "geopolitics",
    "ex": "La géopolitique mondiale est de plus en plus marquée par la rivalité entre les grandes puissances."
  },
  {
    "word": "la sécurité alimentaire",
    "ipa": "/la sekyʁite alimɑ̃tɛʁ/",
    "def": "food security",
    "ex": "La sécurité alimentaire de millions de personnes est menacée par les sécheresses à répétition."
  },
  {
    "word": "la transition énergétique",
    "ipa": "/la tʁɑ̃zisjɔ̃ enɛʁʒetik/",
    "def": "energy transition",
    "ex": "La transition énergétique vers les renouvelables nécessite des investissements colossaux."
  },
  {
    "word": "la surpopulation",
    "ipa": "/la syʁpɔpylasjɔ̃/",
    "def": "overpopulation",
    "ex": "La surpopulation dans certaines mégapoles entraîne une pression insoutenable sur les ressources."
  },
  {
    "word": "le conflit armé",
    "ipa": "/lə kɔ̃fli‿aʁme/",
    "def": "armed conflict",
    "ex": "Les conflits armés déplacent chaque année des millions de personnes à travers le monde."
  },
  {
    "word": "l'accord international",
    "ipa": "/lakɔʁ‿ɛ̃tɛʁnasjɔnal/",
    "def": "international agreement",
    "ex": "L'accord international sur le climat a fixé des objectifs ambitieux de réduction des émissions."
  },
  {
    "word": "la ressource naturelle",
    "ipa": "/la ʁəsuʁs natyʁɛl/",
    "def": "natural resource",
    "ex": "La gestion durable des ressources naturelles est un défi majeur pour les générations à venir."
  },
  {
    "word": "la catastrophe humanitaire",
    "ipa": "/la katastʁɔf ymanitɛʁ/",
    "def": "humanitarian catastrophe",
    "ex": "La catastrophe humanitaire provoquée par la sécheresse a nécessité une aide internationale urgente."
  },
  {
    "word": "le développement durable",
    "ipa": "/lə devlɔpmɑ̃ dyʁabl/",
    "def": "sustainable development",
    "ex": "Le développement durable cherche à concilier croissance économique et respect de l'environnement."
  },
  {
    "word": "la neutralité carbone",
    "ipa": "/la nøtʁalite kaʁbɔn/",
    "def": "carbon neutrality",
    "ex": "L'Union européenne s'est engagée à atteindre la neutralité carbone d'ici 2050."
  },
  {
    "word": "la biodiversité",
    "ipa": "/la bjɔdivɛʁsite/",
    "def": "biodiversity",
    "ex": "La perte de biodiversité est une menace aussi grave que le changement climatique pour la vie sur Terre."
  },
  {
    "word": "l'État fragile",
    "ipa": "/leta fʁaʒil/",
    "def": "fragile state",
    "ex": "Les États fragiles peinent à assurer la sécurité et les services de base à leurs populations."
  },
  {
    "word": "l'aide humanitaire",
    "ipa": "/lɛd ymanitɛʁ/",
    "def": "humanitarian aid",
    "ex": "L'acheminement de l'aide humanitaire est souvent entravé par les combats dans les zones de guerre."
  }
];
let idx = 0;
function showCard() {
  const w = WORDS[idx];
  document.getElementById("fcWord").textContent = w.word;
  document.getElementById("fcIpa").textContent = w.ipa || "";
  document.getElementById("fcDef").textContent = w.def;
  document.getElementById("fcEx").textContent = w.ex || "";
  document.getElementById("fcIdx").textContent = idx + 1;
  document.getElementById("fcTotal").textContent = WORDS.length;
  document.getElementById("fc").classList.remove("flipped");
}
function flipCard() { document.getElementById("fc").classList.toggle("flipped"); }
function prev() { if (idx > 0) { idx--; showCard(); } }
function next() {
  if (idx < WORDS.length - 1) { idx++; showCard(); }
  else { markMastered(); }
}
function speak() {
  const u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = "fr-FR"; u.rate = 0.9;
  speechSynthesis.speak(u);
}
function markMastered() {
  const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
  if (!prog[LEVEL]) prog[LEVEL] = {};
  prog[LEVEL]["vocab_mastered_" + SLUG] = { done: true, date: new Date().toISOString() };
  localStorage.setItem("wordplay_progress", JSON.stringify(prog));
  document.getElementById("masteryBadge").style.display = "block";
  if (typeof pushProgress === "function") pushProgress();
}
function checkMastered() {
  try {
    const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
    if (prog[LEVEL] && prog[LEVEL]["vocab_mastered_" + SLUG] && prog[LEVEL]["vocab_mastered_" + SLUG].done)
      document.getElementById("masteryBadge").style.display = "block";
  } catch(e) {}
}
showCard(); checkMastered();
</script>
