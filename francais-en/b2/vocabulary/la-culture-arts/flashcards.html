<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Mastered</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">15 words &middot; tap card to see definition</p>
<div class="fc-wrap"><div class="fc" id="fc" onclick="flipCard()">
  <div class="fc-face fc-front">
    <div class="fc-word" id="fcWord"></div>
    <div class="fc-ipa" id="fcIpa"></div>
    <button class="fc-audio" onclick="event.stopPropagation();speak()">&#9654; Listen</button>
    <div class="fc-hint">Tap to reveal</div>
  </div>
  <div class="fc-face fc-back">
    <div class="fc-def" id="fcDef"></div>
    <div class="fc-ex" id="fcEx"></div>
  </div>
</div></div>
<div class="fc-nav">
  <button class="fc-btn" id="btnPrev" onclick="prev()">&#8592; Prev</button>
  <span class="fc-counter"><span id="fcIdx">1</span> / <span id="fcTotal"></span></span>
  <button class="fc-btn primary" id="btnNext" onclick="next()">Next &#8594;</button>
</div>
<div style="text-align:center;margin:20px 0">
  <button class="fc-btn" onclick="markMastered()" id="btnMastered" style="width:220px">Mark as mastered</button>
</div>
</div>
<footer class="site-footer">Word Play &middot; French B2 &middot; Vocabulary</footer>
<script>
const MASTERY_KEY = "wordplay_vocab_b2_la-culture-arts_mastered";
const SLUG = "la-culture-arts";
const LEVEL = "b2";
const WORDS = [
  {
    "word": "le patrimoine culturel",
    "ipa": "/lə patʁimwan kyltɥʁɛl/",
    "def": "cultural heritage",
    "ex": "La préservation du patrimoine culturel est une responsabilité collective envers les générations futures."
  },
  {
    "word": "l'exposition",
    "ipa": "/lɛkspɔzisjɔ̃/",
    "def": "exhibition",
    "ex": "Cette exposition rétrospective rassemble plus de deux cents œuvres du peintre catalan."
  },
  {
    "word": "le chef-d'œuvre",
    "ipa": "/lə ʃɛ dœvʁ/",
    "def": "masterpiece",
    "ex": "La Joconde est sans doute le chef-d'œuvre le plus célèbre de la Renaissance italienne."
  },
  {
    "word": "le dramaturge",
    "ipa": "/lə dʁamatyʁʒ/",
    "def": "playwright",
    "ex": "Ce dramaturge contemporain aborde des thèmes sociaux avec une langue provocante et précise."
  },
  {
    "word": "le réalisateur",
    "ipa": "/lə ʁealizatœʁ/",
    "def": "film director",
    "ex": "Le réalisateur a choisi de tourner entièrement en décors naturels pour renforcer le réalisme."
  },
  {
    "word": "la critique littéraire",
    "ipa": "/la kʁitik litɛʁɛʁ/",
    "def": "literary criticism",
    "ex": "La critique littéraire a salué ce roman pour sa profondeur psychologique et son style épuré."
  },
  {
    "word": "l'avant-garde",
    "ipa": "/lavɑ̃ɡaʁd/",
    "def": "avant-garde",
    "ex": "Ce mouvement d'avant-garde a rompu avec les conventions esthétiques de l'époque."
  },
  {
    "word": "le mécénat",
    "ipa": "/lə mesena/",
    "def": "patronage (of the arts)",
    "ex": "Le mécénat d'entreprise permet de financer des projets culturels ambitieux sans dépendre de l'État."
  },
  {
    "word": "le musée",
    "ipa": "/lə myze/",
    "def": "museum",
    "ex": "Ce musée national accueille chaque année plus d'un million de visiteurs du monde entier."
  },
  {
    "word": "l'œuvre d'art",
    "ipa": "/lœvʁ‿daʁ/",
    "def": "work of art",
    "ex": "Cette œuvre d'art a été vendue aux enchères pour un prix record de vingt millions d'euros."
  },
  {
    "word": "l'interprétation",
    "ipa": "/lɛ̃tɛʁpʁetasjɔ̃/",
    "def": "interpretation / performance",
    "ex": "L'interprétation de cette sonate par la pianiste a reçu une ovation debout."
  },
  {
    "word": "la subvention",
    "ipa": "/la sybvɑ̃sjɔ̃/",
    "def": "subsidy / grant",
    "ex": "Sans les subventions de l'État, de nombreux théâtres régionaux fermeraient leurs portes."
  },
  {
    "word": "le festival",
    "ipa": "/lə fɛstival/",
    "def": "festival",
    "ex": "Le festival de Cannes récompense chaque année les meilleures productions cinématographiques mondiales."
  },
  {
    "word": "l'adaptation",
    "ipa": "/ladaptasjɔ̃/",
    "def": "adaptation",
    "ex": "Cette adaptation cinématographique du roman a déçu les lecteurs les plus fidèles."
  },
  {
    "word": "la censure",
    "ipa": "/la sɑ̃syʁ/",
    "def": "censorship",
    "ex": "La censure des œuvres artistiques est souvent le signe d'un régime autoritaire."
  }
];
let idx = 0;
function showCard() {
  const w = WORDS[idx];
  document.getElementById("fcWord").textContent = w.word;
  document.getElementById("fcIpa").textContent = w.ipa || "";
  document.getElementById("fcDef").textContent = w.def;
  document.getElementById("fcEx").textContent = w.ex || "";
  document.getElementById("fcIdx").textContent = idx + 1;
  document.getElementById("fcTotal").textContent = WORDS.length;
  document.getElementById("fc").classList.remove("flipped");
}
function flipCard() { document.getElementById("fc").classList.toggle("flipped"); }
function prev() { if (idx > 0) { idx--; showCard(); } }
function next() {
  if (idx < WORDS.length - 1) { idx++; showCard(); }
  else { markMastered(); }
}
function speak() {
  const u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = "fr-FR"; u.rate = 0.9;
  speechSynthesis.speak(u);
}
function markMastered() {
  const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
  if (!prog[LEVEL]) prog[LEVEL] = {};
  prog[LEVEL]["vocab_mastered_" + SLUG] = { done: true, date: new Date().toISOString() };
  localStorage.setItem("wordplay_progress", JSON.stringify(prog));
  document.getElementById("masteryBadge").style.display = "block";
  if (typeof pushProgress === "function") pushProgress();
}
function checkMastered() {
  try {
    const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
    if (prog[LEVEL] && prog[LEVEL]["vocab_mastered_" + SLUG] && prog[LEVEL]["vocab_mastered_" + SLUG].done)
      document.getElementById("masteryBadge").style.display = "block";
  } catch(e) {}
}
showCard(); checkMastered();
</script>
