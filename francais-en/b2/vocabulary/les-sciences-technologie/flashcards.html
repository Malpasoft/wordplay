<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">15 words &middot; tap card to see definition</p>
<div class="fc-wrap"><div class="fc" id="fc" onclick="flipCard()">
  <div class="fc-face fc-front">
    <div class="fc-word" id="fcWord"></div>
    <div class="fc-ipa" id="fcIpa"></div>
    <button class="fc-audio" onclick="event.stopPropagation();speak()">&#9654; Listen</button>
    <div class="fc-hint">Tap to reveal</div>
  </div>
  <div class="fc-face fc-back">
    <div class="fc-def" id="fcDef"></div>
    <div class="fc-ex" id="fcEx"></div>
  </div>
</div></div>

<script>
const MASTERY_KEY = "wordplay_vocab_b2_les-sciences-technologie_mastered";
const SLUG = "les-sciences-technologie";
const LEVEL = "b2";
const WORDS = [
  {
    "word": "l'intelligence artificielle",
    "ipa": "/lɛ̃tɛliʒɑ̃s‿aʁtifisjɛl/",
    "def": "artificial intelligence",
    "ex": "L'intelligence artificielle révolutionne des secteurs aussi variés que la médecine et les transports."
  },
  {
    "word": "l'algorithme",
    "ipa": "/lalɡɔʁitm/",
    "def": "algorithm",
    "ex": "Cet algorithme analyse des millions de données en quelques secondes pour personnaliser les résultats."
  },
  {
    "word": "la biotechnologie",
    "ipa": "/la bjɔtɛknɔlɔʒi/",
    "def": "biotechnology",
    "ex": "Les biotechnologies offrent des perspectives prometteuses pour soigner des maladies génétiques."
  },
  {
    "word": "la recherche fondamentale",
    "ipa": "/la ʁəʃɛʁʃ fɔ̃damɑ̃tal/",
    "def": "basic / fundamental research",
    "ex": "La recherche fondamentale ne produit pas de résultats immédiats, mais elle est essentielle au progrès."
  },
  {
    "word": "le brevet",
    "ipa": "/lə bʁəvɛ/",
    "def": "patent",
    "ex": "L'entreprise a déposé un brevet pour protéger son innovation contre la concurrence."
  },
  {
    "word": "la robotique",
    "ipa": "/la ʁɔbɔtik/",
    "def": "robotics",
    "ex": "La robotique industrielle permet d'automatiser des tâches dangereuses ou répétitives."
  },
  {
    "word": "l'éthique",
    "ipa": "/letik/",
    "def": "ethics",
    "ex": "L'éthique de l'intelligence artificielle soulève des questions fondamentales sur la responsabilité."
  },
  {
    "word": "les données personnelles",
    "ipa": "/le dɔne pɛʁsɔnɛl/",
    "def": "personal data",
    "ex": "La protection des données personnelles est un enjeu majeur à l'ère numérique."
  },
  {
    "word": "la cyberattaque",
    "ipa": "/la sibɛʁatak/",
    "def": "cyberattack",
    "ex": "Cette cyberattaque a paralysé les infrastructures informatiques de plusieurs hôpitaux."
  },
  {
    "word": "la nanotechnologie",
    "ipa": "/la nanɔtɛknɔlɔʒi/",
    "def": "nanotechnology",
    "ex": "La nanotechnologie pourrait transformer la fabrication de médicaments ciblés."
  },
  {
    "word": "la génétique",
    "ipa": "/la ʒenetik/",
    "def": "genetics",
    "ex": "Les avancées en génétique permettent désormais de dépister certaines maladies avant la naissance."
  },
  {
    "word": "la source d'énergie",
    "ipa": "/la suʁs denɛʁʒi/",
    "def": "energy source",
    "ex": "Les chercheurs explorent de nouvelles sources d'énergie pour remplacer les combustibles fossiles."
  },
  {
    "word": "l'innovation disruptive",
    "ipa": "/linɔvasjɔ̃ disʁyptiv/",
    "def": "disruptive innovation",
    "ex": "L'innovation disruptive remet en cause les modèles économiques traditionnels."
  },
  {
    "word": "la réalité virtuelle",
    "ipa": "/la ʁealite viʁtyɛl/",
    "def": "virtual reality",
    "ex": "La réalité virtuelle est de plus en plus utilisée dans la formation professionnelle."
  },
  {
    "word": "l'ingénierie",
    "ipa": "/lɛ̃ʒenjʁi/",
    "def": "engineering",
    "ex": "L'ingénierie génétique ouvre des possibilités fascinantes mais suscite aussi des craintes éthiques."
  }
];
let idx = 0;
function showCard() {
  const w = WORDS[idx];
  document.getElementById("fcWord").textContent = w.word;
  document.getElementById("fcIpa").textContent = w.ipa || "";
  document.getElementById("fcDef").textContent = w.def;
  document.getElementById("fcEx").textContent = w.ex || "";
  document.getElementById("fcIdx").textContent = idx + 1;
  document.getElementById("fcTotal").textContent = WORDS.length;
  document.getElementById("fc").classList.remove("flipped");
}
function flipCard() { document.getElementById("fc").classList.toggle("flipped"); }
function prev() { if (idx > 0) { idx--; showCard(); } }
function next() {
  if (idx < WORDS.length - 1) { idx++; showCard(); }
  else { markMastered(); }
}
function speak() {
  const u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = "fr-FR"; u.rate = 0.9;
  speechSynthesis.speak(u);
}
function markMastered() {
  const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
  if (!prog[LEVEL]) prog[LEVEL] = {};
  prog[LEVEL]["vocab_mastered_" + SLUG] = { done: true, date: new Date().toISOString() };
  localStorage.setItem("wordplay_progress", JSON.stringify(prog));
  document.getElementById("masteryBadge").style.display = "block";
  if (typeof pushProgress === "function") pushProgress();
}
function checkMastered() {
  try {
    const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
    if (prog[LEVEL] && prog[LEVEL]["vocab_mastered_" + SLUG] && prog[LEVEL]["vocab_mastered_" + SLUG].done)
      document.getElementById("masteryBadge").style.display = "block";
  } catch(e) {}
}
showCard(); checkMastered();
</script>
