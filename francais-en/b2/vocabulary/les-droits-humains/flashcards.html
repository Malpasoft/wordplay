<h1>les-droits-humains</h1>
<nav class="chapter-nav">
  <a href="flashcards.html" class="chapter-nav-btn active">Flashcards</a>

<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Mastered</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">15 words &middot; tap card to see definition</p>
<div class="fc-wrap"><div class="fc" id="fc" onclick="flipCard()">
  <div class="fc-face fc-front">
    <div class="fc-word" id="fcWord"></div>
    <div class="fc-ipa" id="fcIpa"></div>
    <button class="fc-audio" onclick="event.stopPropagation();speak()">&#9654; Listen</button>
    <div class="fc-hint">Tap to reveal</div>
  </div>
  <div class="fc-face fc-back">
    <div class="fc-def" id="fcDef"></div>
    <div class="fc-ex" id="fcEx"></div>
  </div>
</div></div>
<div class="fc-nav">
  <button class="fc-btn" id="btnPrev" onclick="prev()">&#8592; Prev</button>
  <span class="fc-counter"><span id="fcIdx">1</span> / <span id="fcTotal"></span></span>
  <button class="fc-btn primary" id="btnNext" onclick="next()">Next &#8594;</button>
</div>
<div style="text-align:center;margin:20px 0">
  <button class="fc-btn" onclick="markMastered()" id="btnMastered" style="width:220px">Mark as mastered</button>
</div>

<footer class="site-footer">Word Play &middot; French B2 &middot; Vocabulary</footer>
<script>
const MASTERY_KEY = "wordplay_vocab_b2_les-droits-humains_mastered";
const SLUG = "les-droits-humains";
const LEVEL = "b2";
const WORDS = [
  {
    "word": "la discrimination",
    "ipa": "/la diskʁiminasjɔ̃/",
    "def": "discrimination",
    "ex": "La discrimination fondée sur l'origine ethnique est illégale dans tous les États membres de l'UE."
  },
  {
    "word": "l'égalité des chances",
    "ipa": "/leɡalite de ʃɑ̃s/",
    "def": "equality of opportunity",
    "ex": "L'égalité des chances reste un idéal difficile à atteindre dans de nombreuses sociétés."
  },
  {
    "word": "le militantisme",
    "ipa": "/lə militɑ̃tism/",
    "def": "activism",
    "ex": "Le militantisme en faveur des droits civiques a transformé les sociétés américaine et européenne."
  },
  {
    "word": "les droits fondamentaux",
    "ipa": "/le dʁwa fɔ̃damɑ̃to/",
    "def": "fundamental rights",
    "ex": "La protection des droits fondamentaux est une obligation pour tout État démocratique."
  },
  {
    "word": "la liberté d'expression",
    "ipa": "/la libɛʁte dɛkspʁɛsjɔ̃/",
    "def": "freedom of expression",
    "ex": "La liberté d'expression ne saurait justifier les discours haineux ou incitant à la violence."
  },
  {
    "word": "l'oppression",
    "ipa": "/lɔpʁɛsjɔ̃/",
    "def": "oppression",
    "ex": "Ce régime autoritaire maintient sa population dans l'oppression depuis des décennies."
  },
  {
    "word": "le tribunal",
    "ipa": "/lə tʁibynɑl/",
    "def": "court / tribunal",
    "ex": "La victime a porté l'affaire devant le tribunal international des droits de l'homme."
  },
  {
    "word": "le réfugié",
    "ipa": "/lə ʁefyʒje/",
    "def": "refugee",
    "ex": "Des milliers de réfugiés fuient les zones de conflit en risquant leur vie."
  },
  {
    "word": "l'asile politique",
    "ipa": "/lazil pɔlitik/",
    "def": "political asylum",
    "ex": "Cet opposant a demandé l'asile politique après avoir été emprisonné dans son pays natal."
  },
  {
    "word": "l'impunité",
    "ipa": "/lɛ̃pynite/",
    "def": "impunity",
    "ex": "L'impunité dont bénéficient certains dirigeants encourage la poursuite des violations des droits humains."
  },
  {
    "word": "la laïcité",
    "ipa": "/la laisite/",
    "def": "secularism / laïcité",
    "ex": "La laïcité garantit la séparation des religions et de l'État dans la République française."
  },
  {
    "word": "la minorité",
    "ipa": "/la minɔʁite/",
    "def": "minority",
    "ex": "Les droits des minorités doivent être garantis par la loi dans toute démocratie pluraliste."
  },
  {
    "word": "le mouvement social",
    "ipa": "/lə muvmɑ̃ sɔsjal/",
    "def": "social movement",
    "ex": "Ce mouvement social a réuni des millions de personnes dans les rues pour réclamer des réformes."
  },
  {
    "word": "la solidarité",
    "ipa": "/la sɔlidarite/",
    "def": "solidarity",
    "ex": "La solidarité internationale est essentielle pour venir en aide aux populations les plus vulnérables."
  },
  {
    "word": "l'injustice",
    "ipa": "/lɛ̃ʒystis/",
    "def": "injustice",
    "ex": "Ce documentaire dénonce avec force les injustices subies par les populations autochtones."
  }
];
let idx = 0;
function showCard() {
  const w = WORDS[idx];
  document.getElementById("fcWord").textContent = w.word;
  document.getElementById("fcIpa").textContent = w.ipa || "";
  document.getElementById("fcDef").textContent = w.def;
  document.getElementById("fcEx").textContent = w.ex || "";
  document.getElementById("fcIdx").textContent = idx + 1;
  document.getElementById("fcTotal").textContent = WORDS.length;
  document.getElementById("fc").classList.remove("flipped");
}
function flipCard() { document.getElementById("fc").classList.toggle("flipped"); }
function prev() { if (idx > 0) { idx--; showCard(); } }
function next() {
  if (idx < WORDS.length - 1) { idx++; showCard(); }
  else { markMastered(); }
}
function speak() {
  const u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = "fr-FR"; u.rate = 0.9;
  speechSynthesis.speak(u);
}
function markMastered() {
  const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
  if (!prog[LEVEL]) prog[LEVEL] = {};
  prog[LEVEL]["vocab_mastered_" + SLUG] = { done: true, date: new Date().toISOString() };
  localStorage.setItem("wordplay_progress", JSON.stringify(prog));
  document.getElementById("masteryBadge").style.display = "block";
  if (typeof pushProgress === "function") pushProgress();
}
function checkMastered() {
  try {
    const prog = JSON.parse(localStorage.getItem("wordplay_progress") || "{}");
    if (prog[LEVEL] && prog[LEVEL]["vocab_mastered_" + SLUG] && prog[LEVEL]["vocab_mastered_" + SLUG].done)
      document.getElementById("masteryBadge").style.display = "block";
  } catch(e) {}
}
showCard(); checkMastered();
</script>
