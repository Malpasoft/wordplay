<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#1A1A1A">
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>Classes | Word Play</title>
<link rel="stylesheet" href="shared/base.css?v=v124">
<script src="/shared/auth.js?v=1"></script>
<script src="shared/dark-init.js?v=v112"></script>
<style>
body { background: var(--paper); }

.page-wrap {
  max-width: 1000px;
  margin: 0 auto;
  padding: 32px 16px 60px;
}

.page-head {
  margin-bottom: 32px;
}

.page-head h1 {
  font-size: 1.8rem;
  color: var(--ink);
  margin: 0 0 8px;
}

.page-head p {
  font-family: var(--font-sans);
  font-size: 0.9rem;
  color: var(--muted);
  margin: 0;
}

.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-block;
  background: var(--amber);
  color: #1A1A1A;
  border: none;
  border-radius: 8px;
  padding: 12px 20px;
  font-family: var(--font-sans);
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(184, 134, 11, 0.2);
}

.btn-secondary {
  display: inline-block;
  background: var(--cream);
  color: var(--ink);
  border: 1.5px solid var(--hairline);
  border-radius: 8px;
  padding: 10px 16px;
  font-family: var(--font-sans);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-secondary:hover {
  border-color: var(--amber);
  background: var(--paper);
}

.btn-small {
  padding: 6px 12px;
  font-size: 0.8rem;
}

.btn-danger {
  background: #dc2626;
  color: white;
}

.btn-danger:hover {
  background: #b91c1c;
  box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}

.modal-content {
  background: var(--cream);
  border-radius: 12px;
  padding: 32px;
  max-width: 500px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.modal-head {
  margin-bottom: 20px;
}

.modal-head h2 {
  font-size: 1.4rem;
  color: var(--ink);
  margin: 0 0 8px;
}

.modal-head p {
  font-family: var(--font-sans);
  font-size: 0.9rem;
  color: var(--muted);
  margin: 0;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-family: var(--font-sans);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
}

.form-input,
.form-select {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--hairline);
  border-radius: 6px;
  font-family: var(--font-sans);
  font-size: 0.95rem;
  color: var(--ink);
  background: var(--paper);
  transition: border-color 0.15s;
  box-sizing: border-box;
}

.form-input:focus,
.form-select:focus {
  outline: none;
  border-color: var(--amber);
  box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.1);
}

.form-input::placeholder {
  color: var(--muted);
}

.modal-footer {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
  margin-top: 24px;
}

/* Classes table/grid */
.classes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.class-card {
  background: var(--cream);
  border: 1.5px solid var(--hairline);
  border-radius: 10px;
  padding: 20px;
  transition: border-color 0.15s, transform 0.15s;
}

.class-card:hover {
  border-color: var(--amber);
  transform: translateY(-2px);
}

.class-name {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
  margin: 0 0 8px;
}

.class-info {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}

.info-row {
  font-family: var(--font-sans);
  font-size: 0.85rem;
  color: var(--muted);
}

.info-label {
  font-weight: 700;
  color: var(--ink);
}

.class-description {
  font-family: var(--font-sans);
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.4;
  margin-bottom: 12px;
  max-height: 60px;
  overflow: hidden;
}

.class-stats {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-top: 1px solid var(--hairline);
  border-bottom: 1px solid var(--hairline);
  margin-bottom: 12px;
}

.stat {
  flex: 1;
  text-align: center;
}

.stat-num {
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--amber);
}

.stat-label {
  font-family: var(--font-sans);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 2px;
}

.class-actions {
  display: flex;
  gap: 6px;
}

.class-actions button {
  flex: 1;
  font-size: 0.75rem;
}

.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}

.empty-state h3 {
  font-size: 1.1rem;
  color: var(--ink);
  margin: 0 0 8px;
}

.empty-state p {
  font-family: var(--font-sans);
  font-size: 0.9rem;
  margin: 0 0 16px;
}

/* Alerts */
.alert {
  display: none;
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-family: var(--font-sans);
  font-size: 0.9rem;
}

.alert.show {
  display: block;
}

.alert-success {
  background: #d1fae5;
  color: #065f46;
  border: 1px solid #6ee7b7;
}

.alert-error {
  background: #fee2e2;
  color: #991b1b;
  border: 1px solid #fca5a5;
}

@media (max-width: 768px) {
  .classes-grid {
    grid-template-columns: 1fr;
  }

  .controls {
    flex-direction: column;
  }

  .btn-primary,
  .btn-secondary {
    width: 100%;
    text-align: center;
  }

  .modal-content {
    padding: 24px;
  }
}
</style>
</head>
<body>
<header class="site-header"><div class="site-header-inner">
  <a href="teacher.html" class="back back-link" aria-label="Back"></a>
  <a href="/" class="brand">Word Play</a>
  <button class="dark-toggle" aria-label="Toggle dark mode" onclick="toggleDark()">◐ Dark</button>
</div></header>

<div class="page-wrap">
  <div class="page-head">
    <h1>Classes</h1>
    <p>Create and manage your classes. Add students and bind lessons to specific classes.</p>
  </div>

  <div id="alert" class="alert"></div>

  <div class="controls">
    <button class="btn-primary" onclick="openCreateModal()">+ New Class</button>
  </div>

  <div id="classesContainer"></div>
</div>

<!-- Create/Edit Class Modal -->
<div id="classModal" class="modal">
  <div class="modal-content">
    <div class="modal-head">
      <h2 id="modalTitle">New Class</h2>
      <p id="modalSubtitle">Create a class to organize students and lessons</p>
    </div>
    <form onsubmit="submitClass(event)">
      <div class="form-group">
        <label class="form-label">Class Name</label>
        <input type="text" class="form-input" id="className" placeholder="e.g. Tuesday Adults FCE" required>
      </div>
      <div class="form-group">
        <label class="form-label">Level (optional)</label>
        <select class="form-select" id="classLevel">
          <option value="">— not set —</option>
          <option value="A1">A1 Beginner</option>
          <option value="A2">A2 Elementary</option>
          <option value="B1">B1 Intermediate</option>
          <option value="B2">B2 Upper Intermediate</option>
          <option value="C1">C1 Advanced</option>
          <option value="C2">C2 Mastery</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Description (optional)</label>
        <input type="text" class="form-input" id="classDescription" placeholder="e.g. FCE exam prep, 1-2-1 lessons">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" onclick="closeCreateModal()">Cancel</button>
        <button type="submit" class="btn-primary">Save Class</button>
      </div>
    </form>
  </div>
</div>

<footer class="site-footer">Word Play · Private · Teacher tools</footer>

<script>
requireTeacher();

const currentUser = getCurrentUser();
const authToken = getAuthToken();
let classes = [];
let editingClassId = null;

function showAlert(message, type = 'success') {
  const alert = document.getElementById('alert');
  alert.textContent = message;
  alert.className = `alert show alert-${type}`;
  setTimeout(() => {
    alert.className = 'alert';
  }, 4000);
}

function openCreateModal() {
  editingClassId = null;
  document.getElementById('modalTitle').textContent = 'New Class';
  document.getElementById('modalSubtitle').textContent = 'Create a class to organize students and lessons';
  document.getElementById('className').value = '';
  document.getElementById('classLevel').value = '';
  document.getElementById('classDescription').value = '';
  document.getElementById('classModal').classList.add('active');
  document.getElementById('className').focus();
}

function openEditModal(classId) {
  const cls = classes.find(c => c.id === classId);
  if (!cls) return;

  editingClassId = classId;
  document.getElementById('modalTitle').textContent = 'Edit Class';
  document.getElementById('modalSubtitle').textContent = 'Update class details';
  document.getElementById('className').value = cls.name || '';
  document.getElementById('classLevel').value = cls.level || '';
  document.getElementById('classDescription').value = cls.description || '';
  document.getElementById('classModal').classList.add('active');
  document.getElementById('className').focus();
}

function closeCreateModal() {
  document.getElementById('classModal').classList.remove('active');
  document.getElementById('className').value = '';
  document.getElementById('classLevel').value = '';
  document.getElementById('classDescription').value = '';
  editingClassId = null;
}

async function submitClass(event) {
  event.preventDefault();

  const name = document.getElementById('className').value.trim();
  const level = document.getElementById('classLevel').value;
  const description = document.getElementById('classDescription').value.trim();

  if (!name) {
    showAlert('Class name is required', 'error');
    return;
  }

  const btn = event.target.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.textContent = editingClassId ? 'Updating...' : 'Creating...';

  try {
    const method = editingClassId ? 'PUT' : 'POST';
    const url = editingClassId ? `/api/classes/${editingClassId}` : '/api/classes';

    const response = await authenticatedFetch(url, {
      method: method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, level: level || null, description: description || null })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || `Failed to ${editingClassId ? 'update' : 'create'} class`);
    }

    showAlert(`Class ${editingClassId ? 'updated' : 'created'} successfully!`, 'success');
    closeCreateModal();
    loadClasses();
  } catch (error) {
    showAlert(error.message || 'Error saving class', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = editingClassId ? 'Update Class' : 'Save Class';
  }
}

async function deleteClass(classId) {
  const cls = classes.find(c => c.id === classId);
  if (!cls) return;

  if (!confirm(`Delete class "${cls.name}"? This will remove all lessons and enrollments.`)) {
    return;
  }

  try {
    const response = await authenticatedFetch(`/api/classes/${classId}`, {
      method: 'DELETE'
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || 'Failed to delete class');
    }

    showAlert('Class deleted successfully', 'success');
    loadClasses();
  } catch (error) {
    showAlert(error.message || 'Error deleting class', 'error');
  }
}

async function loadClasses() {
  try {
    const response = await authenticatedFetch('/api/classes');
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || 'Failed to load classes');
    }

    classes = data || [];
    renderClasses();
  } catch (error) {
    console.error('Load error:', error);
    showAlert(error.message || 'Failed to load classes', 'error');
  }
}

function renderClasses() {
  const container = document.getElementById('classesContainer');

  if (classes.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <h3>No classes yet</h3>
        <p>Create your first class to get started. You can add students and schedule lessons once you have a class.</p>
      </div>
    `;
    return;
  }

  const html = `
    <div class="classes-grid">
      ${classes.map(cls => `
        <div class="class-card">
          <h3 class="class-name">${escapeHtml(cls.name)}</h3>
          <div class="class-info">
            ${cls.level ? `<div class="info-row"><span class="info-label">Level:</span> ${escapeHtml(cls.level)}</div>` : ''}
            <div class="info-row"><span class="info-label">Students:</span> ${cls.student_count || 0}</div>
          </div>
          ${cls.description ? `<div class="class-description">${escapeHtml(cls.description)}</div>` : ''}
          <div class="class-stats">
            <div class="stat">
              <div class="stat-num">${cls.student_count || 0}</div>
              <div class="stat-label">Enrolled</div>
            </div>
          </div>
          <div class="class-actions">
            <button class="btn-secondary btn-small" onclick="openEditModal(${cls.id})">Edit</button>
            <button class="btn-secondary btn-small btn-danger" onclick="deleteClass(${cls.id})">Delete</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  container.innerHTML = html;
}

// Close modal on escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeCreateModal();
  }
});

// Close modal on background click
document.getElementById('classModal').addEventListener('click', function(e) {
  if (e.target === this) {
    closeCreateModal();
  }
});

// Helper function to escape HTML
function escapeHtml(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Load classes on page load
loadClasses();
</script>
</body>
</html>
