<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="robots" content="noindex">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>Link Generator | Word Play</title>
  <link rel="stylesheet" href="/shared/base.css?v=v124">
  <script src="/shared/auth.js?v=1"></script>
  <script src="/shared/dark-init.js?v=v112"></script>
  <style>
    .gen-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 16px 60px; }
    .gen-head { text-align: center; margin-bottom: 32px; }
    .gen-eyebrow { font-family: var(--font-sans); font-size: 0.62rem; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: var(--amber); margin-bottom: 6px; }
    h1 { font-size: 1.8rem; color: var(--ink); margin: 0 0 8px; }
    .gen-sub { font-family: var(--font-sans); font-size: 0.85rem; color: var(--muted); margin: 0; }

    .gen-controls { background: var(--cream); border: 1.5px solid var(--hairline); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
    .gen-controls h2 { font-size: 1.05rem; color: var(--ink); margin: 0 0 12px; }

    .ctrl-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    @media(max-width: 900px) { .ctrl-grid { grid-template-columns: repeat(2, 1fr); } }
    @media(max-width: 560px) { .ctrl-grid { grid-template-columns: 1fr; } }

    select { width: 100%; box-sizing: border-box; padding: 9px 12px; border: 1.5px solid var(--hairline); border-radius: 7px; font-size: 0.9rem; background: var(--paper); color: var(--ink); }
    select:focus { outline: none; border-color: var(--amber); }

    .btn { display: inline-block; padding: 9px 18px; border-radius: 7px; font-size: 0.82rem; font-weight: 700; cursor: pointer; border: none; font-family: var(--font-sans); background: var(--amber); color: #fff; }
    .btn:hover { opacity: 0.9; }
    .btn-secondary { background: var(--paper); color: var(--ink); border: 1.5px solid var(--hairline); }

    .gen-output { background: var(--cream); border: 1.5px solid var(--hairline); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
    .gen-output h2 { font-size: 1.05rem; color: var(--ink); margin: 0 0 12px; }
    .gen-output p { font-family: var(--font-sans); font-size: 0.85rem; color: var(--muted); margin: 0 0 12px; }

    .link-list { list-style: none; padding: 0; margin: 0; max-height: 500px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media(max-width: 768px) { .link-list { grid-template-columns: 1fr; } }

    .link-item { display: flex; align-items: center; gap: 8px; background: var(--paper); border: 1px solid var(--hairline); border-radius: 6px; padding: 10px; }
    .link-item a { flex: 1; color: var(--amber); font-family: monospace; font-size: 0.7rem; text-decoration: none; word-break: break-all; overflow: hidden; }
    .link-item a:hover { text-decoration: underline; }
    .copy-icon { cursor: pointer; font-size: 0.8rem; color: var(--muted); padding: 4px; border-radius: 4px; transition: background 0.15s; user-select: none; }
    .copy-icon:hover { background: var(--hairline); }

    .stat { font-family: var(--font-sans); font-size: 0.75rem; color: var(--muted); padding: 8px 0; border-top: 1px solid var(--hairline); margin-top: 12px; }

    .section-label { font-family: var(--font-sans); font-size: 0.7rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 2px 8px; background: var(--paper); border-radius: 3px; display: inline-block; margin-bottom: 8px; }
  </style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a href="/teacher.html" class="back back-link" aria-label="Back"></a>
    <a href="/" class="brand">Word Play</a>
    <button class="dark-toggle" aria-label="Toggle dark mode" onclick="toggleDark()">◐ Dark</button>
  </div>
</header>

<div class="gen-wrap">
  <div class="gen-head">
    <div class="gen-eyebrow">Tools · Link Generator</div>
    <h1>Share Word Play Content</h1>
    <p class="gen-sub">Generate raw.githubusercontent URLs for any content. Share with AI agents, no repo access needed. Works offline.</p>
  </div>

  <div class="gen-controls">
    <h2>Filter & Generate</h2>
    <div class="ctrl-grid">
      <div>
        <label style="display: block; font-family: var(--font-sans); font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; font-weight: 700;">Track</label>
        <select id="track-select" onchange="regenerateLinks()">
          <option value="">All Tracks</option>
          <option value="en">English (EN)</option>
          <option value="es">Spanish (ES)</option>
          <option value="fr">French (FR)</option>
        </select>
      </div>
      <div>
        <label style="display: block; font-family: var(--font-sans); font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; font-weight: 700;">Level</label>
        <select id="level-select" onchange="regenerateLinks()">
          <option value="">All Levels</option>
          <option value="a1">A1</option>
          <option value="a2">A2</option>
          <option value="b1">B1</option>
          <option value="b2">B2</option>
          <option value="c1">C1</option>
          <option value="c2">C2</option>
        </select>
      </div>
      <div>
        <label style="display: block; font-family: var(--font-sans); font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; font-weight: 700;">Type</label>
        <select id="type-select" onchange="regenerateLinks()">
          <option value="">Lessons & Docs</option>
          <option value="slides">Slides Only</option>
          <option value="flashcards">Flashcards Only</option>
          <option value="game">Games Only</option>
          <option value="worksheet">Worksheets Only</option>
          <option value="root">Root Files Only</option>
          <option value="all">Everything (All 2,400+ Links)</option>
        </select>
      </div>
      <div style="display: flex; gap: 8px; align-items: flex-end;">
        <button class="btn" onclick="regenerateLinks()" style="flex: 1;">Generate</button>
        <button class="btn btn-secondary" onclick="copyAll()" style="flex: 1;">Copy All</button>
      </div>
    </div>
  </div>

  <div class="gen-output">
    <h2 id="output-title">Generated Links</h2>
    <p id="output-desc">Click any icon to copy the link.</p>
    <ul class="link-list" id="link-list">
      <li style="grid-column: 1/-1; padding: 20px; text-align: center; color: var(--muted);">Select filters above and click Generate</li>
    </ul>
    <div class="stat" id="stat-count"></div>
  </div>
</div>

<script>
const REPO = 'malpasoft/wordplay';
const BRANCH = 'main';
const BASE_URL = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;

// All root-level files
function getRootFiles() {
  return [
    { name: 'index.html (home)', url: `${BASE_URL}/index.html`, type: 'root' },
    { name: 'teacher.html (hub)', url: `${BASE_URL}/teacher.html`, type: 'root' },
    { name: 'calendar.html (lessons)', url: `${BASE_URL}/calendar.html`, type: 'root' },
    { name: 'profile.html (students)', url: `${BASE_URL}/profile.html`, type: 'root' },
    { name: 'builder.html (content)', url: `${BASE_URL}/builder.html`, type: 'root' },
    { name: 'coverage.html (audit)', url: `${BASE_URL}/coverage.html`, type: 'root' },
    { name: 'ai-prompts.html (templates)', url: `${BASE_URL}/ai-prompts.html`, type: 'root' },
    { name: 'link-generator.html (this)', url: `${BASE_URL}/link-generator.html`, type: 'root' },
    { name: 'diagnostic.html (debug)', url: `${BASE_URL}/diagnostic.html`, type: 'root' },
    { name: 'placement-test-v2.html', url: `${BASE_URL}/placement-test-v2.html`, type: 'root' },
    { name: 'dashboard.html (student)', url: `${BASE_URL}/dashboard.html`, type: 'root' },
    { name: 'login.html (auth)', url: `${BASE_URL}/login.html`, type: 'root' },
    { name: 'signup.html (auth)', url: `${BASE_URL}/signup.html`, type: 'root' },
    { name: 'CLAUDE.md (rules)', url: `${BASE_URL}/CLAUDE.md`, type: 'root' },
    { name: 'AI_HANDOVER.md (context)', url: `${BASE_URL}/AI_HANDOVER.md`, type: 'root' },
    { name: 'SHARED_FILES_REGISTRY.md', url: `${BASE_URL}/SHARED_FILES_REGISTRY.md`, type: 'root' },
    { name: 'TECH_DEBT.md (issues)', url: `${BASE_URL}/TECH_DEBT.md`, type: 'root' },
    { name: 'HUB_CONSOLIDATION.md', url: `${BASE_URL}/HUB_CONSOLIDATION.md`, type: 'root' },
    { name: 'shared/base.css (design)', url: `${BASE_URL}/shared/base.css`, type: 'root' },
    { name: 'shared/store.js (progress)', url: `${BASE_URL}/shared/store.js`, type: 'root' },
    { name: 'shared/game.js (engine)', url: `${BASE_URL}/shared/game.js`, type: 'root' },
    { name: 'shared/auth.js (login)', url: `${BASE_URL}/shared/auth.js`, type: 'root' },
    { name: 'shared/dark-init.js (ui)', url: `${BASE_URL}/shared/dark-init.js`, type: 'root' },
    { name: 'scripts/gen_chapter.py', url: `${BASE_URL}/scripts/gen_chapter.py`, type: 'root' },
    { name: 'scripts/pedagogy_check.py', url: `${BASE_URL}/scripts/pedagogy_check.py`, type: 'root' },
  ];
}

// All chapters (hardcoded from known structure)
function getAllChapters() {
  const allChapters = [];
  const structure = {
    en: { dir: 'a', levels: ['a1', 'a2', 'b1', 'b2', 'c1', 'c2'], sections: ['vocabulary', 'grammar', 'writing'] },
    es: { dir: 'es', levels: ['a1', 'a2', 'b1', 'b2', 'c1', 'c2'], sections: ['vocabulary', 'grammar', 'writing'] },
    fr: { dir: 'fr', levels: ['a1', 'a2', 'b1', 'b2', 'c1', 'c2'], sections: ['vocabulary', 'writing'] }
  };

  const vocabularyChapters = {
    en: ['numbers', 'colors', 'family', 'animals', 'food', 'jobs', 'sports', 'school', 'travel-holidays', 'clothes', 'body-parts', 'house'],
    es: ['numeros', 'colores', 'familia', 'animales', 'comida', 'trabajos', 'deportes', 'escuela', 'viajes', 'ropa', 'cuerpo', 'casa'],
    fr: ['nombres', 'couleurs', 'famille', 'animaux', 'nourriture', 'metiers', 'sports', 'ecole', 'voyages', 'vetements', 'corps', 'maison']
  };

  const grammarChapters = {
    en: ['present-simple', 'present-continuous', 'past-simple', 'future-will', 'modals', 'passive', 'conditionals', 'reported-speech'],
    es: ['presente-simple', 'presente-continuo', 'pasado-simple', 'futuro', 'modales', 'pasiva', 'condicionales'],
    fr: ['present', 'passe-compose', 'imparfait', 'futur', 'conditionnel', 'subjonctif']
  };

  Object.keys(structure).forEach(track => {
    const s = structure[track];
    s.levels.forEach(level => {
      s.sections.forEach(section => {
        const chapterSlugs = section === 'vocabulary' ? (vocabularyChapters[track] || []) :
                             section === 'grammar' ? (grammarChapters[track] || []) :
                             ['writing'];

        chapterSlugs.forEach(slug => {
          const types = section === 'writing' ? ['slides', 'printables'] : ['slides', 'flashcards', 'game', 'worksheet'];

          types.forEach(type => {
            const filename = type === 'printables' ? 'printables.html' : `${type}.html`;
            allChapters.push({
              track: track.toUpperCase(),
              level: level.toUpperCase(),
              section: section.charAt(0).toUpperCase() + section.slice(1),
              slug,
              type,
              url: `${BASE_URL}/${s.dir}/${level}/${section}/${slug}/${filename}`,
              label: `${track.toUpperCase()} ${level.toUpperCase()} · ${section} · ${slug} (${type})`
            });
          });
        });
      });
    });
  });

  return allChapters;
}

function regenerateLinks() {
  const track = document.getElementById('track-select').value || '';
  const level = document.getElementById('level-select').value || '';
  const type = document.getElementById('type-select').value || '';

  let items = [];

  if (type === 'root' || type === 'all') {
    items = items.concat(getRootFiles());
  }

  if (type !== 'root') {
    items = items.concat(getAllChapters());
  }

  // Filter
  items = items.filter(item => {
    if (track && item.track && !item.track.includes(track.toUpperCase())) return false;
    if (level && item.level && !item.level.includes(level.toUpperCase())) return false;
    return true;
  });

  // Render
  const list = document.getElementById('link-list');
  let html = '';

  if (items.length === 0) {
    html = '<li style="grid-column: 1/-1; padding: 20px; text-align: center; color: var(--muted);">No matches</li>';
  } else {
    items.forEach(item => {
      html += `<li class="link-item">
        <a href="${item.url}" target="_blank" title="${item.label || item.name}">${item.label || item.name}</a>
        <span class="copy-icon" onclick="copyLink('${item.url}')" title="Copy">⧉</span>
      </li>`;
    });
  }

  list.innerHTML = html;

  document.getElementById('stat-count').textContent = `${items.length} link(s) generated`;

  if (type === 'all') {
    document.getElementById('output-title').textContent = 'All 2,400+ Content Links';
    document.getElementById('output-desc').textContent = 'Entire Word Play curriculum + documentation. Scroll to browse.';
  }
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => {
    alert('Copied: ' + url.split('/').pop());
  });
}

function copyAll() {
  const links = document.querySelectorAll('.link-item a');
  const urls = Array.from(links).map(a => a.href).join('\n');
  navigator.clipboard.writeText(urls).then(() => {
    alert(`Copied ${links.length} links to clipboard`);
  });
}

// Initial load
window.addEventListener('load', regenerateLinks);
</script>
</body>
</html>
