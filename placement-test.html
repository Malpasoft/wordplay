<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#1A1A1A">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>Level Placement Test | Word Play</title>

<style>
.pt-wrap { max-width: 640px; margin: 28px auto 56px; padding: 0 16px; }

/* Card shell */
.pt-card {
  background: var(--paper);
  border-radius: 12px;
  border-top: 4px solid var(--amber);
  box-shadow: 0 2px 18px rgba(0,0,0,.08);
  overflow: hidden;
}

/* Progress bar */
.pt-prog { height: 4px; background: var(--hairline); }
.pt-prog-fill { height: 100%; background: var(--amber); transition: width .4s ease; }

.pt-body { padding: 26px 26px 22px; }

/* Meta row */
.pt-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.pt-badge {
  background: rgba(232,160,32,.12);
  color: var(--amber);
  font-family: var(--font-sans);
  font-size: .6rem;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 3px;
}
.pt-counter { font-family: var(--font-sans); font-size: .72rem; color: var(--muted); }

/* Question text */
.pt-qtext {
  font-family: Georgia, serif;
  font-size: 1.08rem;
  line-height: 1.65;
  color: var(--ink);
  margin: 0 0 20px;
}

/* Multiple choice */
.pt-choices { display: flex; flex-direction: column; gap: 9px; }
.pt-opt {
  background: var(--paper);
  border: 1.5px solid var(--hairline);
  border-radius: 6px;
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: .87rem;
  line-height: 1.45;
  padding: 11px 15px;
  text-align: left;
  cursor: pointer;
  transition: border-color .12s, background .12s;
}
.pt-opt:hover:not(:disabled) { border-color: var(--amber); }
.pt-opt:disabled { cursor: default; }
.pt-opt.correct  { background: rgba(39,174,96,.12); border-color: #27ae60; color: #155724; }
.pt-opt.wrong    { background: rgba(192,57,43,.10); border-color: #c0392b; color: #7b1d1d; }
.pt-opt.reveal   { background: rgba(39,174,96,.07); border-color: #27ae60; color: #155724; opacity: .75; }

/* Text input */
.pt-textrow { display: flex; gap: 9px; }
.pt-input {
  flex: 1; min-width: 0;
  padding: 11px 13px;
  font-family: var(--font-sans);
  font-size: .9rem;
  border: 1.5px solid var(--hairline);
  border-radius: 6px;
  background: var(--paper);
  color: var(--ink);
}
.pt-input:focus { outline: none; border-color: var(--amber); }
.pt-input.correct { border-color: #27ae60; background: rgba(39,174,96,.08); }
.pt-input.wrong   { border-color: #c0392b; background: rgba(192,57,43,.07); }
.pt-chk {
  background: var(--amber); color: #1A1A1A;
  border: none; border-radius: 6px;
  font-family: var(--font-sans); font-size: .8rem; font-weight: 700;
  padding: 11px 18px; cursor: pointer; white-space: nowrap;
}
.pt-chk:disabled { opacity: .5; cursor: default; }
.pt-hint {
  font-family: var(--font-sans); font-size: .78rem;
  margin-top: 9px; min-height: 16px;
}
.pt-hint.ok  { color: #27ae60; }
.pt-hint.err { color: #c0392b; }

/* Intro card */
.pt-intro { text-align: center; padding: 44px 28px 40px; }
.pt-intro h2 { font-family: Georgia,serif; font-size: 1.55rem; margin: 0 0 10px; color: var(--ink); }
.pt-intro p  { font-family: var(--font-sans); font-size: .87rem; color: var(--muted); line-height: 1.65; margin: 0 0 28px; }
.pt-start {
  padding: 13px 38px;
  background: var(--amber); color: #1A1A1A;
  font-family: var(--font-sans); font-size: .8rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  border: none; border-radius: 5px; cursor: pointer;
}

/* Results card */
.pt-results { padding: 32px 26px 28px; }
.pt-res-eyebrow { font-family:var(--font-sans);font-size:.6rem;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--amber);text-align:center;margin-bottom:8px; }
.pt-res-score { font-family:Georgia,serif;font-size:2.4rem;font-weight:700;color:var(--ink);text-align:center;margin-bottom:4px; }
.pt-res-pct   { font-family:var(--font-sans);font-size:.87rem;color:var(--muted);text-align:center;margin-bottom:26px; }
.pt-band-grid { display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:24px; }
.pt-band-cell { text-align:center; }
.pt-band-lbl  { font-family:var(--font-sans);font-size:.58rem;font-weight:800;letter-spacing:1px; }
.pt-band-n    { font-family:var(--font-sans);font-size:.9rem;font-weight:700; }
.pt-rec-box   { background:var(--cream-deep);border:1.5px solid var(--hairline);border-radius:8px;padding:22px;text-align:center;margin-bottom:20px; }
.pt-rec-lbl   { font-family:var(--font-sans);font-size:.6rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--amber);margin-bottom:8px; }
.pt-rec-name  { font-family:Georgia,serif;font-size:1.55rem;font-weight:700;color:var(--ink);margin-bottom:14px; }
.pt-rec-btn   { display:inline-block;padding:11px 28px;background:var(--ink);color:var(--paper);font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;border-radius:4px; }
.pt-steps     { padding:16px 20px;background:rgba(232,160,32,.06);border-radius:8px;border:1px solid rgba(232,160,32,.14); }
.pt-steps h4  { font-family:var(--font-sans);font-size:.6rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--amber);margin:0 0 10px; }
.pt-steps ol  { font-family:var(--font-sans);font-size:.82rem;color:var(--ink);line-height:1.9;padding-left:18px;margin:0; }
.pt-home-link { display:block;text-align:center;margin-top:18px;font-family:var(--font-sans);font-size:.78rem;color:var(--muted);text-decoration:none; }

/* Dark mode */
body.dark .pt-card       { background: #1E1E1E; }
body.dark .pt-qtext      { color: #F0F0F0; }
body.dark .pt-opt        { background: #2A2A2A; border-color: #3C3C3C; color: #E0E0E0; }
body.dark .pt-opt.correct{ background: rgba(39,174,96,.18); border-color: #27ae60; color: #7fd9a0; }
body.dark .pt-opt.wrong  { background: rgba(192,57,43,.18); border-color: #c0392b; color: #f0a0a0; }
body.dark .pt-opt.reveal { background: rgba(39,174,96,.10); border-color: #27ae60; color: #7fd9a0; opacity: .6; }
body.dark .pt-input      { background: #2A2A2A; border-color: #3C3C3C; color: #E0E0E0; }
body.dark .pt-input.correct { border-color: #27ae60; background: rgba(39,174,96,.15); }
body.dark .pt-input.wrong   { border-color: #c0392b; background: rgba(192,57,43,.15); }
body.dark .pt-intro h2   { color: #F0F0F0; }
body.dark .pt-res-score  { color: #F0F0F0; }
body.dark .pt-rec-box    { background: #252525; border-color: #3A3A3A; }
body.dark .pt-rec-name   { color: #F0F0F0; }
body.dark .pt-rec-btn    { background: #F0F0F0; color: #1A1A1A; }
body.dark .pt-steps      { background: rgba(232,160,32,.08); border-color: rgba(232,160,32,.2); }
body.dark .pt-steps ol   { color: #E0E0E0; }
</style>
</head>
<body>
<header class="site-header"><div class="site-header-inner">
  <a href="index.html" class="back back-link">Home</a>

  <button class="dark-toggle" aria-label="Toggle dark mode" onclick="toggleDark()">&#9680; Dark</button>
</div></header>

<div class="container" style="max-width:720px">
  <div class="breadcrumb"><a href="index.html">Home</a><span>&#8250;</span><strong>Level Placement Test</strong></div>
  <h1 style="font-family:Georgia,serif;font-size:2rem;margin:0 0 6px">Level Placement Test</h1>
  <p style="color:var(--muted);font-size:.87rem;margin:0 0 28px">24 questions &middot; A1 to C2 &middot; instant feedback &middot; takes about 5 minutes</p>

  <div class="pt-wrap">
    <div id="pt-stage" class="pt-card"></div>
  </div>
</div>

<footer class="site-footer">Word Play &middot; Cambridge English A1&rarr;C2</footer>

<script src="shared/store.js?v=v104"></script>
<script>
var QUESTIONS = [
  // A1
  {level:'a1',type:'mc',text:'Complete: "She ___ a nurse." (verb to be)',choices:['is','are','am','be'],answer:'is'},
  {level:'a1',type:'mc',text:'Which is correct? (present simple, 3rd person)',choices:['He works every day.','He work every day.','He is work every day.','He working every day.'],answer:'He works every day.'},
  {level:'a1',type:'text',text:'Complete with the correct article: "I have ___ apple." (a / an / the)',accept:['an']},
  {level:'a1',type:'mc',text:'"There ___ two cats in the garden." Choose the correct form.',choices:['is','are','am','be'],answer:'are'},
  // A2
  {level:'a2',type:'mc',text:'Complete: "I ___ to Paris last year." (past simple of go)',choices:['went','go','gone','was go'],answer:'went'},
  {level:'a2',type:'mc',text:'Which sentence uses "going to" correctly for a future plan?',choices:["I'm going to visit my grandmother this weekend.","I going to visit my grandmother.","I will to visit my grandmother.","I'm go to visit my grandmother."],answer:"I'm going to visit my grandmother this weekend."},
  {level:'a2',type:'text',text:'Complete: "She is ___ than her brother." (tall — comparative)',accept:['taller']},
  {level:'a2',type:'mc',text:'Which is correct? (present continuous for now)',choices:['They are watching TV at the moment.','They watch TV at the moment.','They watched TV at the moment.','They have watched TV.'],answer:'They are watching TV at the moment.'},
  // B1
  {level:'b1',type:'mc',text:'Complete: "I ___ never been to Japan." (present perfect)',choices:['have','had','has','am'],answer:'have'},
  {level:'b1',type:'mc',text:'Which sentence is a second conditional?',choices:['If I had more time, I would travel more.','If I have time, I will travel.','If I had time, I travelled.','I would travel if I have time.'],answer:'If I had more time, I would travel more.'},
  {level:'b1',type:'text',text:'Change to passive: "They built the bridge in 1990." → "The bridge ___ in 1990."',accept:['was built']},
  {level:'b1',type:'mc',text:'"You ___ smoke here. It\'s forbidden." Choose the correct modal.',choices:["mustn't","don't have to","shouldn't have to","needn't"],answer:"mustn't"},
  // B2
  {level:'b2',type:'mc',text:'Complete: "Not only ___ she pass the exam, but she came first." (inversion)',choices:['did','had','has','was'],answer:'did'},
  {level:'b2',type:'text',text:'Complete: "She regrets ___ the job." (turn down — gerund form)',accept:['turning down','not taking','not having taken']},
  {level:'b2',type:'mc',text:'Which uses the third conditional correctly?',choices:['If I had known, I would have called.','If I knew, I would call.','If I had known, I would call.','If I know, I would have called.'],answer:'If I had known, I would have called.'},
  {level:'b2',type:'mc',text:'"She ___ that she had never seen the document." Choose the correct reporting verb.',choices:['denied','refused','rejected','declined'],answer:'denied'},
  // C1
  {level:'c1',type:'mc',text:'Complete the inversion: "___ I known about the problem, I would have acted sooner."',choices:['Had','If','Were','Should'],answer:'Had'},
  {level:'c1',type:'text',text:'Nominalise: "The government decided to invest." → "The government\'s ___ to invest..."',accept:['decision']},
  {level:'c1',type:'mc',text:'Which uses the subjunctive correctly?',choices:['It is essential that he be present.','It is essential that he is present.','It is essential that he was present.','It is essential that he will be present.'],answer:'It is essential that he be present.'},
  {level:'c1',type:'mc',text:'"___ that automation may cause widespread unemployment." Choose the formal hedging phrase.',choices:['There is evidence to suggest','I think','It is obvious','Everybody knows'],answer:'There is evidence to suggest'},
  // C2
  {level:'c2',type:'mc',text:'Complete the stylistic inversion: "___ had the city witnessed such a crisis."',choices:['Never before','Not before','Before never','Hardly before'],answer:'Never before'},
  {level:'c2',type:'mc',text:'Which phrase is appropriate for a formal academic essay?',choices:['It can be argued that this approach is flawed.','This approach is totally wrong, obviously.',"In my opinion this approach doesn't work.",'Everyone agrees this approach fails.'],answer:'It can be argued that this approach is flawed.'},
  {level:'c2',type:'text',text:'"The data is thought ___ before the report was published." (tamper — complex passive infinitive)',accept:['to have been tampered with','to have been tampered','to have been altered','to have been manipulated']},
  {level:'c2',type:'mc',text:'"The initial results were promising. ___, further testing revealed significant flaws." Choose the best discourse connector.',choices:['Subsequent analysis, however,','But then','Also','So therefore'],answer:'Subsequent analysis, however,'}
];

var LEVEL_NAMES = {a1:'A1 Beginner',a2:'A2 Elementary',b1:'B1 Pre-intermediate',b2:'B2 Upper-intermediate',c1:'C1 Advanced',c2:'C2 Proficiency'};
var LEVEL_PATHS = {a1:'a/a1',a2:'a/a2',b1:'b/b1',b2:'b/b2',c1:'c/c1',c2:'c/c2'};
var BANDS = ['a1','a2','b1','b2','c1','c2'];

var current = 0;
var bandScores = {a1:0,a2:0,b1:0,b2:0,c1:0,c2:0};
var stage = document.getElementById('pt-stage');

function showIntro() {
  stage.innerHTML =
    '<div class="pt-intro">' +
    '<p class="pt-badge" style="display:inline-block;margin-bottom:16px">Placement Test</p>' +
    '<h2>Find your level</h2>' +
    '<p>24 questions covering A1 to C2 grammar.<br>One question at a time — instant feedback on each answer.</p>' +
    '<button class="pt-start" onclick="startTest()">Start test</button>' +
    '</div>';
}

function startTest() {
  current = 0;
  bandScores = {a1:0,a2:0,b1:0,b2:0,c1:0,c2:0};
  showQ(0);
}

function showQ(i) {
  var q = QUESTIONS[i];
  var pct = Math.round((i / QUESTIONS.length) * 100);
  var levelLabel = q.level.toUpperCase();

  var html =
    '<div class="pt-prog"><div class="pt-prog-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="pt-body">' +
    '<div class="pt-meta"><span class="pt-badge">' + levelLabel + '</span><span class="pt-counter">Question ' + (i+1) + ' of ' + QUESTIONS.length + '</span></div>' +
    '<p class="pt-qtext">' + escHtml(q.text) + '</p>';

  if (q.type === 'mc') {
    html += '<div class="pt-choices">';
    q.choices.forEach(function(c, idx) {
      html += '<button class="pt-opt" onclick="answerMC(' + i + ',' + idx + ')">' + escHtml(c) + '</button>';
    });
    html += '</div>';
  } else {
    html +=
      '<div class="pt-textrow">' +
      '<input id="pt-inp" class="pt-input" type="text" autocomplete="off" placeholder="Type your answer..." onkeydown="if(event.key===\'Enter\')checkText(' + i + ')">' +
      '<button id="pt-chk" class="pt-chk" onclick="checkText(' + i + ')">Check</button>' +
      '</div>' +
      '<div id="pt-hint" class="pt-hint"></div>';
  }

  html += '</div>';
  stage.innerHTML = html;
  if (q.type === 'text') {
    var inp = document.getElementById('pt-inp');
    if (inp) inp.focus();
  }
}

function answerMC(qi, choiceIdx) {
  var q = QUESTIONS[qi];
  var btns = stage.querySelectorAll('.pt-opt');
  btns.forEach(function(b) { b.disabled = true; });

  var selected = btns[choiceIdx];
  var isCorrect = (q.choices[choiceIdx] === q.answer);
  if (isCorrect) {
    selected.classList.add('correct');
    bandScores[q.level]++;
  } else {
    selected.classList.add('wrong');
    // reveal correct answer
    btns.forEach(function(b, i) {
      if (q.choices[i] === q.answer) b.classList.add('reveal');
    });
  }
  setTimeout(function() { advance(qi); }, 750);
}

function checkText(qi) {
  var q = QUESTIONS[qi];
  var inp = document.getElementById('pt-inp');
  var hint = document.getElementById('pt-hint');
  var chk = document.getElementById('pt-chk');
  if (!inp || inp.disabled) return;

  var val = inp.value.trim().toLowerCase();
  if (!val) return;

  inp.disabled = true;
  chk.disabled = true;

  var isCorrect = q.accept.some(function(a) { return a.toLowerCase() === val; });
  if (isCorrect) {
    inp.classList.add('correct');
    hint.className = 'pt-hint ok';
    hint.textContent = 'Correct!';
    bandScores[q.level]++;
  } else {
    inp.classList.add('wrong');
    hint.className = 'pt-hint err';
    hint.textContent = 'Correct answer: ' + q.accept[0];
  }
  setTimeout(function() { advance(qi); }, 1000);
}

function advance(qi) {
  var next = qi + 1;
  if (next < QUESTIONS.length) {
    showQ(next);
  } else {
    showResults();
  }
}

function getRecommendation(scores) {
  var pcts = {};
  BANDS.forEach(function(b) { pcts[b] = scores[b] / 4; });
  var ordered = ['c2','c1','b2','b1','a2','a1'];
  var recommend = 'a1';
  for (var i = 0; i < ordered.length; i++) {
    if (pcts[ordered[i]] >= 0.5) { recommend = ordered[i]; break; }
  }
  var next = {a1:'a2',a2:'b1',b1:'b2',b2:'c1',c1:'c2',c2:'c2'};
  if (pcts[recommend] >= 0.75) recommend = next[recommend];
  return recommend;
}

function showResults() {
  var total = BANDS.reduce(function(s,b){ return s + bandScores[b]; }, 0);
  var recommend = getRecommendation(bandScores);
  var pct = Math.round((total / QUESTIONS.length) * 100);

  // Save result to localStorage (P0 fix)
  try {
    localStorage.setItem('wordplay_recommended_level', recommend);
    localStorage.setItem('wordplay_placement', JSON.stringify({
      score: total, total: QUESTIONS.length, pct: pct,
      recommended: recommend, date: new Date().toISOString()
    }));
  } catch(e) { /* storage unavailable */ }

  var bandHtml = '';
  BANDS.forEach(function(b) {
    var s = bandScores[b];
    var col = s >= 3 ? 'var(--green)' : s >= 2 ? 'var(--amber)' : 'var(--muted)';
    bandHtml +=
      '<div class="pt-band-cell">' +
      '<div class="pt-band-lbl" style="color:' + col + '">' + b.toUpperCase() + '</div>' +
      '<div class="pt-band-n"  style="color:' + col + '">' + s + '/4</div>' +
      '</div>';
  });

  var recName = LEVEL_NAMES[recommend];
  var recPath = LEVEL_PATHS[recommend];

  stage.innerHTML =
    '<div class="pt-prog"><div class="pt-prog-fill" style="width:100%"></div></div>' +
    '<div class="pt-results">' +
    '<div class="pt-res-eyebrow">Your result</div>' +
    '<div class="pt-res-score">' + total + ' / ' + QUESTIONS.length + '</div>' +
    '<div class="pt-res-pct">' + pct + '%</div>' +
    '<div class="pt-band-grid">' + bandHtml + '</div>' +
    '<div class="pt-rec-box">' +
    '<div class="pt-rec-lbl">Recommended starting point</div>' +
    '<div class="pt-rec-name">' + recName + '</div>' +
    '<a href="' + recPath + '/index.html" class="pt-rec-btn">Start ' + recommend.toUpperCase() + ' &#8594;</a>' +
    '</div>' +
    '<div class="pt-steps">' +
    '<h4>What to do next</h4>' +
    '<ol><li>Click the button above to open your level hub</li>' +
    '<li>Go to <strong>Grammar &rarr; Chapter 1</strong> and click <strong>Lesson</strong></li>' +
    '<li>After the lesson: do the <strong>Practice</strong> worksheet, then play the <strong>Game</strong></li>' +
    '<li>Complete each chapter before moving to the next</li>' +
    '<li>Your progress is saved automatically &mdash; come back anytime</li></ol>' +
    '</div>' +
    '</div>' +
    '<a href="index.html" class="pt-home-link">Back to home</a>';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Show intro on load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', showIntro);
} else { showIntro(); }
</script>
