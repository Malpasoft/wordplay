.vocab-page { max-width: 800px; margin: 0 auto; padding: 20px; }
.vocab-status { font-family: var(--font-sans); font-size: .75rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
.mode-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
.mode-tab { font-family: var(--font-sans); font-size: .72rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; padding: 8px 16px; border-radius: 4px; cursor: pointer;
  border: 1.5px solid var(--hairline); background: transparent; color: var(--ink); transition: all .15s; }
.mode-tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.flashcard-wrap { perspective: 800px; margin: 0 auto 20px; max-width: 480px; }
.flashcard { width: 100%; height: 220px; position: relative; transform-style: preserve-3d;
  transition: transform .5s; cursor: pointer; border-radius: 10px; }
.flashcard.flipped { transform: rotateY(180deg); }
.fc-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px; text-align: center; border: 1px solid var(--hairline); }
.fc-front { background: var(--paper); }
.fc-back { background: var(--paper); transform: rotateY(180deg); }
.fc-word { font-size: 1.8rem; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.fc-ipa { font-family: var(--font-sans); font-size: .85rem; color: var(--muted); margin-bottom: 8px; }
.fc-def { font-size: .95rem; color: var(--ink); margin-bottom: 8px; }
.fc-ex { font-size: .85rem; color: var(--muted); font-style: italic; }
.fc-audio-btn { background: none; border: 1px solid var(--hairline); border-radius: 4px;
  padding: 4px 10px; font-family: var(--font-sans); font-size: .65rem; font-weight: 700;
  letter-spacing: .5px; text-transform: uppercase; color: var(--muted); cursor: pointer;
  margin-top: 8px; transition: border-color .15s, color .15s; }
.fc-audio-btn:hover { border-color: var(--amber); color: var(--amber); }
.fc-hint { font-family: var(--font-sans); font-size: .65rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px; margin-top: 12px; }
.fc-nav { display: flex; align-items: center; gap: 16px; justify-content: center; margin-bottom: 20px; }
.fc-btn { font-family: var(--font-sans); font-size: .72rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; padding: 9px 18px; border-radius: 4px; cursor: pointer;
  border: 1.5px solid var(--hairline); background: transparent; color: var(--ink); }
.fc-btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.fc-counter { font-family: var(--font-sans); font-size: .75rem; color: var(--muted); font-weight: 600; }
.mastery-badge { display: inline-block; padding: 8px 18px; background: rgba(184,134,11,.12);
  color: var(--amber); font-family: var(--font-sans); font-size: .78rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; border-radius: 4px; margin-bottom: 16px; }
.word-list-item { display: flex; align-items: baseline; gap: 12px; padding: 10px 0;
  border-bottom: 1px solid var(--hairline); }
.wl-word { font-weight: 700; font-size: 1rem; min-width: 140px; }
.wl-def { font-size: .88rem; color: var(--ink); }
</style>

  <h1>Animals</h1>
  <div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">Topic mastered</span></div>
  <div class="vocab-status" id="vocabStatus">10 words &middot; tap to flip</div>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('flash', this)">Flashcards</button>
    <button class="mode-tab" onclick="setMode('list', this)">Word list</button>
  </div>

  <!-- FLASHCARD MODE -->
  <div id="modeFlash">
    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="fc-face fc-front">
          <div class="fc-word" id="fcWord"></div>
          <div class="fc-ipa" id="fcIpa"></div>
          <div class="fc-hint">tap to reveal definition</div>
          <button class="fc-audio-btn" onclick="speakWord(event)">&#9654; Pronounce</button>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-def" id="fcDef"></div>
          <div class="fc-ex" id="fcEx"></div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="fc-btn" onclick="fcPrev()">&#9664; Prev</button>
      <span class="fc-counter" id="fcCounter"></span>
      <button class="fc-btn" onclick="fcNext()">Next &#9654;</button>
    </div>
    <div style="text-align:center">
      <button class="fc-btn primary" onclick="markMastered()" id="btnMastered">Mark topic as mastered</button>
    </div>
  </div>

  <!-- WORD LIST MODE -->
  <div id="modeList" style="display:none">
    <div id="wordList"></div>
  </div>
</div>

<footer class="site-footer">Word Play &middot; Cambridge English A1&#8594;C2</footer>

<script src="../../../../shared/store.js?v=v105"></script>
<script>
var SLUG = 'animals';
var LEVEL = 'a1';
var MASTERY_KEY = 'wordplay_vocab_a1_animals_mastered';
var PROG_KEY = 'a1';
var WORDS = [
  {"word":"dog",     "ipa":"/dɒɡ/",        "def":"a common pet animal",               "ex":"I have a <b>dog</b> called Max."},
  {"word":"cat",     "ipa":"/kæt/",        "def":"a small furry pet",                 "ex":"The <b>cat</b> is sleeping."},
  {"word":"bird",    "ipa":"/bɜʼd/",       "def":"an animal with wings that can fly", "ex":"A <b>bird</b> is singing in the tree."},
  {"word":"fish",    "ipa":"/fɪʃ/",        "def":"an animal that lives in water",     "ex":"There are <b>fish</b> in the lake."},
  {"word":"horse",   "ipa":"/hɔʼs/",       "def":"a large animal you can ride",       "ex":"She rides a <b>horse</b> every weekend."},
  {"word":"cow",     "ipa":"/kaʊ/",        "def":"a farm animal that gives milk",     "ex":"The <b>cow</b> is in the field."},
  {"word":"chicken", "ipa":"/ˈtʃɪk.ɪn/",  "def":"a bird kept for eggs and meat",     "ex":"We have ten <b>chickens</b> on the farm."},
  {"word":"rabbit",  "ipa":"/ˈræb.ɪt/",   "def":"a small animal with long ears",     "ex":"My sister has a pet <b>rabbit</b>."},
  {"word":"elephant","ipa":"/ˈel.ɪ.fənt/","def":"a very large grey animal",          "ex":"The <b>elephant</b> is in the zoo."},
  {"word":"monkey",  "ipa":"/ˈmʌŋ.ki/",   "def":"an animal that climbs trees",       "ex":"The <b>monkey</b> ate a banana."}
];

var fcIdx = 0;
var flipped = false;
var mastered = false;
var fcSeen = new Set();

function setMode(mode, btn) {
  document.querySelectorAll('.mode-tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('modeFlash').style.display = mode === 'flash' ? '' : 'none';
  document.getElementById('modeList').style.display = mode === 'list' ? '' : 'none';
  if (mode === 'list') renderList();
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('flashcard').classList.toggle('flipped', flipped);
}

function speakWord(e) {
  if (e) e.stopPropagation();
  var w = WORDS[fcIdx];
  if (!w) return;
  try {
    var u = new SpeechSynthesisUtterance(w.word);
    u.lang = 'en-GB';
    u.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch(err) {}
}

function showCard(idx) {
  flipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa;
  document.getElementById('fcDef').textContent = w.def;
  document.getElementById('fcEx').innerHTML = w.ex;
  document.getElementById('fcCounter').textContent = (idx + 1) + ' / ' + WORDS.length;
  fcSeen.add(idx);
  if (!mastered && fcSeen.size >= WORDS.length) { mastered = true; setTimeout(markMastered, 700); }
}

function fcNext() { fcIdx = (fcIdx + 1) % WORDS.length; showCard(fcIdx); }
function fcPrev() { fcIdx = (fcIdx - 1 + WORDS.length) % WORDS.length; showCard(fcIdx); }

function markMastered() {
  mastered = true;
  try {
    localStorage.setItem(MASTERY_KEY, '1');
    try {
      var _pd = JSON.parse(localStorage.getItem('wordplay_progress') || '{}');
      _pd[PROG_KEY] = _pd[PROG_KEY] || {};
      _pd[PROG_KEY]['vocab_mastered_' + SLUG] = { done: true, date: new Date().toISOString() };
      localStorage.setItem('wordplay_progress', JSON.stringify(_pd));
    } catch(_e) {}
  } catch(e) {}
  document.getElementById('masteryBadge').style.display = 'block';
  document.getElementById('vocabStatus').textContent = '10 words · mastered ✓';
  document.getElementById('btnMastered').textContent = 'Mastered!';
  document.getElementById('btnMastered').disabled = true;
}

function checkMastered() {
  try {
    if (localStorage.getItem(MASTERY_KEY) === '1') {
      mastered = true;
      document.getElementById('masteryBadge').style.display = 'block';
      document.getElementById('vocabStatus').textContent = '10 words · mastered ✓';
      document.getElementById('btnMastered').textContent = 'Mastered!';
      document.getElementById('btnMastered').disabled = true;
    }
  } catch(e) {}
}

function renderList() {
  var html = WORDS.map(function(w) {
    return '<div class="word-list-item"><span class="wl-word">' + w.word + '</span>' +
      '<span class="wl-def">' + w.def + '</span></div>';
  }).join('');
  document.getElementById('wordList').innerHTML = html;
}

showCard(0);
checkMastered();
</script>

<div style="margin-top:24px;border-top:1px solid var(--hairline);padding-top:20px">
  <div style="font-family:var(--font-sans);font-size:.65rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">My notes &amp; examples</div>
  <textarea id="my-notes-area" maxlength="500" placeholder="Write your own example sentence, a memory trick, or a note in your language&hellip;" style="width:100%;min-height:80px;padding:10px 12px;font-family:Georgia,serif;font-size:.88rem;color:var(--ink);background:var(--paper);border:1.5px solid var(--hairline);border-radius:6px;resize:vertical;line-height:1.6;box-sizing:border-box"></textarea>
  <div style="font-family:var(--font-sans);font-size:.65rem;color:var(--muted);margin-top:4px;text-align:right"><span id="notes-chars">0</span>/500 &middot; auto-saved</div>
</div>
<script>
(function(){
  var ta = document.getElementById('my-notes-area');
  var cc = document.getElementById('notes-chars');
  if (!ta) return;
  var KEY = 'wp_notes_a1_animals';
  try { ta.value = localStorage.getItem(KEY) || ''; cc.textContent = ta.value.length; } catch(e){}
  var t;
  ta.addEventListener('input', function() {
    cc.textContent = ta.value.length;
    clearTimeout(t);
    t = setTimeout(function() {
      try { localStorage.setItem(KEY, ta.value); } catch(e) {}
    }, 600);
  });
})();
</script>
</body>
