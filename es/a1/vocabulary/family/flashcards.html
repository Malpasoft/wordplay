<style>
.vocab-page{max-width:800px;margin:0 auto;padding:20px}
.mode-tabs{display:flex;gap:8px;margin-bottom:24px}
.mode-tab{font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;border-radius:4px;cursor:pointer;border:1.5px solid var(--hairline);background:transparent;color:var(--ink);transition:all .15s}
.mode-tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.flashcard-wrap{perspective:800px;margin:0 auto 20px;max-width:480px}
.flashcard{width:100%;height:220px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;border-radius:10px}
.flashcard.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;border:1px solid var(--hairline)}
.fc-front{background:var(--paper)}
.fc-back{background:var(--paper);transform:rotateY(180deg)}
.fc-word{font-size:1.8rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.fc-ipa{font-family:var(--font-sans);font-size:.85rem;color:var(--muted);margin-bottom:8px}
.fc-def{font-size:.92rem;color:var(--ink);margin-bottom:8px;line-height:1.4}
.fc-ex{font-size:.82rem;color:var(--muted);font-style:italic}
.fc-hint{font-family:var(--font-sans);font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:12px}
.fc-nav{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:20px}
.fc-btn{font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;border-radius:4px;cursor:pointer;border:1.5px solid var(--hairline);background:transparent;color:var(--ink)}
.fc-btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.fc-counter{font-family:var(--font-sans);font-size:.75rem;color:var(--muted);font-weight:600}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-item{padding:12px 14px;border:1.5px solid var(--hairline);border-radius:6px;cursor:pointer;font-size:.9rem;color:var(--ink);transition:border-color .15s,background .15s;user-select:none}
.match-item:hover{border-color:var(--ink)}
.match-item.selected{border-color:var(--amber);background:rgba(184,134,11,.08)}
.match-item.correct{border-color:#27ae60;background:rgba(39,174,96,.08);pointer-events:none}
.match-item.wrong{border-color:#c0392b;background:rgba(192,57,43,.08)}
.fc-audio-btn{background:transparent;border:1.5px solid var(--hairline);border-radius:4px;padding:5px 14px;cursor:pointer;font-family:var(--font-sans);font-size:.65rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-top:10px;transition:border-color .15s,color .15s}
.fc-audio-btn:hover{border-color:var(--amber);color:var(--amber)}
</style>
</head>
<body>
<header class="site-header"><div class="site-header-inner">

</div></header>

<nav class="chapter-nav" style="margin-bottom:20px">

<div class="vocab-page">
  <div class="chapter-num">V3</div>
  <h1>Familia</h1>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('flash', this)">Tarjetas</button>
    <button class="mode-tab" onclick="setMode('match', this)">Emparejar</button>
    <button class="mode-tab" onclick="setMode('list', this)">Lista</button>
  </div>
  <div id="modeFlash">
    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="fc-face fc-front">
          <div class="fc-word" id="fcWord"></div>
          <div class="fc-ipa" id="fcIpa"></div>
          <button class="fc-audio-btn" id="fcAudioBtn" onclick="speakWord(event)">&#9654; Pronunciar</button>
          <div class="fc-hint">toca para ver la traducción</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-def" id="fcDef"></div>
          <div class="fc-ex" id="fcEx"></div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="fc-btn" onclick="fcPrev()">&#9664; Anterior</button>
      <span class="fc-counter" id="fcCounter"></span>
      <button class="fc-btn primary" onclick="fcNext()">Siguiente &#9654;</button>
    </div>
    <div style="text-align:center">
      <button class="fc-btn" onclick="markMastered()">Marcar todo como dominado</button>
    </div>
  </div>
  <div id="modeMatch" style="display:none">
    <p style="font-size:.88rem;color:var(--muted);margin-bottom:16px">Toca una palabra y luego su traducción correcta.</p>
    <div style="font-family:var(--font-sans);font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:16px" id="matchScore">0 / 5 emparejados</div>
    <div class="match-grid">
      <div class="match-col" id="matchWords"></div>
      <div class="match-col" id="matchDefs"></div>
    </div>
    <div style="text-align:center">
      <button class="fc-btn primary" onclick="newMatchRound()" id="matchNextBtn" style="display:none">Siguientes 5 &#9654;</button>
    </div>
  </div>
  <div id="modeList" style="display:none">
    <table style="width:100%;border-collapse:collapse;font-size:.9rem">
      <thead><tr style="border-bottom:2px solid var(--hairline)">
        <th style="text-align:left;padding:8px;font-family:var(--font-sans);font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)">Inglés</th>
        <th style="text-align:left;padding:8px;font-family:var(--font-sans);font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)">IPA</th>
        <th style="text-align:left;padding:8px;font-family:var(--font-sans);font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)">Español</th>
      </tr></thead>
      <tbody id="wordListBody"></tbody>
    </table>
  </div>
</div>
<footer class="site-footer">Word Play · Cambridge English A1→C2</footer>
<script>
var WORDS = [
  {"word": "mother", "ipa": "/\u02c8m\u028c\u00f0.\u0259r/", "definition": "madre \u2014 la mujer que te dio la vida", "example": "My mother is a teacher."},
  {"word": "father", "ipa": "/\u02c8f\u0251\u02d0.\u00f0\u0259r/", "definition": "padre \u2014 el hombre que te dio la vida", "example": "My father works in an office."},
  {"word": "sister", "ipa": "/\u02c8s\u026as.t\u0259r/", "definition": "hermana \u2014 una chica de la misma familia", "example": "I have one sister."},
  {"word": "brother", "ipa": "/\u02c8br\u028c\u00f0.\u0259r/", "definition": "hermano \u2014 un chico de la misma familia", "example": "My brother is 15 years old."},
  {"word": "grandmother", "ipa": "/\u02c8\u0261r\u00e6nd.m\u028c\u00f0.\u0259r/", "definition": "abuela \u2014 la madre de tu padre o madre", "example": "My grandmother lives in the countryside."},
  {"word": "grandfather", "ipa": "/\u02c8\u0261r\u00e6nd.f\u0251\u02d0.\u00f0\u0259r/", "definition": "abuelo \u2014 el padre de tu padre o madre", "example": "My grandfather likes fishing."},
  {"word": "aunt", "ipa": "/\u0251\u02d0nt/", "definition": "t\u00eda \u2014 hermana de tu padre o madre", "example": "My aunt visits us at Christmas."},
  {"word": "uncle", "ipa": "/\u02c8\u028c\u014b.k\u0259l/", "definition": "t\u00edo \u2014 hermano de tu padre o madre", "example": "My uncle has two children."},
  {"word": "cousin", "ipa": "/\u02c8k\u028cz.\u026an/", "definition": "primo / prima \u2014 hijo de tu t\u00edo o t\u00eda", "example": "I play with my cousin at weekends."},
  {"word": "son", "ipa": "/s\u028cn/", "definition": "hijo \u2014 el ni\u00f1o var\u00f3n de una familia", "example": "They have one son."}
];
var STORAGE_KEY = 'wordplay_vocab_es-a1_family_mastered';
var fcIdx = 0;
var matchSelected = null;
var matchRound = 0;
var mastered = false;
var fcSeen = new Set();

function renderCard() {
  var w = WORDS[fcIdx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa;
  document.getElementById('fcDef').textContent = w.definition;
  document.getElementById('fcEx').textContent = '"' + w.example + '"';
  document.getElementById('fcCounter').textContent = (fcIdx + 1) + ' / ' + WORDS.length;
  fcSeen.add(fcIdx);
  document.getElementById('flashcard').classList.remove('flipped');
  if (!mastered && fcSeen.size >= WORDS.length) { mastered = true; setTimeout(markMastered, 700); }
}
function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }
function speakWord(e) {
  if (e) e.stopPropagation();
  if (!window.speechSynthesis) return;
  var utt = new SpeechSynthesisUtterance(WORDS[fcIdx].word);
  utt.lang = 'en-GB'; utt.rate = 0.9;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}
function fcNext() { fcIdx = (fcIdx + 1) % WORDS.length; renderCard(); }
function fcPrev() { fcIdx = (fcIdx - 1 + WORDS.length) % WORDS.length; renderCard(); }

function newMatchRound() {
  matchSelected = null;
  var start = (matchRound * 5) % WORDS.length;
  var roundWords = WORDS.slice(start, start + 5);
  if (roundWords.length < 5) roundWords = WORDS.slice(0, 5);
  var shuffled = roundWords.map(function(w,i){return {def:w.definition,idx:i}});
  shuffled.sort(function(){return Math.random()-.5});
  var wc = document.getElementById('matchWords');
  var dc = document.getElementById('matchDefs');
  wc.innerHTML = ''; dc.innerHTML = '';
  document.getElementById('matchNextBtn').style.display = 'none';
  document.getElementById('matchScore').textContent = '0 / 5 emparejados';
  roundWords.forEach(function(w,i){
    var el = document.createElement('div');
    el.className = 'match-item'; el.textContent = w.word;
    el.dataset.idx = i; el.dataset.type = 'word';
    el.onclick = function(){selectMatch(this)}; wc.appendChild(el);
  });
  shuffled.forEach(function(sd){
    var el = document.createElement('div');
    el.className = 'match-item'; el.textContent = sd.def;
    el.dataset.idx = sd.idx; el.dataset.type = 'def';
    el.onclick = function(){selectMatch(this)}; dc.appendChild(el);
  });
  matchRound++;
}
var matchCount = 0;
function selectMatch(el) {
  if (el.classList.contains('correct')) return;
  if (!matchSelected) {
    if (el.classList.contains('selected')) { el.classList.remove('selected'); matchSelected = null; return; }
    matchSelected = el; el.classList.add('selected');
  } else {
    if (matchSelected === el) { el.classList.remove('selected'); matchSelected = null; return; }
    if (matchSelected.dataset.type === el.dataset.type) {
      matchSelected.classList.remove('selected'); matchSelected = el; el.classList.add('selected'); return;
    }
    var we = matchSelected.dataset.type==='word'?matchSelected:el;
    var de = matchSelected.dataset.type==='def'?matchSelected:el;
    if (we.dataset.idx === de.dataset.idx) {
      we.classList.remove('selected'); we.classList.add('correct');
      de.classList.remove('selected'); de.classList.add('correct');
      matchCount++;
      document.getElementById('matchScore').textContent = matchCount + ' / 5 emparejados';
      if (matchCount >= 5) { matchCount = 0; document.getElementById('matchNextBtn').style.display = 'inline-block'; }
    } else {
      we.classList.add('wrong'); de.classList.add('wrong');
      setTimeout(function(){ we.classList.remove('wrong','selected'); de.classList.remove('wrong','selected'); }, 600);
    }
    matchSelected = null;
  }
}
function renderList() {
  var tb = document.getElementById('wordListBody');
  WORDS.forEach(function(w){
    var tr = document.createElement('tr');
    tr.style.borderBottom = '1px solid var(--hairline)';
    tr.innerHTML = '<td style="padding:8px;font-weight:600">'+w.word+'</td><td style="padding:8px;color:var(--muted);font-size:.82rem">'+w.ipa+'</td><td style="padding:8px;font-size:.88rem">'+w.definition+'</td>';
    tb.appendChild(tr);
  });
}
function setMode(mode, btn) {
  ['modeFlash','modeMatch','modeList'].forEach(function(id){ document.getElementById(id).style.display='none'; });
  document.querySelectorAll('.mode-tab').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('mode'+mode.charAt(0).toUpperCase()+mode.slice(1)).style.display='';
  btn.classList.add('active');
  if (mode==='match' && !document.getElementById('matchWords').children.length) newMatchRound();
  if (mode==='list' && !document.getElementById('wordListBody').children.length) renderList();
}
function markMastered() {
  mastered = true;
  try {
    localStorage.setItem(STORAGE_KEY, '1');
    var raw = localStorage.getItem('wordplay_progress');
    var pd = raw ? JSON.parse(raw) : {};
    pd['es-a1'] = pd['es-a1'] || {};
    pd['es-a1']['vocab_mastered_family'] = { done: true, date: new Date().toISOString() };
    localStorage.setItem('wordplay_progress', JSON.stringify(pd));
  } catch(e) {}
}
function checkMastered() {
  try { if (localStorage.getItem(STORAGE_KEY)==='1') { mastered=true; } } catch(e) {}
}
renderCard();
checkMastered();
</script>
</body></html>
