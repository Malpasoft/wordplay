name: Pedagogy Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pedagogy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pedagogy check
        run: |
          python3 scripts/pedagogy_check.py 2>&1 | tee /tmp/check_output.txt
          if grep -q "FAIL" /tmp/check_output.txt; then
            echo "Pedagogy check failed — see output above"
            exit 1
          fi
