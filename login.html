<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Word Play — Sign In</title>
  <link rel="stylesheet" href="/shared/base.css?v=v125" />
  <script src="/shared/auth.js?v=1"></script>
  <script src="shared/dark-init.js?v=v112"></script>
  <style>
    .login-container {
      max-width: 420px;
      margin: 60px auto;
      padding: 2rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
    }

    .login-container h1 {
      font-size: var(--fs-h2);
      margin-bottom: 1.5rem;
      text-align: center;
      color: var(--ink);
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: var(--fs-body);
      font-weight: var(--fw-medium);
      color: var(--ink);
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      font-size: var(--fs-body);
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--paper);
      color: var(--ink);
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: 2px solid var(--amber);
      outline-offset: 2px;
      border-color: var(--amber);
    }

    .form-group input::placeholder {
      color: var(--muted);
    }

    .login-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: var(--fs-body);
      font-weight: var(--fw-medium);
      background: var(--amber);
      color: var(--paper);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .login-btn:hover {
      opacity: 0.85;
    }

    .login-btn:active {
      opacity: 0.7;
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .login-error {
      color: #d32f2f;
      font-size: var(--fs-small);
      margin-top: 0.5rem;
      display: none;
    }

    .login-status {
      text-align: center;
      font-size: var(--fs-small);
      color: var(--muted);
      margin-top: 1rem;
    }

    .login-footer {
      text-align: center;
      font-size: var(--fs-small);
      color: var(--muted);
      margin-top: 1.5rem;
    }

    .login-footer a {
      color: var(--amber);
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .login-container {
        margin: 30px auto;
        padding: 1.5rem;
      }
    }
  </style>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="/" class="brand">Word Play</a>
      <button class="dark-toggle" aria-label="Toggle dark mode" onclick="toggleDark()">&#9680; Dark</button>
    </div>
  </header>

  <div class="login-container">
    <h1>Sign In</h1>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label for="password" style="display:flex;justify-content:space-between;align-items:baseline">
          Password
          <a href="/reset.html" style="font-size:var(--fs-small);color:var(--amber);text-decoration:none;font-weight:normal">Forgot password?</a>
        </label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
        />
        <div class="login-error" id="error"></div>
      </div>

      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      <div class="login-status" id="status"></div>
    </form>

    <div class="login-footer">
      Don't have an account? <a href="/signup.html">Create one</a>
    </div>
  </div>

  <script>
    // If already logged in, redirect to home
    if (isLoggedIn()) {
      location.href = '/';
    }

    var form = document.getElementById('login-form');
    var btn = document.getElementById('login-btn');
    var error = document.getElementById('error');
    var status = document.getElementById('status');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;

      if (!email || !password) {
        error.textContent = 'Email and password are required.';
        error.style.display = 'block';
        return;
      }

      error.style.display = 'none';
      btn.disabled = true;
      status.textContent = 'Signing in…';

      try {
        var res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });

        if (!res.ok) {
          var err = await res.json();
          error.textContent = err.error || 'Sign in failed.';
          error.style.display = 'block';
          btn.disabled = false;
          status.textContent = '';
          return;
        }

        var data = await res.json();
        setAuthState(data.token, {
          user_id: data.user_id,
          email: data.email,
          role: data.role,
          target_lang: data.target_lang || null,
          l1: data.l1 || null
        });

        // Redirect to home for all roles
        location.href = '/';
      } catch (e) {
        error.textContent = 'Network error. Please try again.';
        error.style.display = 'block';
        btn.disabled = false;
        status.textContent = '';
      }
    });
  </script>
  <footer class="site-footer" style="text-align:center;padding:24px 16px;font-size:.75rem;color:var(--muted)">
    <a href="/privacy.html" style="color:var(--muted)">Privacy Policy</a> &middot;
    <a href="/terms.html" style="color:var(--muted)">Terms of Service</a>
  </footer>
</body>
</html>
