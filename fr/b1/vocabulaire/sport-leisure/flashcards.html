<style>
.vocab-page{max-width:800px;margin:0 auto;padding:20px 0}
.mode-tabs{display:flex;gap:8px;margin-bottom:24px}
.mode-tab{font-family:var(--font-sans);font-size:.72rem;font-weight:700;padding:8px 16px;border-radius:4px;cursor:pointer;border:1.5px solid var(--hairline);background:transparent;color:var(--ink)}
.mode-tab.active{background:var(--ink);color:var(--paper)}
.flashcard-wrap{perspective:800px;margin:0 auto 20px;max-width:480px}
.flashcard{width:100%;height:220px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;border-radius:10px}
.flashcard.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;border:1px solid var(--hairline)}
.fc-front{background:var(--paper)}
.fc-back{background:var(--paper);transform:rotateY(180deg)}
.fc-word{font-size:1.8rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.fc-def{font-size:.95rem;color:var(--ink)}
.fc-nav{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:20px}
.fc-btn{font-family:var(--font-sans);font-size:.72rem;font-weight:700;padding:9px 18px;border-radius:4px;cursor:pointer;border:1.5px solid var(--hairline);background:transparent;color:var(--ink)}
.fc-btn.primary{background:var(--ink);color:var(--paper)}
.mastery-badge{display:inline-block;padding:8px 18px;background:rgba(184,134,11,.12);color:var(--amber);font-size:.78rem;margin-bottom:16px}
</style>
