<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#1A1A1A">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>Student Profiles | Word Play</title>
<link rel="stylesheet" href="shared/base.css?v=v123">
<script src="shared/dark-init.js?v=v109"></script>
<style>
/* ── Layout ── */
.pro-wrap{max-width:1000px;margin:0 auto;padding:20px 16px}
h1{font-size:1.4rem;color:var(--navy);margin:0}
.pro-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.pro-header-actions{margin-left:auto;display:flex;gap:8px}

/* ── Tab nav ── */
.tab-nav{display:flex;gap:0;border-bottom:2px solid var(--hairline);margin-bottom:20px;overflow-x:auto}
.tab-btn{font-family:var(--font-sans);font-size:.68rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:8px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--amber)}
.tab-btn.dynamic{color:var(--amber)}
.tab-btn.dynamic.active{color:var(--ink)}

/* ── Panels ── */
.panel{display:none}.panel.active{display:block}

/* ── Stats bar ── */
.stats-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.stat-pill{font-family:var(--font-sans);font-size:.72rem;font-weight:700;padding:5px 12px;border-radius:20px;background:var(--paper);border:1px solid var(--hairline);color:var(--ink)}
.stat-pill.warn{border-color:var(--amber);color:var(--amber)}

/* ── Priority gaps table ── */
.gaps-head{font-family:var(--font-sans);font-size:.65rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
.gap-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;border:1px solid var(--hairline);background:var(--paper);margin-bottom:6px;flex-wrap:wrap}
.gap-row:hover{border-color:var(--ink)}
.gap-chapter{font-weight:700;font-size:.88rem;color:var(--navy);flex:1;min-width:120px}
.gap-chapter a{color:inherit;text-decoration:none}
.gap-chapter a:hover{color:var(--amber)}
.gap-badges{display:flex;gap:5px;flex-shrink:0}
.gap-badge{font-family:var(--font-sans);font-size:.58rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:2px;border:1px solid var(--hairline);color:var(--muted)}
.gap-badge.es{border-color:#5b8dd9;color:#5b8dd9}
.gap-badge.en{border-color:#27ae60;color:#27ae60}
.gap-students{font-family:var(--font-sans);font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:6px;flex-shrink:0}
.gap-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);display:inline-block}
.gap-names{font-size:.72rem;color:var(--muted)}
.no-gaps{padding:24px;text-align:center;color:var(--muted);font-family:var(--font-sans);font-size:.82rem;border:1px dashed var(--hairline);border-radius:6px}

/* ── Roster grid ── */
.roster-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.roster-filter{font-family:var(--font-sans);font-size:.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:20px;border:1.5px solid var(--hairline);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.roster-filter.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.roster-sort{font-family:var(--font-sans);font-size:.68rem;padding:5px 10px;border:1.5px solid var(--hairline);border-radius:4px;background:var(--paper);color:var(--ink);margin-left:auto}
.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.stu-card{padding:14px 12px;border-radius:8px;border:1.5px solid var(--hairline);background:var(--paper);cursor:pointer;transition:border-color .15s,transform .1s;text-align:center}
.stu-card:hover{border-color:var(--amber);transform:translateY(-1px)}
.stu-card.active{border-color:var(--amber);background:rgba(184,134,11,.05)}
.stu-avatar{width:40px;height:40px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:#fff;margin:0 auto 8px}
.stu-name{font-weight:700;font-size:.88rem;color:var(--navy);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stu-tags{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:4px}
.stu-tag{font-family:var(--font-sans);font-size:.56rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:1px 5px;border-radius:2px;border:1px solid var(--hairline);color:var(--muted)}
.stu-tag.lvl{border-color:var(--amber);color:var(--amber)}
.stu-gap-count{font-family:var(--font-sans);font-size:.65rem;color:var(--muted)}
.stu-gap-count.warn{color:var(--amber)}
.stu-gap-count.ok{color:#27ae60}
.no-students{grid-column:1/-1;padding:40px;text-align:center;color:var(--muted);font-family:var(--font-sans);font-size:.85rem}

/* ── Roster actions ── */
.add-btn{font-family:var(--font-sans);font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 16px;border-radius:4px;border:none;background:var(--ink);color:var(--paper);cursor:pointer}
.ghost-btn{font-family:var(--font-sans);font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:4px;border:1.5px solid var(--hairline);background:transparent;color:var(--muted);cursor:pointer;transition:border-color .15s,color .15s}
.ghost-btn:hover{border-color:var(--ink);color:var(--ink)}

/* ── Student detail ── */
.detail-card{background:var(--paper);border:1px solid var(--hairline);border-radius:8px;padding:18px;margin-bottom:16px}
.detail-top{display:flex;align-items:flex-start;gap:12px}
.detail-avatar{width:42px;height:42px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:#fff;flex-shrink:0}
.detail-info{flex:1}
.detail-name{font-size:1.1rem;font-weight:700;color:var(--navy);margin:0 0 5px}
.detail-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.d-tag{font-family:var(--font-sans);font-size:.6rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:2px;border:1px solid var(--hairline);color:var(--muted)}
.d-tag.lvl{border-color:var(--amber);color:var(--amber)}
.detail-notes{font-size:.83rem;color:var(--muted);font-style:italic;margin:0}
.detail-actions{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.detail-btn{font-family:var(--font-sans);font-size:.62rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:6px 11px;border-radius:3px;border:1.5px solid var(--hairline);background:transparent;color:var(--ink);cursor:pointer;transition:border-color .15s}
.detail-btn:hover{border-color:var(--ink)}
.detail-btn.danger{border-color:#c0392b;color:#c0392b}
.detail-btn.danger:hover{background:#c0392b;color:#fff}

/* ── Content gap ── */
.gap-section{background:var(--paper);border:1px solid var(--hairline);border-radius:8px;padding:18px;margin-bottom:16px}
.gs-title{font-weight:700;font-size:.95rem;color:var(--navy);margin:0 0 4px}
.gs-sub{font-family:var(--font-sans);font-size:.72rem;color:var(--muted);margin:0 0 12px}
.gs-bar{height:7px;border-radius:4px;overflow:hidden;display:flex;background:var(--hairline);margin-bottom:6px}
.gs-complete{height:100%;background:#27ae60}
.gs-stub{height:100%;background:var(--amber)}
.gs-missing{height:100%;background:#c0392b}
.gs-stat{font-family:var(--font-sans);font-size:.72rem;color:var(--muted);margin-bottom:12px}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:5px;margin-top:8px}
.ch-chip{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:4px;border:1px solid var(--hairline);font-size:.78rem;color:var(--ink);text-decoration:none;transition:border-color .15s}
.ch-chip:hover{border-color:var(--amber)}
.ch-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-stub{background:var(--amber)}
.dot-missing{background:#c0392b}
.sec-head{font-family:var(--font-sans);font-size:.58rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:10px 0 4px;grid-column:1/-1}

/* ── Edit form ── */
.edit-form{background:var(--paper);border:1px solid var(--hairline);border-radius:8px;padding:18px;margin-bottom:16px;display:none}
.edit-form.visible{display:block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}}
.f-row{margin-bottom:0}
.f-label{font-family:var(--font-sans);font-size:.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}
.f-input,.f-select,.f-textarea{width:100%;box-sizing:border-box;padding:8px 11px;font-family:var(--font-sans);font-size:.88rem;border:1.5px solid var(--hairline);border-radius:4px;background:var(--paper);color:var(--ink);transition:border-color .15s}
.f-input:focus,.f-select:focus,.f-textarea:focus{outline:none;border-color:var(--amber)}
.f-textarea{min-height:64px;resize:vertical;grid-column:1/-1}
.f-actions{display:flex;gap:8px;margin-top:12px;grid-column:1/-1}
.f-save{font-family:var(--font-sans);font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 18px;border-radius:4px;border:none;background:var(--ink);color:var(--paper);cursor:pointer}
.f-cancel{font-family:var(--font-sans);font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 14px;border-radius:4px;border:1.5px solid var(--hairline);background:transparent;color:var(--ink);cursor:pointer}
.placement-hint{font-family:var(--font-sans);font-size:.68rem;color:var(--muted);margin-top:4px}
.placement-hint a{color:var(--amber)}

/* ── Export bar ── */
.export-bar{display:flex;gap:6px;padding-top:12px;border-top:1px solid var(--hairline);flex-wrap:wrap}

/* ── Empty overview ── */
.empty-overview{padding:48px 24px;text-align:center;color:var(--muted);font-family:var(--font-sans);font-size:.85rem}
.empty-overview strong{display:block;font-size:1rem;color:var(--navy);margin-bottom:6px}

/* ── Cloud sync panel ── */
.sync-panel{display:none;background:var(--paper);border:1px solid var(--hairline);border-radius:8px;padding:16px;margin-bottom:16px}
.sync-panel.visible{display:block}
</style>
</head>
<body>
<header class="site-header"><div class="site-header-inner">
  <a href="index.html" class="back back-link" aria-label="Back"></a>
  <a href="index.html" class="brand">Word Play</a>
  <button class="dark-toggle" aria-label="Toggle dark mode" onclick="toggleDark()">&#9680; Dark</button>
</div></header>

<div class="pro-wrap">
  <div class="pro-header">
    <div>
      <h1>Student Profiles</h1>
      <p id="syncStatusText" style="font-family:var(--font-sans);font-size:.72rem;color:var(--muted);margin:2px 0 0">All data stored locally &mdash; set up cloud sync to access from any device.</p>
    </div>
    <div class="pro-header-actions">
      <button class="ghost-btn" onclick="toggleSyncPanel()">Cloud sync</button>
    </div>
  </div>

  <div id="syncPanel" class="sync-panel">
    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <label class="f-label" for="syncCodeInput">Sync passphrase (min 8 chars)</label>
        <input class="f-input" id="syncCodeInput" type="text" placeholder="e.g. wordplay-emi-2026" autocomplete="off">
      </div>
      <div style="display:flex;gap:6px">
        <button class="f-save" onclick="activateSync()">Activate</button>
        <button class="ghost-btn" id="syncNowBtn" style="display:none" onclick="syncNow()">Sync now</button>
        <button class="ghost-btn" id="clearSyncBtn" style="display:none" onclick="clearSync()">Disconnect</button>
      </div>
    </div>
    <p style="font-family:var(--font-sans);font-size:.65rem;color:var(--muted);margin:8px 0 4px">Enter the same passphrase on any device to merge profiles. Keep it private.</p>
    <p id="syncDetailStatus" style="font-family:var(--font-sans);font-size:.68rem;margin:0"></p>
  </div>

  <nav class="tab-nav" id="tabNav">
    <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
    <button class="tab-btn" data-tab="roster" onclick="switchTab('roster')">Roster</button>
  </nav>

  <!-- OVERVIEW panel -->
  <div class="panel active" id="panel-overview">
    <div id="overviewContent"></div>
  </div>

  <!-- ROSTER panel -->
  <div class="panel" id="panel-roster">
    <div class="roster-toolbar" id="rosterToolbar">
      <button class="add-btn" onclick="showAddForm()">+ Add student</button>
      <button class="ghost-btn" onclick="triggerImport()">Import JSON</button>
      <input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)">
      <select class="roster-sort" id="rosterSort" onchange="renderRoster()">
        <option value="name">Sort: Name</option>
        <option value="level">Sort: Level</option>
        <option value="track">Sort: Track</option>
        <option value="gaps">Sort: Most gaps</option>
      </select>
    </div>
    <div id="filterBar" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"></div>
    <div class="roster-grid" id="rosterGrid"></div>

    <!-- Inline add/edit form -->
    <div class="edit-form" id="rosterForm" style="margin-top:16px">
      <h3 id="rosterFormTitle" style="margin:0 0 14px;font-size:1rem;color:var(--navy)">New student</h3>
      <input type="hidden" id="fId">
      <div class="form-grid">
        <div class="f-row">
          <label class="f-label" for="fName">Name</label>
          <input class="f-input" id="fName" type="text" placeholder="e.g. Miguel" autocomplete="off">
        </div>
        <div class="f-row">
          <label class="f-label" for="fL1">Native language (L1)</label>
          <select class="f-select" id="fL1">
            <option>Spanish</option><option>English</option><option>French</option>
            <option>Portuguese</option><option>Italian</option><option>German</option>
            <option>Arabic</option><option>Chinese</option><option>Japanese</option>
            <option>Russian</option><option>Other</option>
          </select>
        </div>
        <div class="f-row">
          <label class="f-label" for="fCourse">Course track</label>
          <select class="f-select" id="fCourse">
            <option value="en">English — universal (A&ndash;C)</option>
            <option value="es">English via Spanish (ES track)</option>
            <option value="espanol">Spanish — universal (A&ndash;C)</option>
            <option value="espanol-en">Spanish via English</option>
          </select>
        </div>
        <div class="f-row">
          <label class="f-label" for="fLevel">Current level</label>
          <select class="f-select" id="fLevel">
            <option value="">— not assessed —</option>
            <option value="A1">A1 — Beginner</option>
            <option value="A2">A2 — Elementary</option>
            <option value="B1">B1 — Intermediate</option>
            <option value="B2">B2 — Upper Intermediate</option>
            <option value="C1">C1 — Advanced</option>
            <option value="C2">C2 — Proficiency</option>
          </select>
          <p class="placement-hint">Not sure? <a href="placement-test.html" target="_blank">Run placement test</a> then return.</p>
        </div>
        <div class="f-row">
          <label class="f-label" for="fCode">Class / group code</label>
          <input class="f-input" id="fCode" type="text" placeholder="e.g. tuesday-adults">
        </div>
        <div class="f-row">
          <label class="f-label" for="fAge">Age (optional)</label>
          <input class="f-input" id="fAge" type="number" min="5" max="99" placeholder="e.g. 42">
        </div>
        <div class="f-row">
          <label class="f-label" for="fTargetLevel">Target level</label>
          <select class="f-select" id="fTargetLevel">
            <option value="">— not set —</option>
            <option value="A1">A1</option><option value="A2">A2</option>
            <option value="B1">B1</option><option value="B2">B2</option>
            <option value="C1">C1</option><option value="C2">C2</option>
          </select>
        </div>
        <div class="f-row">
          <label class="f-label" for="fExam">Exam goal</label>
          <select class="f-select" id="fExam">
            <option value="">None / not set</option>
            <option value="ket">Cambridge KET (A2 Key)</option>
            <option value="pet">Cambridge PET (B1 Prelim)</option>
            <option value="fce">Cambridge FCE (B2 First)</option>
            <option value="cae">Cambridge CAE (C1 Advanced)</option>
            <option value="cpe">Cambridge CPE (C2 Proficiency)</option>
            <option value="dele-a1">DELE A1</option>
            <option value="dele-a2">DELE A2</option>
            <option value="dele-b1">DELE B1</option>
            <option value="dele-b2">DELE B2</option>
            <option value="dele-c1">DELE C1</option>
            <option value="dele-c2">DELE C2</option>
          </select>
        </div>
        <div class="f-row">
          <label class="f-label" for="fFormat">Teaching format</label>
          <select class="f-select" id="fFormat">
            <option value="both">Online &amp; in-person</option>
            <option value="online">Online only</option>
            <option value="inperson">In-person only</option>
          </select>
        </div>
        <div class="f-row">
          <label class="f-label" for="fOccupation">Occupation / context</label>
          <input class="f-input" id="fOccupation" type="text" placeholder="e.g. Chef, Nurse, Student">
        </div>
        <textarea class="f-textarea" id="fNotes" placeholder="Goals, weak areas, learning context, notes…"></textarea>
        <div class="f-actions">
          <button class="f-save" onclick="saveStudent()">Save student</button>
          <button class="f-cancel" onclick="hideForm()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- STUDENT DETAIL panel (dynamic tab) -->
  <div class="panel" id="panel-student">
    <div id="studentContent"></div>
  </div>
</div>

<footer class="site-footer">Word Play &middot; Cambridge English A1&rarr;C2</footer>

<script>
/* ─────────────────────────── state ─────────────────────────── */
var STORAGE_KEY = 'wordplay_student_profiles';
var SYNC_CODE_KEY = 'wordplay_sync_code';
var SYNC_LAST_KEY = 'wordplay_sync_last';
var students = [];
var coverageData = null;
var currentId = null;
var activeTab = 'overview';
var syncCode = null;
var syncBusy = false;

/* ─────────────────────────── persistence ─────────────────────── */
function loadStudents() {
  try { students = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { students = []; }
}
function saveStudentsLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(students));
}
function saveStudents() {
  saveStudentsLocal();
  syncPush();
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

/* ─────────────────────────── coverage data ─────────────────────── */
function loadCoverage() {
  fetch('shared/coverage-data.json?v=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(d){
      coverageData = d;
      if (activeTab === 'overview') renderOverview();
      if (activeTab === 'student' && currentId) renderStudentDetail(currentId);
    })
    .catch(function(){
      coverageData = null;
    });
}

/* ─────────────────────────── tab routing ─────────────────────── */
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.querySelectorAll('.panel').forEach(function(p){
    p.classList.toggle('active', p.id === 'panel-' + tab);
  });
  if (tab === 'overview') renderOverview();
  if (tab === 'roster') renderRoster();
  if (tab === 'student' && currentId) renderStudentDetail(currentId);
}

function ensureStudentTab(id) {
  // Add or update the dynamic student tab
  var nav = document.getElementById('tabNav');
  var existing = nav.querySelector('[data-tab="student"]');
  var s = students.find(function(x){ return x.id === id; });
  if (!existing) {
    var btn = document.createElement('button');
    btn.className = 'tab-btn dynamic';
    btn.dataset.tab = 'student';
    btn.onclick = function(){ switchTab('student'); };
    nav.appendChild(btn);
    existing = btn;
  }
  existing.textContent = s ? s.name : 'Student';
  currentId = id;
  switchTab('student');
}

/* ─────────────────────────── overview ─────────────────────── */
function calcPriorityGaps() {
  if (!coverageData || !students.length) return [];
  var stubs = coverageData.chapters.filter(function(c){ return c.status !== 'complete'; });
  var map = {};
  stubs.forEach(function(c){
    map[c.url] = { chapter: c, studentList: [] };
  });
  students.forEach(function(s){
    if (!s.level) return;
    stubs.forEach(function(c){
      if (c.track === s.course && c.level === s.level) {
        map[c.url].studentList.push(s);
      }
    });
  });
  return Object.values(map)
    .filter(function(g){ return g.studentList.length > 0; })
    .sort(function(a,b){ return b.studentList.length - a.studentList.length || a.chapter.level.localeCompare(b.chapter.level); });
}

function renderOverview() {
  var el = document.getElementById('overviewContent');

  if (!students.length) {
    el.innerHTML = '<div class="empty-overview"><strong>No students yet</strong>Add students in the Roster tab, then come back here to see which content to finish first.</div>';
    return;
  }

  // Stats
  var withLevel = students.filter(function(s){ return s.level; });
  var noLevel = students.filter(function(s){ return !s.level; });
  var tracks = {};
  withLevel.forEach(function(s){ tracks[s.course + '_' + s.level] = true; });
  var levelCount = Object.keys(tracks).length;

  var gaps = calcPriorityGaps();
  var affectedStudents = new Set();
  gaps.forEach(function(g){ g.studentList.forEach(function(s){ affectedStudents.add(s.id); }); });

  var html = '<div class="stats-row">';
  html += '<span class="stat-pill">'+students.length+' student'+(students.length!==1?'s':'')+'</span>';
  if (withLevel.length) html += '<span class="stat-pill">'+levelCount+' active level'+(levelCount!==1?'s':'')+'</span>';
  if (gaps.length) html += '<span class="stat-pill warn">'+gaps.length+' chapter'+(gaps.length!==1?'s':'')+' blocking '+affectedStudents.size+' student'+(affectedStudents.size!==1?'s':'')+'</span>';
  if (noLevel.length) html += '<span class="stat-pill warn">'+noLevel.length+' unassessed</span>';
  html += '</div>';

  // Priority gaps
  if (gaps.length) {
    html += '<p class="gaps-head">Priority gaps &mdash; finish these first</p>';
    gaps.forEach(function(g){
      var c = g.chapter;
      var sectionLabel = {grammar:'Grammar',vocabulary:'Vocabulary',writing:'Writing'}[c.section] || c.section;
      var names = g.studentList.map(function(s){ return esc(s.name); }).join(', ');
      html += '<div class="gap-row">';
      html += '<div class="gap-chapter"><a href="'+c.url+'" target="_blank">'+esc(c.title)+'</a></div>';
      html += '<div class="gap-badges">';
      html += '<span class="gap-badge '+c.track+'">'+c.track.toUpperCase()+'</span>';
      html += '<span class="gap-badge">'+c.level+'</span>';
      html += '<span class="gap-badge">'+sectionLabel+'</span>';
      html += '</div>';
      html += '<div class="gap-students">';
      for (var i=0;i<Math.min(g.studentList.length,5);i++) html += '<span class="gap-dot"></span>';
      html += '</div>';
      html += '<span class="gap-names">'+names+'</span>';
      html += '</div>';
    });
  } else if (withLevel.length) {
    html += '<div class="no-gaps">All content is complete for your current students\' levels.</div>';
  }

  // Students without level
  if (noLevel.length) {
    html += '<p class="gaps-head" style="margin-top:20px">Students without a level set</p>';
    noLevel.forEach(function(s){
      html += '<div class="gap-row" style="cursor:pointer" onclick="ensureStudentTab(\''+s.id+'\')">';
      html += '<div class="gap-chapter">'+esc(s.name)+'</div>';
      html += '<span style="font-family:var(--font-sans);font-size:.72rem;color:var(--muted)">Click to assign a level</span>';
      html += '</div>';
    });
  }

  el.innerHTML = html;
}

/* ─────────────────────────── roster ─────────────────────── */
function getClassCodes() {
  var codes = new Set();
  students.forEach(function(s){ if (s.code) codes.add(s.code); });
  return Array.from(codes).sort();
}

var activeFilter = 'all';

function renderFilterBar() {
  var codes = getClassCodes();
  var bar = document.getElementById('filterBar');
  if (!codes.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  var html = '<button class="roster-filter'+(activeFilter==='all'?' active':'')+'" onclick="setFilter(\'all\')">All</button>';
  codes.forEach(function(code){
    html += '<button class="roster-filter'+(activeFilter===code?' active':'')+'" onclick="setFilter(\''+esc(code)+'\')">'+esc(code)+'</button>';
  });
  bar.innerHTML = html;
}

function setFilter(f) { activeFilter = f; renderRoster(); }

function stubCount(s) {
  if (!coverageData || !s.level) return null;
  var chapters = coverageData.chapters.filter(function(c){
    return c.track === s.course && c.level === s.level;
  });
  if (!chapters.length) return -1;  // -1 = track not built at all
  return chapters.filter(function(c){ return c.status !== 'complete'; }).length;
}

function sortedStudents() {
  var sort = document.getElementById('rosterSort').value;
  var list = students.slice();
  if (activeFilter !== 'all') list = list.filter(function(s){ return s.code === activeFilter; });
  var levelOrder = {A1:1,A2:2,B1:3,B2:4,C1:5,C2:6,'':99};
  if (sort === 'name') list.sort(function(a,b){ return a.name.localeCompare(b.name); });
  else if (sort === 'level') list.sort(function(a,b){ return (levelOrder[a.level||'']||99)-(levelOrder[b.level||'']||99); });
  else if (sort === 'track') list.sort(function(a,b){ return a.course.localeCompare(b.course) || a.name.localeCompare(b.name); });
  else if (sort === 'gaps') list.sort(function(a,b){ return (stubCount(b)||0)-(stubCount(a)||0); });
  return list;
}

function renderRoster() {
  renderFilterBar();
  var list = sortedStudents();
  var grid = document.getElementById('rosterGrid');

  if (!list.length && !students.length) {
    grid.innerHTML = '<div class="no-students">No students yet. Click <strong>+ Add student</strong> to get started.</div>';
    return;
  }
  if (!list.length) {
    grid.innerHTML = '<div class="no-students">No students match this filter.</div>';
    return;
  }

  grid.innerHTML = list.map(function(s){
    var initials = s.name.trim().split(/\s+/).map(function(w){return w[0]}).slice(0,2).join('').toUpperCase();
    var stubs = stubCount(s);
    var gapHtml = stubs === null  ? '<span class="stu-gap-count">No level set</span>'
      : stubs === -1 ? '<span class="stu-gap-count warn">Track not built</span>'
      : stubs === 0  ? '<span class="stu-gap-count ok">All complete</span>'
      : '<span class="stu-gap-count warn">'+stubs+' stub'+(stubs!==1?'s':'')+'</span>';
    var examShort = {'ket':'KET','pet':'PET','fce':'FCE','cae':'CAE','cpe':'CPE','dele-a1':'DELE A1','dele-a2':'DELE A2','dele-b1':'DELE B1','dele-b2':'DELE B2','dele-c1':'DELE C1','dele-c2':'DELE C2'};
    var fmtShort  = {'online':'Online','inperson':'In-person','both':'Both'};
    var courseShort = {'en':'EN','es':'EN/ES','espanol':'ES','espanol-en':'ES/EN'};
    var active = s.id === currentId ? ' active' : '';
    return '<div class="stu-card'+active+'" onclick="ensureStudentTab(\''+s.id+'\')">'
      + '<div class="stu-avatar">'+initials+'</div>'
      + '<div class="stu-name" title="'+esc(s.name)+'">'+esc(s.name)+'</div>'
      + '<div class="stu-tags">'
      + (s.level ? '<span class="stu-tag lvl">'+s.level+(s.targetLevel&&s.targetLevel!==s.level?'&rarr;'+s.targetLevel:'')+'</span>' : '')
      + '<span class="stu-tag">'+esc(courseShort[s.course]||s.course.toUpperCase())+'</span>'
      + (s.exam ? '<span class="stu-tag lvl">'+esc(examShort[s.exam]||s.exam)+'</span>' : '')
      + '</div>'
      + '<div class="stu-tags">'
      + (s.format&&s.format!=='both' ? '<span class="stu-tag">'+esc(fmtShort[s.format])+'</span>' : '')
      + (s.occupation ? '<span class="stu-tag" style="max-width:80px;overflow:hidden;text-overflow:ellipsis">'+esc(s.occupation)+'</span>' : '')
      + '</div>'
      + gapHtml
      + '</div>';
  }).join('');
}

function renderGapHtml(s) {
  if (!s.level) return '<div class="gap-section"><p style="font-family:var(--font-sans);font-size:.82rem;color:var(--muted)">Set a level to see content gaps.</p></div>';
  if (!coverageData) return '<div class="gap-section"><p style="font-family:var(--font-sans);font-size:.82rem;color:var(--muted)">Loading coverage data…</p></div>';

  var trackNotBuilt = {'espanol':true,'espanol-en':true}[s.course];
  var chapters = coverageData.chapters.filter(function(c){ return c.track === s.course && c.level === s.level; });
  if (trackNotBuilt || !chapters.length) {
    var trackHint = {'espanol':'Spanish universal (espanol/)','espanol-en':'Spanish via English (espanol-en/)','en':'English universal (a/ b/ c/)','es':'English via Spanish (es/)'}[s.course] || s.course;
    return '<div class="gap-section">'
      + '<p class="gs-title">'+s.level+' content</p>'
      + '<p style="font-family:var(--font-sans);font-size:.82rem;color:var(--amber);margin:0 0 6px">No content built yet for the '+esc(trackHint)+' track at '+s.level+'.</p>'
      + '<p style="font-family:var(--font-sans);font-size:.78rem;color:var(--muted);margin:0">Use AI Prompts &rarr; Bootstrap to generate this track, or fill it chapter by chapter via Dev Hub.</p>'
      + '</div>';
  }

  var complete = chapters.filter(function(c){ return c.status==='complete'; }).length;
  var stub = chapters.filter(function(c){ return c.status==='stub'; }).length;
  var missing = chapters.filter(function(c){ return c.status==='missing'; }).length;
  var total = chapters.length;
  var pct = total ? Math.round(complete/total*100) : 0;

  var trackLabel = s.course === 'es' ? 'Spanish&rarr;English' : 'English';
  var html = '<div class="gap-section">';
  html += '<p class="gs-title">'+s.level+' content &mdash; '+trackLabel+'</p>';
  html += '<p class="gs-sub">'+complete+' / '+total+' chapters ready ('+pct+'%)</p>';
  html += '<div class="gs-bar"><div class="gs-complete" style="width:'+Math.round(complete/total*100)+'%"></div><div class="gs-stub" style="width:'+Math.round(stub/total*100)+'%"></div><div class="gs-missing" style="width:'+Math.round(missing/total*100)+'%"></div></div>';

  var parts = [];
  if (complete) parts.push('<strong>'+complete+' complete</strong>');
  if (stub) parts.push('<span style="color:var(--amber)">'+stub+' need content</span>');
  if (missing) parts.push('<span style="color:#c0392b">'+missing+' missing</span>');
  html += '<p class="gs-stat">'+parts.join(' &middot; ')+'</p>';

  var needWork = chapters.filter(function(c){ return c.status!=='complete'; });
  if (needWork.length) {
    html += '<div class="ch-grid">';
    ['grammar','vocabulary','writing'].forEach(function(sec){
      var secChaps = needWork.filter(function(c){ return c.section===sec; });
      if (!secChaps.length) return;
      html += '<div class="sec-head">'+{grammar:'Grammar',vocabulary:'Vocabulary',writing:'Writing'}[sec]+'</div>';
      secChaps.forEach(function(c){
        html += '<a class="ch-chip" href="'+c.url+'" target="_blank"><div class="ch-dot dot-'+c.status+'"></div>'+esc(c.title)+'</a>';
      });
    });
    html += '</div>';
  } else {
    html += '<p style="font-family:var(--font-sans);font-size:.82rem;color:#27ae60;margin:8px 0 0">All '+s.level+' content is complete.</p>';
  }
  html += '</div>';
  return html;
}

function saveStudent() {
  var name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); return; }
  var id = document.getElementById('fId').value || uid();
  var s = {
    id: id, name: name,
    l1: document.getElementById('fL1').value,
    course: document.getElementById('fCourse').value,
    level: document.getElementById('fLevel').value,
    targetLevel: document.getElementById('fTargetLevel').value,
    exam: document.getElementById('fExam').value,
    format: document.getElementById('fFormat').value,
    occupation: document.getElementById('fOccupation').value.trim(),
    code: document.getElementById('fCode').value.trim(),
    age: document.getElementById('fAge').value.trim(),
    notes: document.getElementById('fNotes').value.trim(),
    updatedAt: new Date().toISOString()
  };
  var idx = students.findIndex(function(x){ return x.id === id; });
  if (idx >= 0) students[idx] = s;
  else students.push(s);
  saveStudents();
  hideForm();
  renderRoster();
  ensureStudentTab(id);
}

function saveEditForm() {
  var s = students.find(function(x){ return x.id === currentId; });
  if (!s) return;
  var name = document.getElementById('efName').value.trim();
  if (!name) { document.getElementById('efName').focus(); return; }
  s.name = name;
  s.l1 = document.getElementById('efL1').value;
  s.course = document.getElementById('efCourse').value;
  s.level = document.getElementById('efLevel').value;
  s.targetLevel = document.getElementById('efTargetLevel').value;
  s.exam = document.getElementById('efExam').value;
  s.format = document.getElementById('efFormat').value;
  s.occupation = document.getElementById('efOccupation').value.trim();
  s.code = document.getElementById('efCode').value.trim();
  s.age = document.getElementById('efAge').value.trim();
  s.notes = document.getElementById('efNotes').value.trim();
  s.updatedAt = new Date().toISOString();
  saveStudents();
  ensureStudentTab(currentId);  // re-renders with updated data
  if (activeTab === 'overview') renderOverview();
  if (activeTab === 'roster') renderRoster();
}

function deleteStudent() {
  var s = students.find(function(x){ return x.id === currentId; });
  if (!s || !confirm('Delete ' + s.name + '?')) return;
  students = students.filter(function(x){ return x.id !== currentId; });
  saveStudents();
  // Remove dynamic tab
  var dynTab = document.querySelector('[data-tab="student"]');
  if (dynTab) dynTab.remove();
  currentId = null;
  switchTab('roster');
  renderRoster();
}

/* ─────────────────────────── import / export ─────────────────────── */
function triggerImport() { document.getElementById('importInput').click(); }

function handleImport(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) imported = [imported];
      var added = 0, updated = 0;
      imported.forEach(function(s) {
        if (!s.name) return;
        if (!s.id) s.id = uid();
        var idx = students.findIndex(function(x){ return x.id === s.id; });
        if (idx >= 0) { students[idx] = s; updated++; }
        else { students.push(s); added++; }
      });
      saveStudents();
      renderRoster();
      renderOverview();
      alert('Imported: '+added+' new, '+updated+' updated.');
    } catch(err) { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function exportStudent() {
  var s = students.find(function(x){ return x.id === currentId; });
  if (!s) return;
  downloadJSON([s], s.name.replace(/\s+/g,'_')+'_profile.json');
}
function exportAll() {
  downloadJSON(students, 'wordplay_students_'+new Date().toISOString().slice(0,10)+'.json');
}
function downloadJSON(data, filename) {
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

/* ─────────────────────────── cloud sync ─────────────────── */
function loadSyncCode() {
  syncCode = localStorage.getItem(SYNC_CODE_KEY) || null;
}

function updateSyncStatusText() {
  var el = document.getElementById('syncStatusText');
  var lastRaw = localStorage.getItem(SYNC_LAST_KEY);
  if (!syncCode) {
    el.style.color = '';
    el.textContent = 'All data stored locally — set up cloud sync to access from any device.';
    return;
  }
  if (lastRaw) {
    var diff = Math.round((Date.now() - parseInt(lastRaw)) / 1000);
    var ago = diff < 60 ? 'just now' : diff < 3600 ? Math.floor(diff / 60) + 'm ago' : Math.floor(diff / 3600) + 'h ago';
    el.style.color = '#27ae60';
    el.textContent = 'Synced ' + ago + ' via cloud.';
  } else {
    el.style.color = '';
    el.textContent = 'Cloud sync active — syncing now…';
  }
}

function toggleSyncPanel() {
  var panel = document.getElementById('syncPanel');
  var visible = panel.classList.toggle('visible');
  if (visible) {
    document.getElementById('syncCodeInput').value = syncCode || '';
    document.getElementById('syncNowBtn').style.display = syncCode ? 'inline-block' : 'none';
    document.getElementById('clearSyncBtn').style.display = syncCode ? 'inline-block' : 'none';
    document.getElementById('syncDetailStatus').textContent = '';
    if (!syncCode) document.getElementById('syncCodeInput').focus();
  }
}

function activateSync() {
  var code = document.getElementById('syncCodeInput').value.trim();
  var statusEl = document.getElementById('syncDetailStatus');
  if (code.length < 8) {
    statusEl.style.color = '#c0392b';
    statusEl.textContent = 'Passphrase must be at least 8 characters.';
    return;
  }
  syncCode = code;
  localStorage.setItem(SYNC_CODE_KEY, code);
  document.getElementById('syncNowBtn').style.display = 'inline-block';
  document.getElementById('clearSyncBtn').style.display = 'inline-block';
  syncNow();
}

function clearSync() {
  if (!confirm('Disconnect cloud sync? Your local profiles are not deleted.')) return;
  syncCode = null;
  localStorage.removeItem(SYNC_CODE_KEY);
  localStorage.removeItem(SYNC_LAST_KEY);
  document.getElementById('syncPanel').classList.remove('visible');
  updateSyncStatusText();
}

function syncNow() {
  if (!syncCode || syncBusy) return;
  syncBusy = true;
  var statusEl = document.getElementById('syncDetailStatus');
  statusEl.style.color = 'var(--amber)';
  statusEl.textContent = 'Syncing…';

  fetch('/api/profiles/' + encodeURIComponent(syncCode))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var remote = d.profiles || [];
      students = mergeProfiles(students, remote);
      saveStudentsLocal();
      return fetch('/api/profiles/' + encodeURIComponent(syncCode), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ profiles: students })
      });
    })
    .then(function(r) { return r.json(); })
    .then(function() {
      localStorage.setItem(SYNC_LAST_KEY, String(Date.now()));
      syncBusy = false;
      var statusEl = document.getElementById('syncDetailStatus');
      statusEl.style.color = '#27ae60';
      statusEl.textContent = 'Synced successfully.';
      updateSyncStatusText();
      renderOverview();
      if (activeTab === 'roster') renderRoster();
      if (activeTab === 'student' && currentId) renderStudentDetail(currentId);
    })
    .catch(function() {
      syncBusy = false;
      var statusEl = document.getElementById('syncDetailStatus');
      statusEl.style.color = '#c0392b';
      statusEl.textContent = 'Sync failed — check your connection.';
    });
}

function syncPush() {
  if (!syncCode || syncBusy) return;
  fetch('/api/profiles/' + encodeURIComponent(syncCode), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ profiles: students })
  })
  .then(function(r) { return r.json(); })
  .then(function() {
    localStorage.setItem(SYNC_LAST_KEY, String(Date.now()));
    updateSyncStatusText();
  })
  .catch(function() {});
}

function mergeProfiles(local, remote) {
  var map = {};
  local.forEach(function(s) { map[s.id] = s; });
  remote.forEach(function(s) {
    if (!map[s.id]) {
      map[s.id] = s;
    } else {
      var localTs = new Date(map[s.id].updatedAt || 0).getTime();
      var remoteTs = new Date(s.updatedAt || 0).getTime();
      if (remoteTs > localTs) map[s.id] = s;
    }
  });
  return Object.values(map);
}

/* ─────────────────────────── utils ─────────────────────── */
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─────────────────────────── init ─────────────────────── */
loadStudents();
loadSyncCode();
updateSyncStatusText();
if (syncCode) syncNow();
loadCoverage();
renderOverview();
</script>
</body>
</html>
