<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>Page not found | Word Play</title>
<link rel="stylesheet" href="shared/base.css?v=v124">
<script src="/shared/auth.js?v=1"></script>
<script src="shared/dark-init.js?v=v112"></script>
<style>
  /* ---------- 404 Page Specific Styles ---------- */
  .error-page {
    text-align: center;
    padding-top: 80px;
  }
  .error-code {
    font-family: var(--font-sans);
    font-size: .65rem;
    font-weight: 800;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 12px;
  }
  .error-title {
    font-size: 2rem;
    margin-bottom: 12px;
  }
  .error-message {
    color: var(--muted);
    max-width: 360px;
    margin: 0 auto 32px;
  }
  .btn-back {
    display: inline-block;
    padding: 10px 24px;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--font-sans);
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 4px;
  }
  .level-nav-section {
    max-width: 480px;
    margin: 30px auto;
    padding: 0 20px;
  }
  .level-nav-heading {
    font-family: var(--font-sans);
    font-size: .65rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    text-align: center;
  }
  .level-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .level-card {
    padding: 12px 8px;
    background: var(--paper);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    text-decoration: none;
    font-family: var(--font-sans);
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    transition: outline 0.15s ease;
  }
  .level-card:hover,
  .level-card:focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: -2px; /* keeps the outline inside, so layout doesn't shift */
  }
  .dashboard-link {
    display: block;
    text-align: center;
    margin-top: 18px;
    font-family: var(--font-sans);
    font-size: .72rem;
    color: var(--amber);
    text-decoration: none;
  }
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a href="/" class="brand">
      <svg aria-hidden="true" width="20" height="20" viewBox="0 0 32 32" style="vertical-align:middle;margin-right:8px">
        <rect width="32" height="32" rx="4" fill="currentColor"/>
        <text x="16" y="22" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="15" fill="white" letter-spacing="-0.5">WP</text>
      </svg>
      Word Play
    </a>
    <button class="dark-toggle" aria-label="Toggle dark mode" onclick="toggleDark()">&#9680; Dark</button>
  </div>
</header>

<main class="error-page">
  <div class="error-code" aria-hidden="true">404</div>
  <h1 class="error-title">Page not found</h1>
  <p class="error-message">That page doesn't exist or may have moved.</p>
  <a href="index.html" class="btn-back">← Back to Word Play</a>
</main>

<nav class="level-nav-section" aria-label="Level navigation">
  <h2 class="level-nav-heading">Go to a level</h2>
  <div class="level-grid">
    <a href="a/a1/index.html" class="level-card">A1</a>
    <a href="a/a2/index.html" class="level-card">A2</a>
    <a href="b/b1/index.html" class="level-card">B1</a>
    <a href="b/b2/index.html" class="level-card">B2</a>
    <a href="c/c1/index.html" class="level-card">C1</a>
    <a href="c/c2/index.html" class="level-card">C2</a>
  </div>
  <a href="dashboard.html" class="dashboard-link">View your dashboard →</a>
</nav>

<footer class="site-footer">Word Play · Cambridge English A1→C2</footer>
</body>
</html>
