<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Word Play — Sign Up</title>
  <link rel="stylesheet" href="/shared/base.css?v=v125" />
  <script src="/shared/auth.js?v=1"></script>
  <script src="shared/dark-init.js?v=v112"></script>
  <style>
    .signup-container {
      max-width: 480px;
      margin: 40px auto;
      padding: 2rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
    }

    .signup-container h1 {
      font-size: var(--fs-h2);
      margin-bottom: 0.5rem;
      text-align: center;
      color: var(--ink);
    }

    .signup-subtitle {
      text-align: center;
      font-size: var(--fs-small);
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: var(--fs-body);
      font-weight: var(--fw-medium);
      color: var(--ink);
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.75rem;
      font-size: var(--fs-body);
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--paper);
      color: var(--ink);
      box-sizing: border-box;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: 2px solid var(--amber);
      outline-offset: 2px;
      border-color: var(--amber);
    }

    .form-group input::placeholder {
      color: var(--muted);
    }

    .form-group-hint {
      font-size: var(--fs-small);
      color: var(--muted);
      margin-top: 0.3rem;
    }

    .signup-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: var(--fs-body);
      font-weight: var(--fw-medium);
      background: var(--amber);
      color: var(--paper);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .signup-btn:hover {
      opacity: 0.85;
    }

    .signup-btn:active {
      opacity: 0.7;
    }

    .signup-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .signup-error {
      color: #d32f2f;
      font-size: var(--fs-small);
      margin-top: 0.5rem;
      display: none;
    }

    .signup-status {
      text-align: center;
      font-size: var(--fs-small);
      color: var(--muted);
      margin-top: 1rem;
    }

    .signup-footer {
      text-align: center;
      font-size: var(--fs-small);
      color: var(--muted);
      margin-top: 1.5rem;
    }

    .signup-footer a {
      color: var(--amber);
      text-decoration: none;
    }

    .signup-footer a:hover {
      text-decoration: underline;
    }

    .optional-label {
      font-size: var(--fs-small);
      color: var(--muted);
      font-weight: normal;
      margin-left: 0.5rem;
    }

    @media (max-width: 480px) {
      .signup-container {
        margin: 20px auto;
        padding: 1.5rem;
      }

      .signup-container h1 {
        font-size: var(--fs-h3);
      }
    }

    @media (prefers-color-scheme: dark) {
      .signup-container {
        background: var(--paper);
      }

      .form-group input,
      .form-group select {
        background: var(--paper);
        color: var(--ink);
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="/" class="brand">Word Play</a>
      <button class="dark-toggle" aria-label="Toggle dark mode" onclick="toggleDark()">&#9680; Dark</button>
    </div>
  </header>

  <div class="signup-container">
    <h1>Create Account</h1>
    <p class="signup-subtitle">Join Word Play and start learning</p>

    <form id="signup-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
        />
        <div class="form-group-hint">At least 8 characters</div>
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input
          type="password"
          id="confirm"
          name="confirm"
          placeholder="••••••••"
          required
        />
      </div>

      <div class="form-group">
        <label for="level">English Level</label>
        <select id="level" name="level" required>
          <option value="">-- Select your level --</option>
          <option value="a1">A1 (Beginner)</option>
          <option value="a2">A2 (Elementary)</option>
          <option value="b1">B1 (Intermediate)</option>
          <option value="b2">B2 (Upper Intermediate)</option>
          <option value="c1">C1 (Advanced)</option>
          <option value="c2">C2 (Proficiency)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="teacherCode">Teacher Code <span class="optional-label">(optional)</span></label>
        <input
          type="text"
          id="teacherCode"
          name="teacherCode"
          placeholder="Ask your teacher for a code"
        />
        <div class="form-group-hint">Your teacher will give you a code to join their class</div>
      </div>

      <div class="form-group" style="display:flex;gap:10px;align-items:flex-start">
        <input type="checkbox" id="consent" name="consent" required style="width:auto;margin-top:3px;flex-shrink:0" />
        <label for="consent" style="font-size:var(--fs-small);color:var(--muted);font-weight:normal;line-height:1.5;margin-bottom:0">
          I have read and agree to the
          <a href="/privacy.html" target="_blank" style="color:var(--amber)">Privacy Policy</a>
          and
          <a href="/terms.html" target="_blank" style="color:var(--amber)">Terms of Service</a>.
        </label>
      </div>

      <div class="signup-error" id="error"></div>

      <button type="submit" class="signup-btn" id="signup-btn">Create Account</button>
      <div class="signup-status" id="status"></div>
    </form>

    <div class="signup-footer">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>

  <script>
    // If already logged in, redirect to home
    if (isLoggedIn()) {
      location.href = '/';
    }

    var form = document.getElementById('signup-form');
    var btn = document.getElementById('signup-btn');
    var error = document.getElementById('error');
    var status = document.getElementById('status');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var confirm = document.getElementById('confirm').value;
      var level = document.getElementById('level').value;
      var teacherCode = document.getElementById('teacherCode').value.trim();
      var consent = document.getElementById('consent').checked;

      // Validation
      if (!email || !password || !confirm || !level) {
        error.textContent = 'Please fill in all required fields.';
        error.style.display = 'block';
        return;
      }

      if (!consent) {
        error.textContent = 'Please accept the Privacy Policy and Terms to continue.';
        error.style.display = 'block';
        return;
      }

      if (password.length < 8) {
        error.textContent = 'Password must be at least 8 characters.';
        error.style.display = 'block';
        return;
      }

      if (password !== confirm) {
        error.textContent = 'Passwords do not match.';
        error.style.display = 'block';
        return;
      }

      error.style.display = 'none';
      btn.disabled = true;
      status.textContent = 'Creating account…';

      try {
        // Step 1: Create account
        var res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: email,
            password: password,
            level: level,
            privacy_consent: true
          })
        });

        if (!res.ok) {
          var err = await res.json();
          error.textContent = err.error || 'Sign up failed.';
          error.style.display = 'block';
          btn.disabled = false;
          status.textContent = '';
          return;
        }

        var data = await res.json();

        // Step 2: If teacher code is provided, join teacher's class
        if (teacherCode) {
          status.textContent = 'Joining class…';
          var joinRes = await fetch('/api/student/join-teacher', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + data.token
            },
            body: JSON.stringify({
              invite_code: teacherCode
            })
          });

          if (!joinRes.ok) {
            var joinErr = await joinRes.json();
            // Join failed, but account was created. Warn but continue.
            console.warn('Failed to join teacher class:', joinErr);
            error.textContent = 'Account created, but could not join teacher class. Code may be invalid.';
            error.style.display = 'block';
            // Still log them in
          }
        }

        // Log user in
        setAuthState(data.token, {
          user_id: data.user_id,
          email: data.email,
          role: data.role,
          level: data.level
        });

        status.textContent = 'Redirecting…';
        location.href = '/';
      } catch (e) {
        console.error('Signup error:', e);
        error.textContent = 'Network error. Please try again.';
        error.style.display = 'block';
        btn.disabled = false;
        status.textContent = '';
      }
    });
  </script>
  <footer style="text-align:center;padding:24px 16px;font-size:.75rem;color:var(--muted)">
    <a href="/privacy.html" style="color:var(--muted)">Privacy Policy</a> &middot;
    <a href="/terms.html" style="color:var(--muted)">Terms of Service</a>
  </footer>
</body>
</html>
