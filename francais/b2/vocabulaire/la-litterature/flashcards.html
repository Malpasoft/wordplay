<style>
.fc-wrap{perspective:800px;margin:0 auto 20px;max-width:480px}
.fc{width:100%;height:220px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;border-radius:10px}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;border:1px solid var(--hairline)}
.fc-front,.fc-back{background:var(--paper)}
.fc-back{transform:rotateY(180deg)}
.fc-word{font-size:1.8rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.fc-ipa{font-family:var(--font-sans);font-size:.85rem;color:var(--muted);margin-bottom:8px}
.fc-def{font-size:.95rem;color:var(--ink);margin-bottom:6px}
.fc-ex{font-size:.82rem;color:var(--muted);font-style:italic}
.fc-hint{font-family:var(--font-sans);font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:10px}
.fc-audio{background:none;border:1px solid var(--hairline);border-radius:4px;padding:5px 12px;font-family:var(--font-sans);font-size:.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;margin-top:8px}
.fc-audio:hover{border-color:var(--amber);color:var(--amber)}
.fc-nav{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:20px}
.fc-btn{font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;border-radius:4px;cursor:pointer;border:1.5px solid var(--hairline);background:transparent;color:var(--ink)}
.fc-btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.fc-counter{font-family:var(--font-sans);font-size:.75rem;color:var(--muted);font-weight:600}
.mastery-badge{display:inline-block;padding:8px 18px;background:rgba(184,134,11,.12);color:var(--amber);font-family:var(--font-sans);font-size:.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:4px;margin-bottom:16px}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-item{padding:12px 14px;border:1.5px solid var(--hairline);border-radius:6px;cursor:pointer;font-size:.9rem;color:var(--ink);transition:border-color .15s,background .15s;user-select:none;min-height:48px;display:flex;align-items:center}
.match-item.selected{border-color:var(--amber);background:rgba(184,134,11,.08)}
.match-item.correct{border-color:var(--green,#2E7D52);background:rgba(46,125,82,.08);pointer-events:none;color:var(--muted)}
.match-item.wrong{border-color:var(--red,#C03A2B);background:rgba(192,57,43,.08)}
.match-status{font-family:var(--font-sans);font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:16px}
.heart-row{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
.heart-svg{width:22px;height:22px}

<h1>La Littérature</h1>

<div id="masteryBadge" style="margin:12px 0;display:none"><span class="mastery-badge">&#10003; Ma&#238;tris&#233;</span></div>
<p style="font-family:var(--font-sans);font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px">15 mots &middot; appuyez sur la carte pour voir la d&#233;finition</p>
<div class="fc-nav"><button class="fc-btn" onclick="prevCard()">&#8592; Pr&#233;c.</button><span class="fc-counter" id="fcCounter">1 / 15</span><button class="fc-btn primary" onclick="nextCard()">Suivant &#8594;</button></div>
<div class="fc-wrap"><div class="fc" id="fcCard" onclick="flipCard()"><div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-ipa" id="fcIpa"></div><div class="fc-hint">Appuyez pour voir la d&#233;finition</div></div><div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div><button class="fc-audio" onclick="event.stopPropagation();speakWord()">&#9654; &#201;couter</button></div></div></div>
<script>
var WORDS = [{"word": "la métaphore", "ipa": "/me.ta.fɔʁ/", "def": "figure de style qui identifie deux réalités sans terme de comparaison", "ex": "« La vie est un voyage » est une métaphore classique de la poésie française."}, {"word": "l'allégorie (f)", "ipa": "/a.le.gɔ.ʁi/", "def": "représentation d'une idée abstraite par une image ou un récit concret", "ex": "La cave de Platon est une allégorie de l'ignorance humaine."}, {"word": "le narrateur omniscient", "ipa": "/na.ʁa.tœʁ ɔm.ni.sjɑ̃/", "def": "narrateur qui connaît les pensées et actions de tous les personnages", "ex": "Flaubert utilise un narrateur omniscient dans Madame Bovary."}, {"word": "l'ironie (f)", "ipa": "/i.ʁɔ.ni/", "def": "figure consistant à dire le contraire de ce qu'on veut faire comprendre", "ex": "Voltaire manie l'ironie avec brio dans Candide pour critiquer la société."}, {"word": "le dénouement", "ipa": "/de.nu.mɑ̃/", "def": "résolution finale de l'intrigue d'une œuvre", "ex": "Le dénouement tragique de Phèdre de Racine est inévitable dès le début."}, {"word": "le pacte autobiographique", "ipa": "/pakt ɔ.tɔ.bjo.gʁa.fik/", "def": "engagement implicite de l'auteur à raconter véritablement sa propre vie", "ex": "Philippe Lejeune a théorisé le pacte autobiographique dans ses essais."}, {"word": "l'intertextualité (f)", "ipa": "/ɛ̃.tɛʁ.tɛks.tɥa.li.te/", "def": "réseau de références et de citations entre différents textes littéraires", "ex": "L'intertextualité dans l'œuvre de Borges est une caractéristique majeure."}, {"word": "le roman à clef", "ipa": "/ʁɔ.mɑ̃ a kle/", "def": "roman dont les personnages fictifs correspondent à des personnes réelles", "ex": "À la recherche du temps perdu de Proust est souvent lu comme un roman à clef."}, {"word": "la vraisemblance", "ipa": "/vʁɛ.sɑ̃.blɑ̃s/", "def": "caractère de ce qui paraît vrai ou crédible dans un récit", "ex": "Les classiques accordent une grande importance à la vraisemblance."}, {"word": "le registre", "ipa": "/ʁə.ʒistʁ/", "def": "ton général d'un texte (tragique, comique, lyrique, épique, etc.)", "ex": "Le registre ironique de Flaubert crée une distance avec ses personnages."}, {"word": "la catharsis", "ipa": "/ka.taʁ.sis/", "def": "purification des émotions provoquée par une œuvre tragique", "ex": "Aristote voyait dans la catharsis la principale vertu de la tragédie."}, {"word": "la diégèse", "ipa": "/dje.ʒɛz/", "def": "univers fictif dans lequel se déroule le récit", "ex": "La diégèse de Zola reflète fidèlement la société du XIXe siècle."}, {"word": "le leitmotiv", "ipa": "/lajt.mɔ.tif/", "def": "motif, thème ou phrase qui revient régulièrement dans une œuvre", "ex": "Le leitmotiv de la madeleine structure la mémoire dans l'œuvre de Proust."}, {"word": "l'anachronisme (m)", "ipa": "/a.na.kʁɔ.nism/", "def": "erreur ou procédé consistant à placer un élément hors de son époque", "ex": "L'auteur commet un anachronisme en plaçant une montre dans la Rome antique."}, {"word": "le point de vue", "ipa": "/pwɛ̃ də vy/", "def": "perspective narrative depuis laquelle le récit est raconté", "ex": "Le choix du point de vue interne donne accès aux pensées du personnage."}];
var STORAGE_KEY = "wordplay_vocab_mastered_fr_b2_la-litterature";
var LEVEL = "b2";
</script>
<script>
var idx = 0, seen = new Set(), allDone = false;
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa || '';
  document.getElementById('fcDef').innerHTML = w.def;
  document.getElementById('fcEx').innerHTML = w.ex || '';
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length && !allDone) { allDone = true; saveMastery(); }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'fr-FR'; u.rate = 0.85; speechSynthesis.speak(u);
}
function saveMastery() {
  var prog = JSON.parse(localStorage.getItem('wordplay_progress') || '{}');
  if (!prog[LEVEL]) prog[LEVEL] = {};
  prog[LEVEL][STORAGE_KEY] = {done: true, date: new Date().toISOString()};
  localStorage.setItem('wordplay_progress', JSON.stringify(prog));
  if (window.store && store.pushProgress) store.pushProgress();
  document.getElementById('masteryBadge').style.display = 'block';
}
(function init() {
  var prog = JSON.parse(localStorage.getItem('wordplay_progress') || '{}');
  var lv = prog[LEVEL] || {};
  if (lv[STORAGE_KEY] && lv[STORAGE_KEY].done) {
    allDone = true;
    document.getElementById('masteryBadge').style.display = 'block';
  }
  showCard();
})();
</script><footer class="site-footer">Word Play &middot; Fran&#231;ais B2 &middot; Vocabulaire</footer>
