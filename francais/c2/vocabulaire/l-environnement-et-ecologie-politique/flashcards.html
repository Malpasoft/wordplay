.fc-wrap{perspective:800px;margin:0 auto 20px;max-width:480px}
.fc{width:100%;height:220px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;border-radius:10px}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;border:1px solid var(--hairline)}
.fc-front,.fc-back{background:var(--paper)}

.fc-word{font-size:1.8rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.fc-ipa{font-family:var(--font-sans);font-size:.85rem;color:var(--muted);margin-bottom:8px}
.fc-def{font-size:.95rem;color:var(--ink);margin-bottom:6px}
.fc-ex{font-size:.82rem;color:var(--muted);font-style:italic}
.fc-hint{font-family:var(--font-sans);font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:10px}
.fc-audio{background:none;border:1px solid var(--hairline);border-radius:4px;padding:5px 12px;font-family:var(--font-sans);font-size:.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;margin-top:8px}
.fc-audio:hover{border-color:var(--amber);color:var(--amber)}
.fc-nav{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:20px}
.fc-btn{font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;border-radius:4px;cursor:pointer;border:1.5px solid var(--hairline);background:transparent;color:var(--ink)}
.fc-btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.fc-counter{font-family:var(--font-sans);font-size:.75rem;color:var(--muted);font-weight:600}
.mastery-badge{display:inline-block;padding:8px 18px;background:rgba(184,134,11,.12);color:var(--amber);font-family:var(--font-sans);font-size:.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:4px;margin-bottom:16px}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-item{padding:12px 14px;border:1.5px solid var(--hairline);border-radius:6px;cursor:pointer;font-size:.9rem;color:var(--ink);transition:border-color .15s,background .15s;user-select:none;min-height:48px;display:flex;align-items:center}
.match-item.selected{border-color:var(--amber);background:rgba(184,134,11,.08)}
.match-item.correct{border-color:var(--green,#2E7D52);background:rgba(46,125,82,.08);pointer-events:none;color:var(--muted)}
.match-item.wrong{border-color:var(--red,#C03A2B);background:rgba(192,57,43,.08)}
.match-status{font-family:var(--font-sans);font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:16px}
.heart-row{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
.heart-svg{width:22px;height:22px}

<script>
var WORDS = [{"word": "l'Anthropocène", "ipa": "/ɑ̃tʁɔpɔsɛn/", "def": "ère géologique proposée marquant l'impact décisif des activités humaines sur la Terre", "ex": "Le concept d'Anthropocène indique que l'humanité est devenue une force géologique majeure."}, {"word": "la justice climatique", "ipa": "/ʒystis klimatik/", "def": "principe reliant la lutte contre le changement climatique aux inégalités sociales et entre nations", "ex": "La justice climatique souligne que les pays les plus pauvres subissent le plus les effets du réchauffement."}, {"word": "la décroissance", "ipa": "/dekʁwasɑ̃s/", "def": "courant politique et économique proposant de réduire volontairement la production et la consommation", "ex": "Les partisans de la décroissance rejettent l'idée que la croissance économique peut être verte."}, {"word": "l'écocide", "ipa": "/ekɔsid/", "def": "destruction massive d'un écosystème par des activités humaines — proposé comme crime international", "ex": "Des militants plaident pour que l'écocide soit reconnu comme crime devant la Cour pénale internationale."}, {"word": "la capacité de charge", "ipa": "/kapasite də ʃaʁʒ/", "def": "limite maximale d'une population ou d'une activité qu'un écosystème peut supporter durablement", "ex": "Le dépassement de la capacité de charge de la Méditerranée menace ses stocks halieutiques."}, {"word": "le principe de précaution", "ipa": "/pʁɛ̃sip də pʁekosjɔ̃/", "def": "principe juridique exigeant des mesures préventives face à un risque potentiel grave, même en l'absence de certitude scientifique", "ex": "Le principe de précaution a été invoqué pour justifier l'interdiction des OGM dans plusieurs pays."}, {"word": "la transition énergétique", "ipa": "/tʁɑ̃zisjɔ̃ eneʁʒetik/", "def": "passage d'un système énergétique fondé sur les énergies fossiles vers des sources renouvelables", "ex": "La transition énergétique requiert des investissements massifs et une transformation des modes de vie."}, {"word": "l'empreinte carbone", "ipa": "/ɑ̃pʁɛ̃t kaʁbɔn/", "def": "quantité totale de gaz à effet de serre émise directement ou indirectement par une personne, organisation ou produit", "ex": "L'empreinte carbone d'un vol Paris-New York dépasse celle d'une année entière de trajets en voiture."}, {"word": "le greenwashing", "ipa": "/ɡʁinwaʃiŋ/", "def": "pratique consistant à se prétendre écologiquement responsable sans actions substantielles", "ex": "Le greenwashing des entreprises pétrolières consiste à financer quelques projets verts tout en continuant à exploiter les fossiles."}, {"word": "la biodiversité", "ipa": "/bjɔdivɛʁsite/", "def": "variété des espèces vivantes, des gènes et des écosystèmes sur Terre", "ex": "L'effondrement de la biodiversité menace les services écosystémiques dont dépend l'humanité."}, {"word": "l'économie circulaire", "ipa": "/ekɔnɔmi siʁkyɛʁ/", "def": "modèle économique fondé sur la réutilisation et le recyclage des ressources pour minimiser les déchets", "ex": "L'économie circulaire s'oppose au modèle linéaire 'extraire-produire-jeter'."}, {"word": "le droit de l'environnement", "ipa": "/dʁwa də lɑ̃viʁɔnmɑ̃/", "def": "branche du droit encadrant les relations entre les activités humaines et les milieux naturels", "ex": "Le droit de l'environnement international se construit autour de traités comme l'Accord de Paris."}, {"word": "la résilience des écosystèmes", "ipa": "/ʁeziljɑ̃s de ekɔsistɛm/", "def": "capacité d'un écosystème à absorber des perturbations et à retrouver son état d'équilibre", "ex": "La résilience des écosystèmes forestiers tropicaux est limitée face aux incendies répétés."}, {"word": "l'atténuation", "ipa": "/atenyasjɔ̃/", "def": "réduction des émissions de gaz à effet de serre pour limiter le changement climatique", "ex": "L'atténuation vise à réduire les causes du réchauffement, tandis que l'adaptation en gère les effets."}, {"word": "la souveraineté alimentaire", "ipa": "/suvʁɛnte alimɑ̃tɛʁ/", "def": "droit des peuples à définir leurs propres politiques alimentaires et agricoles", "ex": "La souveraineté alimentaire s'oppose au système agro-industriel mondial dominé par quelques multinationales."}];
var STORAGE_KEY = "wordplay_vocab_mastered_fr_c2_l-environnement-et-ecologie-politique";
var LEVEL = "c2";
</script>
<script>
var idx = 0, seen = new Set(), allDone = false;
function showCard() {
  var w = WORDS[idx];
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcIpa').textContent = w.ipa || '';
  document.getElementById('fcDef').innerHTML = w.def;
  document.getElementById('fcEx').innerHTML = w.ex || '';
  document.getElementById('fcCard').classList.remove('flipped');
  document.getElementById('fcCounter').textContent = (idx+1) + ' / ' + WORDS.length;
  seen.add(idx);
  if (seen.size === WORDS.length && !allDone) { allDone = true; saveMastery(); }
}
function flipCard() { document.getElementById('fcCard').classList.toggle('flipped'); }
function prevCard() { idx = (idx - 1 + WORDS.length) % WORDS.length; showCard(); }
function nextCard() { idx = (idx + 1) % WORDS.length; showCard(); }
function speakWord() {
  var u = new SpeechSynthesisUtterance(WORDS[idx].word);
  u.lang = 'fr-FR'; u.rate = 0.85; speechSynthesis.speak(u);
}
function saveMastery() {
  var prog = JSON.parse(localStorage.getItem('wordplay_progress') || '{}');
  if (!prog[LEVEL]) prog[LEVEL] = {};
  prog[LEVEL][STORAGE_KEY] = {done: true, date: new Date().toISOString()};
  localStorage.setItem('wordplay_progress', JSON.stringify(prog));
  if (window.store && store.pushProgress) store.pushProgress();
  document.getElementById('masteryBadge').style.display = 'block';
}
(function init() {
  var prog = JSON.parse(localStorage.getItem('wordplay_progress') || '{}');
  var lv = prog[LEVEL] || {};
  if (lv[STORAGE_KEY] && lv[STORAGE_KEY].done) {
    allDone = true;
    document.getElementById('masteryBadge').style.display = 'block';
  }
  showCard();
})();
</script><footer class="site-footer">Word Play &middot; Fran&#231;ais C2 &middot; Vocabulaire</footer>
