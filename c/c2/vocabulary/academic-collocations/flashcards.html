<script>
var WORDS=[{"id": "mount_evidence", "word": "Mount evidence", "def": "to accumulate an increasing body of supporting evidence", "ipa": "build up evidence / amass data", "ex": "The evidence is mounting that early intervention is most effective."}, {"id": "yield_results", "word": "Yield results", "def": "to produce results, especially after research or effort", "ipa": "produce results / generate findings", "ex": "The new methodology yielded surprising results."}, {"id": "underpin_theory", "word": "Underpin a theory", "def": "to provide the foundation or support for a theory", "ipa": "support / substantiate / ground", "ex": "Classical mechanics underpins much of modern engineering."}, {"id": "pervade_literature", "word": "Pervade the literature", "def": "to be present throughout an area of academic writing", "ipa": "dominate / saturate / run through", "ex": "A lack of longitudinal data pervades the literature in this field."}, {"id": "compelling_evidence", "word": "Compelling evidence", "def": "evidence that is very convincing and difficult to dispute", "ipa": "persuasive / overwhelming / strong evidence", "ex": "There is compelling evidence that diet affects cognitive function."}, {"id": "nuanced_analysis", "word": "Nuanced analysis", "def": "analysis that takes account of fine distinctions and avoids oversimplification", "ipa": "sophisticated / subtle analysis", "ex": "The paper offers a nuanced analysis of the political dynamics involved."}, {"id": "rigorous_methodology", "word": "Rigorous methodology", "def": "a research method that is thorough, precise, and scientifically sound", "ipa": "robust / systematic methodology", "ex": "The study employed a rigorous methodology, including blind peer review."}, {"id": "widely_acknowledged", "word": "Widely acknowledged", "def": "accepted or recognised by the majority of people in a field", "ipa": "broadly recognised / generally accepted", "ex": "It is widely acknowledged that the causes are multiple and interrelated."}, {"id": "empirically_supported", "word": "Empirically supported", "def": "backed by evidence from observation or experiment, not just theory", "ipa": "evidence-based / data-driven", "ex": "The hypothesis is empirically supported by three independent studies."}, {"id": "profoundly_shaped", "word": "Profoundly shaped", "def": "fundamentally influenced or determined by something", "ipa": "deeply influenced / fundamentally formed", "ex": "Modern science has been profoundly shaped by the digital revolution."}, {"id": "scant_attention", "word": "Scant attention", "def": "very little attention or consideration given to something", "ipa": "insufficient attention / neglect", "ex": "This area of research has received scant attention in the literature."}, {"id": "call_into_question", "word": "Call into question", "def": "to cause doubts about the validity or truth of something", "ipa": "challenge / cast doubt on / undermine", "ex": "New data calls into question the assumptions of the original model."}];
var fcIdx=0,flipped=false;
function setMode(mode,btn){document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('modeFlash').style.display=mode==='flash'?'':'none';document.getElementById('modeList').style.display=mode==='list'?'':'none';if(mode==='list')renderList();}
function flipCard(){flipped=!flipped;document.getElementById('flashcard').classList.toggle('flipped',flipped);}
function showCard(idx){flipped=false;document.getElementById('flashcard').classList.remove('flipped');var w=WORDS[idx];document.getElementById('fcWord').textContent=w.word;document.getElementById('fcDef').textContent=w.def;document.getElementById('fcEx').textContent=w.ex||'';document.getElementById('fcCounter').textContent=(idx+1)+' / '+WORDS.length;
  fcSeen.add(idx);
  if (!mastered && fcSeen.size >= WORDS.length) { mastered = true; setTimeout(markMastered, 700); }}
function fcNext(){fcIdx=(fcIdx+1)%WORDS.length;showCard(fcIdx);}
function fcPrev(){fcIdx=(fcIdx-1+WORDS.length)%WORDS.length;showCard(fcIdx);}
function renderList(){document.getElementById('wordList').innerHTML=WORDS.map(w=>'<div class="word-list-item"><span class="wl-word">'+w.word+'</span><span class="wl-def">'+w.def+'</span></div>').join('');}
var mastered = false;
var fcSeen = new Set();
var completedRounds = 0;
showCard(0);
</script>
