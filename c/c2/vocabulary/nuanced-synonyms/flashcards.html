.vocab-page{max-width:800px;margin:0 auto;padding:20px 0}

.fc-word{font-size:1.4rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.fc-def{font-size:.88rem;color:var(--ink);margin-bottom:8px;line-height:1.5}
.fc-ex{font-size:.8rem;color:var(--muted);font-style:italic}

.fc-audio-btn{background:none;border:1px solid var(--hairline);border-radius:4px;
  padding:5px 12px;font-family:var(--font-sans);font-size:.65rem;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;margin-top:10px}
.fc-audio-btn:hover{border-color:var(--amber);color:var(--amber)}
.fc-nav{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:20px}
.fc-btn{font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;border-radius:4px;cursor:pointer;border:1.5px solid var(--hairline);background:transparent;color:var(--ink)}
.fc-btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.fc-counter{font-family:var(--font-sans);font-size:.75rem;color:var(--muted);font-weight:600}
.word-list-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--hairline)}
.wl-word{font-weight:700;font-size:.95rem;min-width:180px}
.wl-def{font-size:.85rem;color:var(--ink)}

<script>
var WORDS=[{"id": "damage_harm", "word": "Damage vs harm", "def": "damage = physical injury to things; harm = negative effect on people/things (broader)", "ipa": "damage (physical) / harm (general)", "ex": "The flood damaged the building. Pollution harms public health."}, {"id": "famous_notorious", "word": "Famous vs notorious", "def": "famous = widely known (neutral/positive); notorious = widely known for something bad", "ipa": "renowned (positive) / infamous (negative)", "ex": "She is famous for her research. He is notorious for his fraud."}, {"id": "claim_assert", "word": "Claim vs assert", "def": "claim = state without proof (may be disputed); assert = state firmly, with confidence", "ipa": "allege (claim) / maintain (assert)", "ex": "He claims he was there, but she asserts that he was not."}, {"id": "prevent_avoid", "word": "Prevent vs avoid", "def": "prevent = stop something happening (active); avoid = stay away from or not do (passive)", "ipa": "forestall (prevent) / evade (avoid)", "ex": "Vaccination prevents disease. He avoided the question entirely."}, {"id": "infer_imply", "word": "Infer vs imply", "def": "infer = draw a conclusion from evidence (reader/listener does this); imply = suggest without stating (speaker/writer does this)", "ipa": "deduce (infer) / suggest (imply)", "ex": "She implied he was lying; I inferred she was angry."}, {"id": "comprise_compose", "word": "Comprise vs compose", "def": "the whole comprises the parts; the parts compose the whole", "ipa": "consist of (comprise) / make up (compose)", "ex": "The committee comprises twelve members. Twelve members compose the committee."}, {"id": "continuous_continual", "word": "Continuous vs continual", "def": "continuous = without interruption; continual = repeated regularly but with breaks", "ipa": "unbroken (continuous) / recurring (continual)", "ex": "Continuous noise is exhausting. Continual interruptions are frustrating."}, {"id": "less_fewer", "word": "Less vs fewer", "def": "less = uncountable nouns (amount); fewer = countable nouns (number)", "ipa": "less amount / fewer number", "ex": "Less water was used. Fewer students attended."}, {"id": "disinterested_uninterested", "word": "Disinterested vs uninterested", "def": "disinterested = impartial, no personal stake; uninterested = not interested, bored", "ipa": "impartial (disinterested) / indifferent (uninterested)", "ex": "A disinterested judge is fair. An uninterested judge is dangerous for different reasons."}, {"id": "economic_economical", "word": "Economic vs economical", "def": "economic = relating to the economy; economical = not wasteful, cost-effective", "ipa": "financial (economic) / thrifty (economical)", "ex": "The economic crisis was severe. The solution was economical and efficient."}, {"id": "alternate_alternative", "word": "Alternate vs alternative", "def": "alternate = every other one (adj) or take turns (verb); alternative = another option", "ipa": "every other (alternate) / substitute (alternative)", "ex": "They work on alternate days. An alternative approach was proposed."}, {"id": "principal_principle", "word": "Principal vs principle", "def": "principal (adj/noun) = main, or head of school; principle (noun) = fundamental rule or belief", "ipa": "main (principal) / rule / belief (principle)", "ex": "The principal reason is cost. The report’s principles are sound."}];
var fcIdx=0,flipped=false;
function setMode(mode,btn){document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('modeFlash').style.display=mode==='flash'?'':'none';document.getElementById('modeList').style.display=mode==='list'?'':'none';if(mode==='list')renderList();}
function flipCard(){flipped=!flipped;document.getElementById('flashcard').classList.toggle('flipped',flipped);}
function showCard(idx){flipped=false;document.getElementById('flashcard').classList.remove('flipped');var w=WORDS[idx];document.getElementById('fcWord').textContent=w.word;document.getElementById('fcDef').textContent=w.def;document.getElementById('fcEx').textContent=w.ex||'';document.getElementById('fcCounter').textContent=(idx+1)+' / '+WORDS.length;
  fcSeen.add(idx);
  if (!mastered && fcSeen.size >= WORDS.length) { mastered = true; setTimeout(markMastered, 700); }}
function fcNext(){fcIdx=(fcIdx+1)%WORDS.length;showCard(fcIdx);}
function fcPrev(){fcIdx=(fcIdx-1+WORDS.length)%WORDS.length;showCard(fcIdx);}
function renderList(){document.getElementById('wordList').innerHTML=WORDS.map(w=>'<div class="word-list-item"><span class="wl-word">'+w.word+'</span><span class="wl-def">'+w.def+'</span></div>').join('');}
var mastered = false;
var fcSeen = new Set();
var completedRounds = 0;
showCard(0);
</script>
