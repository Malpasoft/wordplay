.fc-def{font-size:.88rem;color:var(--ink);margin-bottom:8px;line-height:1.5}

.fc-audio-btn{background:none;border:1px solid var(--hairline);border-radius:4px;
  padding:5px 12px;font-family:var(--font-sans);font-size:.65rem;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;margin-top:10px}
.fc-audio-btn:hover{border-color:var(--amber);color:var(--amber)}
.fc-nav{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:20px}
.fc-btn{font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;border-radius:4px;cursor:pointer;border:1.5px solid var(--hairline);background:transparent;color:var(--ink)}
.fc-btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.fc-counter{font-family:var(--font-sans);font-size:.75rem;color:var(--muted);font-weight:600}
.word-list-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--hairline)}
.wl-word{font-weight:700;font-size:.95rem;min-width:180px}
.wl-def{font-size:.85rem;color:var(--ink)}
</style>

<script>
var WORDS=[{"id": "connotation", "word": "Connotation", "def": "the emotional or cultural associations a word carries beyond its literal meaning", "ipa": "implication / undertone", "ex": "Connotation: \"house\" is neutral; \"home\" has warm connotations."}, {"id": "denotation", "word": "Denotation", "def": "the literal, dictionary meaning of a word, without emotional associations", "ipa": "literal meaning / primary sense", "ex": "The denotation of \"snake\" is a reptile; its connotation may be treachery."}, {"id": "amelioration", "word": "Amelioration", "def": "a process by which a word gains a more positive meaning over time", "ipa": "semantic elevation / meaning improvement", "ex": "Amelioration: \"knight\" originally meant servant; it later gained prestige."}, {"id": "pejoration", "word": "Pejoration", "def": "a process by which a word gains a more negative meaning over time", "ipa": "semantic degradation / meaning worsening", "ex": "Pejoration: \"villain\" originally meant farm worker; now it means evil person."}, {"id": "hyperbole", "word": "Hyperbole", "def": "deliberate exaggeration for rhetorical or emphatic effect", "ipa": "overstatement / exaggeration", "ex": "Hyperbole: \"I’ve told you a million times.\""}, {"id": "litotes", "word": "Litotes", "def": "understatement using a negative to affirm a positive, often for emphasis or irony", "ipa": "understatement / negative affirmation", "ex": "Litotes: \"not bad\" meaning \"very good\" / \"not unlike\" meaning \"similar\""}, {"id": "euphemism", "word": "Euphemism", "def": "a mild or indirect word used in place of one that might seem harsh or offensive", "ipa": "indirect expression / softening term", "ex": "Euphemism: \"passed away\" instead of \"died\""}, {"id": "dysphemism", "word": "Dysphemism", "def": "a harsh or deliberately offensive word used in place of a neutral or positive one", "ipa": "offensive substitute / blunt term", "ex": "Dysphemism: \"croak\" for \"die\" / \"shrink\" for \"therapist\""}, {"id": "synecdoche", "word": "Synecdoche", "def": "a figure of speech where a part represents the whole, or vice versa", "ipa": "part-for-whole substitution", "ex": "Synecdoche: \"All hands on deck\" — hands = sailors"}, {"id": "metonymy", "word": "Metonymy", "def": "using a closely associated concept to refer to something else", "ipa": "name substitution / associated reference", "ex": "Metonymy: \"The Crown\" for the monarchy / \"The press\" for journalism"}, {"id": "register_shift", "word": "Register shift", "def": "changing the formality level of language to suit the audience or context", "ipa": "style shift / code-switching", "ex": "A register shift from \"I wish to enquire\" to \"Can I ask?\" signals informality."}, {"id": "semantic_field", "word": "Semantic field", "def": "a group of words all related to the same topic or concept", "ipa": "lexical field / word family", "ex": "The semantic field of medicine: diagnosis, treatment, prognosis, recovery."}];
var fcIdx=0,flipped=false;
function setMode(mode,btn){document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('modeFlash').style.display=mode==='flash'?'':'none';document.getElementById('modeList').style.display=mode==='list'?'':'none';if(mode==='list')renderList();}
function flipCard(){flipped=!flipped;document.getElementById('flashcard').classList.toggle('flipped',flipped);}
function showCard(idx){flipped=false;document.getElementById('flashcard').classList.remove('flipped');var w=WORDS[idx];document.getElementById('fcWord').textContent=w.word;document.getElementById('fcDef').textContent=w.def;document.getElementById('fcEx').textContent=w.ex||'';document.getElementById('fcCounter').textContent=(idx+1)+' / '+WORDS.length;
  fcSeen.add(idx);
  if (!mastered && fcSeen.size >= WORDS.length) { mastered = true; setTimeout(markMastered, 700); }}
function fcNext(){fcIdx=(fcIdx+1)%WORDS.length;showCard(fcIdx);}
function fcPrev(){fcIdx=(fcIdx-1+WORDS.length)%WORDS.length;showCard(fcIdx);}
function renderList(){document.getElementById('wordList').innerHTML=WORDS.map(w=>'<div class="word-list-item"><span class="wl-word">'+w.word+'</span><span class="wl-def">'+w.def+'</span></div>').join('');}
function speakWord(e) {
  if (e) e.stopPropagation();
  if (!window.speechSynthesis) return;
  var utt = new SpeechSynthesisUtterance(WORDS[fcIdx].word);
  utt.lang = 'en-GB'; utt.rate = 0.9;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}
var mastered = false;
var fcSeen = new Set();
var completedRounds = 0;
showCard(0);
</script>
