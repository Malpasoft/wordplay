<style>
.vocab-page{max-width:800px;margin:0 auto;padding:20px 0}
.mode-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.mode-tab{font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;border-radius:4px;cursor:pointer;border:1.5px solid var(--hairline);background:transparent;color:var(--ink);transition:all .15s}
.mode-tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.flashcard-wrap{perspective:800px;margin:0 auto 20px;max-width:480px}
.flashcard{width:100%;height:220px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;border-radius:10px}
.flashcard.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;border:1px solid var(--hairline)}
.fc-front{background:var(--paper)}
.fc-back{background:var(--paper);transform:rotateY(180deg)}
.fc-word{font-size:1.6rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.fc-def{font-size:.95rem;color:var(--ink);margin-bottom:8px}
.fc-ex{font-size:.85rem;color:var(--muted);font-style:italic}
.fc-hint{font-family:var(--font-sans);font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:12px}
.fc-audio-btn{background:none;border:1px solid var(--hairline);border-radius:4px;
  padding:5px 12px;font-family:var(--font-sans);font-size:.65rem;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;margin-top:10px}
.fc-audio-btn:hover{border-color:var(--amber);color:var(--amber)}
.fc-nav{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:20px}
.fc-btn{font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;border-radius:4px;cursor:pointer;border:1.5px solid var(--hairline);background:transparent;color:var(--ink)}
.fc-btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.fc-counter{font-family:var(--font-sans);font-size:.75rem;color:var(--muted);font-weight:600}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-item{padding:12px 14px;border:1.5px solid var(--hairline);border-radius:6px;cursor:pointer;font-size:.88rem;color:var(--ink);transition:border-color .15s,background .15s;user-select:none}
.match-item.selected{border-color:var(--amber);background:rgba(184,134,11,.08)}
.match-item.correct{border-color:var(--green);background:rgba(46,125,82,.08);pointer-events:none}
.match-item.wrong{border-color:var(--red);background:rgba(192,57,43,.08)}
.mastery-badge{display:inline-block;padding:8px 18px;background:rgba(184,134,11,.12);color:var(--amber);font-family:var(--font-sans);font-size:.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:4px;margin-bottom:16px}
.word-list-item{display:flex;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid var(--hairline)}
.wl-word{font-weight:700;font-size:1rem;min-width:180px}
.wl-def{font-size:.88rem;color:var(--ink)}
</style>
</head>

      <button class="mode-tab active" onclick="setMode('flash',this)">Flashcards</button>
      <button class="mode-tab" onclick="setMode('match',this)">Match</button>

    </div>
    <div id="modeFlash">
      <div class="flashcard-wrap">
        <button class="flashcard" id="flashcard" onclick="flipCard()">
          <div class="fc-face fc-front"><div class="fc-word" id="fcWord"></div><div class="fc-hint">tap to reveal</div>
          <button class="fc-audio-btn" onclick="speakWord(event)">&#9654; Pronounce</button></div>
          <div class="fc-face fc-back"><div class="fc-def" id="fcDef"></div><div class="fc-ex" id="fcEx"></div></button>
        </div>
      </div>
      <div class="fc-nav">
        <button class="fc-btn" onclick="fcPrev()">&#8592; Prev</button>
        <span class="fc-counter" id="fcCounter"></span>
        <button class="fc-btn" onclick="fcNext()">Next &#8594;</button>
      </div>
      <div style="text-align:center">
        <button class="fc-btn primary" onclick="markMastered()" id="btnMastered">Mark topic as mastered</button>
    <div style="text-align:center;margin-top:12px"><a href="../index.html" id="nextTopicBtn" class="fc-btn primary" style="text-decoration:none;display:none">C1 Vocab &#10003;</a></div>
      </div>
    </div>
    <div id="modeMatch" style="display:none">
      <div id="matchScore" style="font-family:var(--font-sans);font-size:.85rem;color:var(--muted);margin-bottom:16px">Match each word to its definition</div>
      <div class="match-grid"><div class="match-col" id="matchWords"></div><div class="match-col" id="matchDefs"></div></div>
      <div style="text-align:center"><button class="fc-btn" onclick="initMatch()">New round</button></div>
    </div>
    <div id="modeList" style="display:none"><div id="wordList"></div></div>

<script src="../../../../shared/store.js?v=v108"></script>
<script>
var SLUG='word-formation-advanced', LEVEL='c1', MASTERY_KEY='wordplay_vocab_c1_word-formation-advanced_mastered';
var WORDS=[{"id": "tion", "word": "-ation / -isation suffix", "def": "forms abstract nouns from verbs (process or result)", "ipa": "", "ex": "globalise → globalisation / organise → organisation"}, {"id": "ment", "word": "-ment suffix", "def": "forms nouns from verbs, showing result or action", "ipa": "", "ex": "achieve → achievement / develop → development"}, {"id": "ity", "word": "-ity / -ty suffix", "def": "forms abstract nouns from adjectives showing quality", "ipa": "", "ex": "complex → complexity / stable → stability"}, {"id": "ness", "word": "-ness suffix", "def": "forms nouns from adjectives showing a state or condition", "ipa": "", "ex": "aware → awareness / dark → darkness"}, {"id": "ous", "word": "-ous / -ious suffix", "def": "forms adjectives meaning having the quality of", "ipa": "", "ex": "ambition → ambitious / nutrition → nutritious"}, {"id": "ive", "word": "-ive / -ative suffix", "def": "forms adjectives meaning relating to or tending to", "ipa": "", "ex": "create → creative / imagine → imaginative"}, {"id": "mis", "word": "mis- prefix", "def": "means wrongly, badly, or incorrectly", "ipa": "", "ex": "manage → mismanage / understand → misunderstand"}, {"id": "over", "word": "over- prefix", "def": "means too much or excessively", "ipa": "", "ex": "estimate → overestimate / work → overwork"}, {"id": "under", "word": "under- prefix", "def": "means too little or insufficiently", "ipa": "", "ex": "estimate → underestimate / fund → underfund"}, {"id": "counter", "word": "counter- prefix", "def": "means against or in opposition to", "ipa": "", "ex": "argue → counterargue / act → counteract"}, {"id": "conversion", "word": "Conversion (zero derivation)", "def": "using a word as a different part of speech without adding a suffix", "ipa": "", "ex": "email (noun) → to email (verb) / a Google (noun) → to Google (verb)"}, {"id": "compound", "word": "Compound nouns", "def": "two or more words joined to create a new noun with a new meaning", "ipa": "", "ex": "break + through = breakthrough / back + log = backlog"}];
var fcIdx=0, flipped=false;
function setMode(mode,btn){document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('modeFlash').style.display=mode==='flash'?'':'none';document.getElementById('modeMatch').style.display=mode==='match'?'':'none';document.getElementById('modeList').style.display=mode==='list'?'':'none';if(mode==='match')initMatch();if(mode==='list')renderList();}
function flipCard(){flipped=!flipped;document.getElementById('flashcard').classList.toggle('flipped',flipped);}
function showCard(idx){flipped=false;document.getElementById('flashcard').classList.remove('flipped');var w=WORDS[idx];document.getElementById('fcWord').innerHTML=w.word;document.getElementById('fcDef').textContent=w.def;var ex=w.ex||'';document.getElementById('fcEx').innerHTML=ex.replace(/<[^>]*>/g,'');document.getElementById('fcCounter').textContent=(idx+1)+' / '+WORDS.length;
  fcSeen.add(idx);
  if (!mastered && fcSeen.size >= WORDS.length) { mastered = true; setTimeout(markMastered, 700); }}
function fcNext(){fcIdx=(fcIdx+1)%WORDS.length;showCard(fcIdx);}
function fcPrev(){fcIdx=(fcIdx-1+WORDS.length)%WORDS.length;showCard(fcIdx);}
function markMastered(){try{localStorage.setItem(MASTERY_KEY,'1');}catch(e){}document.getElementById('masteryBadge').style.display='block';var btn=document.getElementById('btnMastered');btn.textContent='Mastered!';btn.disabled=true;}
function checkMastered(){try{if(localStorage.getItem(MASTERY_KEY)==='1'){document.getElementById('masteryBadge').style.display='block';var btn=document.getElementById('btnMastered');btn.textContent='Mastered!';btn.disabled=true;}}catch(e){}}
var matchSelected=null;
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function initMatch(){var sample=shuffle(WORDS).slice(0,6);var words=shuffle(sample.map(w=>{return{id:w.word,text:w.word,type:'word'};}));var defs=shuffle(sample.map(w=>{return{id:w.word,text:w.def.length>50?w.def.slice(0,47)+'...':w.def,type:'def'};}));matchSelected=null;document.getElementById('matchScore').textContent='Match each word to its definition';function renderCol(col,items){col.innerHTML='';items.forEach(function(item){var el=document.createElement('div');el.className='match-item';el.textContent=item.text;el.dataset.id=item.id;el.dataset.type=item.type;el.addEventListener('click',handleMatch);col.appendChild(el);});}renderCol(document.getElementById('matchWords'),words);renderCol(document.getElementById('matchDefs'),defs);}
function handleMatch(e){var el=e.currentTarget;if(el.classList.contains('correct'))return;if(!matchSelected){if(matchSelected&&matchSelected!==el)matchSelected.classList.remove('selected');matchSelected=el;el.classList.add('selected');}else{var prev=matchSelected;matchSelected=null;var correct=prev.dataset.id===el.dataset.id&&prev.dataset.type!==el.dataset.type;if(correct){prev.classList.remove('selected');prev.classList.add('correct');el.classList.add('correct');var remaining=document.querySelectorAll('.match-item:not(.correct)').length;if(remaining===0)document.getElementById('matchScore').textContent='All matched!'; completedRounds++; if (!mastered && completedRounds >= 5) { mastered = true; setTimeout(markMastered, 700); }}else{prev.classList.remove('selected');prev.classList.add('wrong');el.classList.add('wrong');setTimeout(function(){prev.classList.remove('wrong');el.classList.remove('wrong');},600);}}}
function renderList(){document.getElementById('wordList').innerHTML=WORDS.map(w=>'<div class="word-list-item"><span class="wl-word">'+w.word+'</span><span class="wl-def">'+w.def+'</span></div>').join('');}
function speakWord(e) {
  if (e) e.stopPropagation();
  if (!window.speechSynthesis) return;
  var utt = new SpeechSynthesisUtterance(WORDS[fcIdx].word);
  utt.lang = 'en-GB'; utt.rate = 0.9;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}
var mastered = false;
var fcSeen = new Set();
var completedRounds = 0;
showCard(0);checkMastered();
</script>

<div style="margin-top:24px;border-top:1px solid var(--hairline);padding-top:20px">
  <div style="font-family:var(--font-sans);font-size:.65rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">My notes &amp; examples</div>
  <textarea id="my-notes-area" maxlength="500" placeholder="Write your own example sentence, a memory trick, or a note in your language…" style="width:100%;min-height:80px;padding:10px 12px;font-family:Georgia,serif;font-size:.88rem;color:var(--ink);background:var(--paper);border:1.5px solid var(--hairline);border-radius:6px;resize:vertical;line-height:1.6;box-sizing:border-box"></textarea>
  <div style="font-family:var(--font-sans);font-size:.65rem;color:var(--muted);margin-top:4px;text-align:right"><span id="notes-chars">0</span>/500 · auto-saved</div>
</div>
<script>
(function(){
  var ta = document.getElementById('my-notes-area');
  var cc = document.getElementById('notes-chars');
  if (!ta) return;
  var KEY = 'wp_notes_c1_word-formation-advanced';
  try { ta.value = localStorage.getItem(KEY) || ''; cc.textContent = ta.value.length; } catch(e){}
  var t;
  ta.addEventListener('input', function() {
    cc.textContent = ta.value.length;
    clearTimeout(t);
    t = setTimeout(function() {
      try { localStorage.setItem(KEY, ta.value); } catch(e) {}
    }, 600);
  });
})();
</script>
</body>
